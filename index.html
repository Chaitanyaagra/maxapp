async function saveChangePassword(){
  const d = state._changePasswordOpen;
  if(!d) return;
  if(!d.current){ state._changePasswordError='Enter your current password'; render(); return; }
  if(!d.next || d.next.length<6){ state._changePasswordError='New password must be at least 6 characters'; render(); return; }
  if(d.next!==d.confirm){ state._changePasswordError='New passwords don\'t match'; render(); return; }
  state._changePasswordError = null;
  const user = firebase.auth().currentUser;
  if(!user){ state._changePasswordError = 'Not signed in — please sign in again'; render(); return; }
  try{
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, d.current);
    await fbWithTimeout(user.reauthenticateWithCredential(cred));
  }catch(e){
    console.error('reauthenticate before password change failed', e);
    state._changePasswordError = 'Current password is incorrect';
    render();
    return;
  }
  try{
    await fbWithTimeout(user.updatePassword(d.next));
    await logAudit('password_changed', (state.currentUser?state.currentUser.name:'Someone')+' changed their own password');
    state._changePasswordOpen = null;
    render();
    showToast('Password changed');
  }catch(e){
    console.error('update password failed', e);
    state._changePasswordError = friendlyAuthError(e);
    render();
  }
}


/* =========================================================
   NOTIFICATIONS (in-app only — see Settings for why there is
   no push/WhatsApp/email delivery here)
========================================================= */
function computeNotifications(){
  const list = [];
  DB.sos.filter(s=>s.status==='active').forEach(s=>
    list.push({type:'critical', text:'\ud83d\udea8 SOS ('+sosKindMeta(s.kind).label+'): '+s.raisedBy+(s.tower? ' \u00b7 Tower '+s.tower:''), go:()=>goto('sos',{sosFilter:{status:'active'}})})
  );
  if(state.role==='supervisor'){
    DB.tasks.filter(t=>t.status==='pending').forEach(t=>
      list.push({type: (t.priority==='urgent'||t.priority==='high') ? 'critical' : 'warn', text:'Task: '+t.title+' ('+TASK_PRIORITIES[t.priority].label+')', go:()=>goto('home')})
    );
  }
  if(SYNC_QUEUE.length) list.push({type:'warn', text: SYNC_QUEUE.length+' record'+(SYNC_QUEUE.length>1?'s':'')+' waiting to sync — will upload automatically when online', go:()=>{ flushSyncQueue(); }});
  const open = DB.defects.filter(d=>d.status!=='closed');
  if(state.currentUser){
    const mine = open.filter(d=> d.assignedTo === state.currentUser.name);
    if(mine.length) list.push({type:'warn', text: mine.length+' open issue'+(mine.length>1?'s':'')+' assigned to you', go:()=>goto('defects',{defFilter:{status:'open',priority:'all',q:state.currentUser.name}})});
  }
  const residentOpen = open.filter(d=> d.source==='resident');
  if(residentOpen.length) list.push({type:'warn', text: residentOpen.length+' resident complaint'+(residentOpen.length>1?'s':'')+' pending', go:()=>goto('defects')});
  const breaches = open.filter(isBreach);
  const overdueOnly = open.filter(d=> isOverdue(d) && !isBreach(d));
  breaches.forEach(d=> list.push({type:'critical', text:'Critical breach: '+d.location+' (Tower '+d.tower+')', go:()=>goto('defects',{defFilter:{status:'open',priority:'all'}})}));
  overdueOnly.forEach(d=> list.push({type:'warn', text:'Overdue: '+d.location+' (Tower '+d.tower+')', go:()=>goto('defects',{defFilter:{status:'open',priority:'all'}})}));
  if(WEATHER_ALERT){
    const wm = WEATHER_ALERT_LEVELS[WEATHER_ALERT];
    list.push({type: WEATHER_ALERT==='storm'?'critical':'warn', text: wm.bannerTitle+' — '+wm.bannerSub, go:()=>goto('home')});
  }
  const isSaturday = new Date().getDay()===6;
  const mepThisWeek = DB.inspections.some(r=> r.formType==='weekly-mep' && r.submittedAt && new Date(r.submittedAt) >= weekStartKey());
  if(isSaturday && !mepThisWeek) list.push({type:'info', text:'Weekly MEP inspection due today (9am–1pm, submit by 5pm)', go:()=>goto('newpick')});
  // Daily checklists used to have no reminder at all beyond the homepage
  // banner (which only fires while you're already on Home). Nudge from
  // the bell too, once it's reasonably late morning and nothing's filed.
  const hourNow = new Date().getHours();
  const today = todayStr();
  if(hourNow>=11){
    const dailyTowerToday = DB.inspections.some(r=> r.formType==='daily-tower' && r.date===today);
    const dailySecurityToday = DB.inspections.some(r=> r.formType==='daily-security' && r.date===today);
    if(!dailyTowerToday) list.push({type:'warn', text:'Daily Tower Common Area checklist not yet filed today', go:()=>goto('newpick')});
    if(!dailySecurityToday) list.push({type:'warn', text:'Daily Security & Common Area checklist not yet filed today', go:()=>goto('newpick')});
  }
  return list;
}
function toggleNotifPanel(){ state.notifOpen = !state.notifOpen; renderNotifPanel(); }
function renderNotifPanel(){
  const layer = document.getElementById('notifLayer');
  if(!state.notifOpen){ layer.innerHTML=''; return; }
  const list = computeNotifications();

// Fires a real system notification for any active SOS this device hasn't
// already alerted on. Only meaningfully runs for admin/supervisor, since
// only loadAll() (not loadMyAssignedDefects) populates DB.sos — worker/
// vendor sessions never have SOS data to check in the first place.
// SOS_NOTIFIED_IDS is lazy-loaded once per session and persisted so a
// page reload doesn't re-alert on SOS the device already showed.
let SOS_NOTIFIED_IDS = null;
async function checkSosNotifications(){
  if(!state.sosNotifyEnabled || !('Notification' in window) || Notification.permission!=='granted') return;
  if(SOS_NOTIFIED_IDS===null){
    const saved = await storeGetPersonal('sosNotifiedIds');
    SOS_NOTIFIED_IDS = new Set((saved && saved.value) || []);
  }
  const active = DB.sos.filter(s=>s.status==='active');
  const fresh = active.filter(s=>!SOS_NOTIFIED_IDS.has(s.id));
  if(!fresh.length) return;
  fresh.forEach(s=>{
    try{
      const n = new Notification('🚨 SOS: '+sosKindMeta(s.kind).label, {
        body: (s.raisedBy||'Someone')+(s.tower?' — Tower '+s.tower:'')+(s.flat?' · '+s.flat:''),
        tag: 'sos-'+s.id,
        requireInteraction: true
      });
      n.onclick = ()=>{ window.focus(); state.notifOpen=false; goto('sos',{sosFilter:{status:'active'}}); n.close(); };
    }catch(e){ console.error('SOS notification failed', e); }
  });
  // Trim the remembered set down to just currently-active ids so it
  // doesn't grow forever — a resolved SOS's id never needs remembering.
  SOS_NOTIFIED_IDS = new Set(active.map(s=>s.id));
  await storeSetPersonal('sosNotifiedIds', {value:[...SOS_NOTIFIED_IDS]});
}

   user's browser — not available in any offline/sandboxed
   preview. Every feature that uses these must feature-detect
   and gracefully fall back if a library failed to load.)
========================================================= */
function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = ()=>resolve(true);
    s.onerror = ()=>reject(new Error('failed to load '+src));
    document.head.appendChild(s);
  });
}

/* =========================================================
   OFFLINE LIBRARY CACHING (Service Worker) — for use somewhere with
   no signal (parking, pump room), where the CDN calls above can't
   reach the network at all. This does NOT bundle the libraries into
   this file: that would mean reproducing large third-party minified
   bundles by hand with no way to verify every byte is correct, which
   risks shipping a silently-corrupted copy — worse than today's
   already-safe fallback (bar charts / CSV / print instead of
   Chart.js / Excel / PDF). Instead, a service worker caches the real
   files the browser downloads the first time it has a connection, and
   serves that exact cached copy on every offline visit after.
   Requirements this can't get around: the app must be served over
   HTTPS (or http://localhost) — service workers are blocked on
   file:// pages and inside sandboxed iframes (e.g. an in-chat
   preview) by browser design, not by anything fixable here. If
   registration fails for either reason this just silently no-ops;
   the app already works fully without it, just without the offline
   library cache.
   Manual alternative for admins who'd rather not deal with any of
   this: download the 4 URLs in EXTERNAL_LIB_URLS above, save them
   next to this HTML file, and change loadScript(...) in
   loadExternalLibs() to the local filenames. */

let __appRendered = false;
function forceShowApp(reason){
  if(__appRendered) return;
  __appRendered = true;
  try{ render(); }catch(e){ console.error('render failed', e); }
  const sp = document.getElementById('splash');
  if(sp) sp.classList.add('hide');
  if(reason) console.warn('App shown via watchdog:', reason);
}
function showAppNow(){
  __appRendered = true;
  render();
  const sp = document.getElementById('splash');
  if(sp) sp.classList.add('hide');
}
async function init(){
  /* Watchdog: whatever happens (slow Firebase, network stall, an unexpected
     throw), the app must appear. After 10s we force-render with whatever
     data has loaded so far — sync continues in the background. */
  const watchdog = setTimeout(()=>forceShowApp('init exceeded 3s'), 3000);
  try{
  try{ state.residentMode = new URLSearchParams(location.search).get('resident')==='1'; }catch(e){}

  if(state.residentMode){
    // Public complaint link: no login, ever. A lightweight anonymous
    // Firestore session (create-only under the current rules) plus theme
    // and keyboard handling is all this path needs — it never touches
    // loadAll(), sync, audit pruning, or task popups.
    state.view = 'defects';
    state._residentFormOpen = true;
    document.body.classList.add('resident-mode');
    await initTheme();
    await ensureResidentAuth();
    showAppNow();
    bindKeyboardAvoidance();
    clearTimeout(watchdog);
    return;
  }

  // Staff path: verify who's actually signed in (Firebase Auth persists
  // real sessions on its own — this is not the old "remember the last
  // picked name" trick) before loading or showing any operational data.
  await initTheme();
  state._authScreen = 'checking';
  const db = await initFirebase();
  let authed = false;
  if(db){
    // firebase.auth().currentUser can read back null for a brief moment
    // even when a valid persisted session exists — restoring it from
    // IndexedDB is asynchronous. onAuthStateChanged's first callback is
    // Firebase's own signal that it has finished checking, so waiting for
    // that (instead of reading currentUser immediately) is what makes
    // "stay signed in" actually reliable across app restarts.
    const restoredUser = await fbWithTimeout(waitForAuthState(), 8000).catch(()=>null);
    if(restoredUser){
      const staffData = await loadStaffDoc(restoredUser.uid);
      if(staffData){
        AUTH_USER = restoredUser;
        STAFF_DOC = staffData;
        state.currentUser = {name: staffData.name, mobile: staffData.mobile, role: staffData.role, trade: staffData.trade||''};
        state.role = staffData.role;
        state.adminUnlocked = (staffData.role==='admin');
        authed = true;
      } else {
        // Account exists in Firebase Auth but has no staff record (e.g. it
        // was removed by an admin) — don't leave it half signed-in.
        try{ await firebase.auth().signOut(); }catch(e){}
      }
    }
  }

  if(!authed){
    state._authScreen = db ? (await isBootstrapOpen() ? 'bootstrap' : 'login') : 'login';
    showAppNow();
    bindAuthInputs();
    bindKeyboardAvoidance();
    clearTimeout(watchdog);
    return;
  }
  state._authScreen = null;

  if(isNarrowRole(state.role)){
    state.view = 'mydefects';
    startBackgroundSync();
    await loadMyAssignedDefects(AUTH_USER.uid);
    state._isNavigating = true;
    showAppNow();
    bindKeyboardAvoidance();
    clearTimeout(watchdog);
    forceShowApp();
    return;
  }

  // Background refresh is armed BEFORE the first load even starts, not
  // after it and a chain of other setup — so if this initial loadAll()
  // is slow (weak connection, cold Firestore query) or the 3s watchdog
  // below fires first and shows an empty/stale screen, the 45s tick
  // (and the visibility-change listener) are already running and will
  // pick up real data on their own shortly, without depending on every
  // later step finishing first.
  startBackgroundSync();
  await loadAll();
  await checkSosNotifications();
  // Real data is in DB now — show it immediately. Everything below this
  // point (resume-draft, sync queue, auto-assign rules, API key, staff
  // list, external chart/export libs) is progressive enhancement: useful,
  // but none of it should gate the first real paint, since a slow step
  // here used to silently hold back showAppNow() too — worst case, the
  // screen just sat on the 3s watchdog fallback (empty DB) until this
  // entire chain finished, which on a weak connection could take far
  // longer than 3s.
  state._isNavigating = true;
  showAppNow();
  bindKeyboardAvoidance();

  state.resumeDraft = await storeGetPersonal('draftautosave');
  try{
    const q = await storeGetPersonal('syncqueue');
    SYNC_QUEUE = (q && q.items) ? q.items : [];
  }catch(e){ SYNC_QUEUE = []; }
  await loadAutoAssignRules();
  await loadWeatherAlert();
  await loadClaudeApiKey();
  await loadStaffList();
  if(SYNC_QUEUE.length) flushSyncQueue();
  window.addEventListener('online', ()=>{ flushSyncQueue().then(n=>{ if(n && !state.residentMode) refreshData(false); }); });
  loadExternalLibs();
  pruneAuditLog();
  registerLibraryCacheSW();
  checkForTaskPopup();
  render(); // reflect resumeDraft / staff list / anything else the progressive loads above just filled in
  }catch(e){
    console.error('init failed — showing app with local data', e);
  }finally{
    clearTimeout(watchdog);
    forceShowApp();
  }
}

/* =========================================================
   LONG-PRESS on checklist items → instant issue popup
   600ms hold on any .lp-issue chip-label triggers the
   issue popup for that item. Works on mobile & desktop.
========================================================= */
(function(){
  var _lpt = null, _lpEl = null;
  function startLP(el){
    _lpEl = el;
    el.classList.add('pressing');
    _lpt = setTimeout(function(){
      _lpt = null;
      el.classList.remove('pressing');
      var f  = el.dataset.f;
      var ii = parseInt(el.dataset.ii);
      if(isNaN(ii) || !f) return;
      // Mark as issue first, then open popup
      var fd = state.draft && state.draft.floorData && state.draft.floorData[f];
      if(!fd) return;
      fd.items[ii] = false;
      reopenFloorIssue(f, ii);
    }, 600);
  }
  function cancelLP(){
    if(_lpEl) _lpEl.classList.remove('pressing');
    if(_lpt){ clearTimeout(_lpt); _lpt = null; }
    _lpEl = null;
  }
  document.addEventListener('mousedown', function(e){
    var el = e.target.closest('.lp-issue');
    if(el) startLP(el);
  });
  document.addEventListener('mouseup',   cancelLP);
  document.addEventListener('mousemove', function(e){
    if(_lpt) cancelLP();
  });
  document.addEventListener('touchstart', function(e){
    var el = e.target.closest('.lp-issue');
    if(el){ e.preventDefault(); startLP(el); }
  }, {passive:false});
  document.addEventListener('touchend',    cancelLP, {passive:true});
  document.addEventListener('touchcancel', cancelLP, {passive:true});
  document.addEventListener('touchmove',   function(e){ if(_lpt) cancelLP(); }, {passive:true});
})();

/* =========================================================
   KEYBOARD AVOIDANCE (mobile) — see the body.keyboard-open CSS rule.
   Bound once (event delegation on document), not per-render, since
   #app's innerHTML gets replaced on every render() call and per-element
   listeners would be lost. A short blur delay avoids flicker when the
   person taps from one field straight into another.
========================================================= */
let __kbBlurTimer = null;
function bindKeyboardAvoidance(){
  const isTypingTarget = (el)=> el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT') && document.getElementById('app') && document.getElementById('app').contains(el);
  document.addEventListener('focusin', (e)=>{
    if(!isTypingTarget(e.target)) return;
    clearTimeout(__kbBlurTimer);
    document.body.classList.add('keyboard-open');
  });
  document.addEventListener('focusout', (e)=>{
    if(!isTypingTarget(e.target)) return;
    clearTimeout(__kbBlurTimer);
    __kbBlurTimer = setTimeout(()=> document.body.classList.remove('keyboard-open'), 120);
  });
  // Extra signal for browsers where the visual viewport shrinks when the
  // keyboard opens (notably iOS Safari) without a clean focus/blur pairing —
  // feature-detected, purely additive, never required for the class to work.
  if(window.visualViewport){
    let baseHeight = window.visualViewport.height;
    window.visualViewport.addEventListener('resize', ()=>{
      const shrunk = window.visualViewport.height < baseHeight * 0.75;
      if(shrunk && document.activeElement && isTypingTarget(document.activeElement)){
        document.body.classList.add('keyboard-open');
      } else if(!shrunk){
        baseHeight = Math.max(baseHeight, window.visualViewport.height);
        if(!document.activeElement || !isTypingTarget(document.activeElement)) document.body.classList.remove('keyboard-open');
      }
    });
  }
}

/* =========================================================
   DATA SYNC — this app's storage is shared across everyone
   who opens the file, but was only ever pulled once at
   startup (plus after your own writes). Two supervisors
   working at the same time would each see a stale picture
   until they reloaded the page. This adds a quiet background
   poll plus a manual refresh button so people actually see
   each other's submissions/defect updates.
========================================================= */
let __syncInterval = null;
async function refreshData(showFeedback){
  const btn = document.getElementById('refreshBtn');
  if(showFeedback && btn) btn.classList.add('spinning');
  try{
    // Snapshot before load — only re-render if data actually changed
    const snap = () => JSON.stringify({
      ic: DB.inspections.length, dc: DB.defects.length,
      tc: DB.tasks.length, sc: DB.sos.length,
      iids: DB.inspections.map(x=>x.id).sort().join(','),
      dids: DB.defects.map(x=>x.id+x.status).sort().join(','),
      tids: DB.tasks.map(x=>x.id+x.status).sort().join(','),
      sids: DB.sos.map(x=>x.id+x.status).sort().join(',')
    });
    const before = snap();
    if(isNarrowRole(state.role)){
      if(AUTH_USER) await loadMyAssignedDefects(AUTH_USER.uid);
    } else {
      await loadAll();
    }
    const changed = snap() !== before;
    await checkSosNotifications();

    if(state.view==='fill' || state.view==='review'){
      // Never interrupt an active form fill
      updateNotifBell();
      await checkForTaskPopup();
    } else if(changed || showFeedback){
      // _isNavigating stays false → no animation flash
      render();
      if(state.role!=='worker') await checkForTaskPopup();
    } else {
      // Nothing changed — just refresh the bell count silently
      updateNotifBell();
    }
    if(showFeedback) showToast('Data refreshed ✓');
  }catch(e){
    if(showFeedback) showToast('Refresh failed — check your connection');
  }
  if(showFeedback && btn) setTimeout(()=>btn.classList.remove('spinning'), 450);
}
function manualRefresh(){ flushSyncQueue().then(()=> refreshData(true)); }
function startBackgroundSync(){
  if(state.residentMode) return; // resident portal: single form only, no background polling/re-render
  clearInterval(__syncInterval);
  __syncInterval = setInterval(()=>{ if(document.visibilityState==='visible'){ flushSyncQueue(); refreshData(false); } }, 45000);
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible') refreshData(false);
  });
}

// Generic debounce helper — used so text inputs (search boxes) don't
// force a full re-render on every keystroke.
function debounce(fn, wait){
  let t = null;
  return function(...args){ clearTimeout(t); t = setTimeout(()=>fn.apply(this,args), wait); };
}

function render(){
  // render() rebuilds #app's innerHTML from scratch, which would normally
  // yank focus (and the text cursor) out of whatever input the user is
  // typing in — most noticeably the search boxes. Capture + restore it.
  const active = document.activeElement;
  let focusRestore = null;
  if(active && active.id && document.getElementById('app').contains(active) && (active.tagName==='INPUT' || active.tagName==='TEXTAREA')){
    focusRestore = {id:active.id, start:active.selectionStart, end:active.selectionEnd};
  }
  const roleBadge = document.getElementById('roleBadge');
  if(roleBadge){
    if(state.currentUser){
      roleBadge.innerHTML = icon(roleIcon(state.role),13)+' '+esc(roleTradeLabel(state.role, state.currentUser.trade));
    } else {
      roleBadge.innerHTML = '';
    }
  }
  const app = document.getElementById('app');

  // Auth gate: staff must be signed in (real Firebase Auth + a staff/{uid}
  // doc) before any operational view, nav, or modal renders. Residents on
  // the public ?resident=1 link never set _authScreen, so this never
  // affects them.
  if(!state.residentMode && state._authScreen){
    app.innerHTML = repairText(loginGateHtml());
    const sn = document.getElementById('sidenav'); if(sn) sn.innerHTML = '';
    const bn = document.getElementById('bottomnav'); if(bn) bn.innerHTML = '';
    renderModalLayer(); // e.g. the install prompt fires from its own browser
                         // events independent of this render cycle — don't
                         // blindly wipe it out from under it
    return;
  }

  let html = '';
  if(state.residentMode) state.view = 'residents';
  switch(state.view){
    case 'home': html = viewHome(); break;
    case 'newpick': html = viewNewPick(); break;
    case 'fill': html = viewFill(); break;
    case 'review': html = viewReview(); break;
    case 'records': html = viewRecords(); break;
    case 'detail': html = viewDetail(); break;
    case 'defects': html = viewDefects(); break;
    case 'dashboard': html = viewDashboard(); break;
    case 'reportbuilder': html = viewReportBuilder(); break;
    case 'residents': html = viewResidents(); break;
    case 'vendors': html = viewVendors(); break;
    case 'sos': html = viewSos(); break;
    case 'settings': html = viewSettings(); break;
    case 'mydefects': html = viewMyDefects(); break;
    default: html = isNarrowRole(state.role) ? viewMyDefects() : viewHome();
  }
  app.innerHTML = repairText(html);
  // Animate ONLY on user navigation — never on background data refresh
  if(state._isNavigating){
    state._isNavigating = false;
    app.classList.remove('view-enter');
    void app.offsetWidth;
    app.classList.add('view-enter');
  } else {
    app.classList.remove('view-enter');
  }
  document.body.classList.toggle('has-actionbar', state.view==='fill' || state.view==='review');
  renderBottomNav();
  renderSideNav();
  updateNotifBell();
  applyTheme();
  postRenderHooks();
  renderModalLayer();
  // Install prompt fires from beforeinstallprompt/load events, not every render
  if((state.view==='fill' || state.view==='review') && state.draft){ scheduleAutosave(); }
  updateAutosaveIndicator();
  if(focusRestore){
    const el = document.getElementById(focusRestore.id);
    if(el){
      el.focus();
      if(typeof el.setSelectionRange==='function' && focusRestore.start!=null){
        try{ el.setSelectionRange(focusRestore.start, focusRestore.end); }catch(e){}
      }
    }
  }
}

function newDraft(formType){
  const def = SECTION_DEFS[formType];
  const draft = {
    id: uid('insp'),
    formType, tower:'A', date: todayStr(),
    timeFrom: nowTimeStr(), timeTo:'', time: nowTimeStr(),
    supervisorName: (state.currentUser && state.currentUser.role==='supervisor')
      ? state.currentUser.name
      : (DB.members.filter(m=>m.role==='supervisor').length===1 ? DB.members.find(m=>m.role==='supervisor').name : ''),
    mobile: (state.currentUser && state.currentUser.role==='supervisor')
      ? (state.currentUser.mobile||'')
      : (DB.members.filter(m=>m.role==='supervisor').length===1 ? (DB.members.find(m=>m.role==='supervisor').mobile||'') : ''),
    verifiedBy:'',
    weekNo:'', month:new Date().toLocaleDateString('en-IN',{month:'long'}),
    defectMeta: {},
    _autoAdvance: true,   /* default ON — auto-move to next floor after all items checked */
    submittedAt:null, status:'draft'
  };
  if(formType==='daily-tower'){
    draft.floorData = {};
    def.floors.forEach(f=>{
      draft.floorData[f] = { items: def.floorItems.map(()=>null), remarks:'' };
    });
    draft.additionalData = def.additional.map(()=>({status:null, remarks:''}));
  }
  if(formType==='weekly-mep'){
    draft.sectionData = {};
    Object.keys(def.sections).forEach(k=>{
      draft.sectionData[k] = def.sections[k].items.map(()=>({status:null, remarks:''}));
    });
    draft.tankData = {};
    def.towers.forEach(t=>{ draft.tankData[t] = def.tankChecks.map(()=>null); });
    draft.readingsData = def.readings.map(()=>'');
    draft.maintenanceNotes = '';
  }
  if(formType==='daily-security'){
    draft.sectionData = {};
    Object.keys(def.sections).forEach(k=>{
      draft.sectionData[k] = def.sections[k].items.map(()=>({status:null, remarks:''}));
    });
  }
  if(formType==='club-house'){
    draft.sectionData = {};
    Object.keys(def.sections).forEach(k=>{
      draft.sectionData[k] = def.sections[k].items.map(()=>({status:null, remarks:''}));
    });
    draft.complaintsNotes = '';
    draft.incidentNotes = '';
    draft.consentForms = '';
    draft.gymAttendance = '';
    draft.swimAttendance = '';
    draft.tower = 'Club House';
  }
  draft._openFloor = def.floors ? def.floors[0] : null;
  draft._openSection = def.sections ? Object.keys(def.sections)[0] : null;
  return draft;
}
function startNewInspection(formType){
  state.draft = newDraft(formType);
  goto('fill');
}
function resumeDraft(){
  state.draft = state.resumeDraft;
  state.resumeDraft = null;
  goto('fill');
}
async function discardResumeDraft(){
  state.resumeDraft = null;
  await clearAutosave();
  render();
  showToast('Draft discarded');
}

/* Draft autosave — session convenience only; still requires an active
   connection to this storage layer, this is not offline support. */
let autosaveTimer = null;
let autosaveState = 'idle';
function scheduleAutosave(){
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async ()=>{
    if(!state.draft){ return; }
    autosaveState = 'saving'; updateAutosaveIndicator();
    const ok = await storeSetPersonal('draftautosave', state.draft);
    autosaveState = ok ? 'saved' : 'error';
    updateAutosaveIndicator();
  }, 900);
}
function updateAutosaveIndicator(){
  const el = document.getElementById('autosaveIndicator');
  if(!el) return;
  if(state.view!=='fill' && state.view!=='review'){ el.textContent = 'Max Heights Majestic'; el.style.color=''; return; }
  const map = {saving:'Saving draft…', saved:'✓ Draft saved', error:'⚠ Not saved — check connection', idle:'Max Heights Majestic'};
  el.textContent = map[autosaveState] || 'Max Heights Majestic';
  el.style.color = autosaveState==='error' ? 'var(--danger)' : (autosaveState==='saved' ? 'var(--ok)' : 'var(--ink-soft)');
}
async function clearAutosave(){ await storeDeletePersonal('draftautosave'); }

/* =========================================================
   MISSED INSPECTION BANNER
   Shows which daily forms haven't been filed today.
   Only shown in supervisor mode after 6PM, or admin always.
========================================================= */
function getMissedToday(){
  const today = todayStr();
  const hour = new Date().getHours();
  const forms = ['daily-tower','daily-security','club-house'];
  const filed = DB.inspections.filter(x=>x.date===today).map(x=>x.formType+':'+(x.tower||''));
  const missing = [];
  forms.forEach(ft=>{
    const def = SECTION_DEFS[ft];
    if(!def) return;
    if(ft==='daily-tower'){
      // Check each tower
      const towers = def.towers||['A','B','C','D','E','F','G'];
      towers.forEach(t=>{
        if(!filed.includes(ft+':'+t)) missing.push(tx(def.label)+' — Tower '+t);
      });
    } else {
      if(!filed.includes(ft+':')) missing.push(tx(def.label));
    }
  });
  return missing;
}

function viewHome(){

  const streak = computeDailyStreak();

  const breaches = openDefects.filter(isBreach);
  let banners = '';
  // First-launch guide — shows until the basics are done
  if(!state.residentMode && (DB.members.length===0 || DB.inspections.length===0)){
    const s1 = DB.members.length>0, s2 = DB.inspections.length>0;

      '<div class="item-row" style="align-items:flex-start; gap:10px;">'

function stickyActionBar(draft){
  const stats = collectDraftStats(draft);
  const total = stats.ok + stats.notOk + stats.unset;
  const pct = total ? Math.round(((stats.ok + stats.notOk) / total) * 100) : 0;
  return '<div class="sticky-actionbar no-print"><div class="actionbar-progress" style="width:'+pct+'%;"></div><div class="counts"><span><b class="c-ok">'+stats.ok+'</b> ok</span><span><b class="c-notok">'+stats.notOk+'</b> issue</span><span>'+stats.unset+' left</span></div>'
    + '<button class="btn btn-primary" onclick="goReview()">'+T('btn_review_submit')+' '+icon('chevronRight',16)+'</button></div>';
}
function d(field, val){ state.draft[field] = val; }
// Updates just the mobile-field validation message directly, instead of
// calling the full render() on every keystroke (which used to rebuild
// this entire form's HTML — including all 14 floor cards on Daily Tower
// — just to update one line of text). Same live feedback, no full re-render.
function updateMobileValidationMsg(val){
  const el = document.getElementById('mobileValidationMsg');
  if(!el) return;
  const invalid = val && !/^\d{10}$/.test(val);
  el.style.display = invalid ? 'block' : 'none';
  if(invalid) el.textContent = 'Needs to be exactly 10 digits to submit — currently '+val.length+'.';
}
function stampNow(mode){
  state.draft.date = todayStr();
  if(mode==='range') state.draft.timeFrom = nowTimeStr();
  else state.draft.time = nowTimeStr();
  render(); showToast('Timestamped to now');
}

/* ---- Daily Tower filler (floor accordion) ---- */
function floorLabel(f){ return state.lang==='hi' ? tx(f) : f+' Floor'; }
function fillDailyTower(draft, def){
  const autoAdvRow = '<div class="flag-defect '+(draft._autoAdvance?'active':'')+'" style="background:var(--surface-2); border:none; margin-bottom:8px;" onclick="event.stopPropagation()">'
    + '<label class="switch"><input type="checkbox" '+(draft._autoAdvance?'checked':'')+' onchange="d(\'_autoAdvance\',this.checked); render();"><span class="switch-track"></span></label>'
    + '<span>Auto-advance to next floor after marking all OK</span></div>';

  const floorsHtml = def.floors.map((f,fi)=>{
    const fd = draft.floorData[f];
    const open = draft._openFloor === f;
    const notOkCount = fd.items.filter(v=>v===false).length;
    const filledCount = fd.items.filter(v=>v!==null).length;
    const allOk = filledCount === def.floorItems.length && notOkCount === 0;
    return '<div class="floor-card" id="floorcard-'+f+'">'
      + '<div class="floor-head '+(open?'sticky-open':'')+'" onclick="toggleFloor(\''+f+'\')">'
        + '<div class="floor-head-left"><div class="floor-badge">'+(fi+1)+'</div><div><div class="floor-name">'+floorLabel(f)+'</div><div class="floor-status">'+filledCount+'/'+def.floorItems.length+' checked'+(notOkCount?' · '+notOkCount+' issue':'')+'</div></div></div>'
        + (allOk ? '' : '<button class="btn btn-sm" style="background:var(--ok);color:#fff;border:none;padding:6px 14px;font-size:12px;font-weight:800;border-radius:8px;min-height:32px;margin-right:6px;" onclick="event.stopPropagation();markFloorAllOk(\''+f+'\');">'+icon('check',13)+' All OK</button>')
        + '<div class="tile-arrow">'+icon(open?'chevronUp':'chevronDown',18)+'</div>'
      + '</div>'
      + '<div class="floor-body '+(open?'open':'')+'">'
        + '<div class="mini-actions"><button class="btn btn-sm btn-ghost" onclick="markFloorAllOk(\''+f+'\')">'+icon('check',14)+' '+T('btn_mark_all_ok')+'</button><button class="btn btn-sm btn-ghost" onclick="copyPrevFloor(\''+f+'\')">'+icon('refresh',14)+' '+T('btn_copy_prev_floor')+'</button></div>'
        + '<div class="chip-grid">'
        + def.floorItems.map((label,ii)=>{
            const crit = isCritical(label);
            return '<div class="chip '+(crit?'critical':'')+'">'+'<span class="chip-label '+(crit?'critical-name':'')+' lp-issue" '+'data-f="'+f+'" data-ii="'+ii+'" '+(fd.items[ii]===false? 'style="cursor:pointer;text-decoration:underline dotted;" title="Edit issue details"':'')+'>'+(crit?icon('alertTriangle',13):'')+tx(label)+'</span>'
              + '<div class="chip-toggle"><button class="chip-btn '+(fd.items[ii]===true?'ok-active':'')+'" onclick="setFloorItem(\''+f+'\','+ii+',true)" aria-label="'+esc(label)+' — mark OK" aria-pressed="'+(fd.items[ii]===true)+'">'+icon('check',16)+'</button><button class="chip-btn '+(fd.items[ii]===false?'notok-active':'')+'" onclick="setFloorItem(\''+f+'\','+ii+',false)" aria-label="'+esc(label)+' — mark issue" aria-pressed="'+(fd.items[ii]===false)+'">'+icon('x',16)+'</button></div></div>';
          }).join('')
        + '</div>'
        + '<div class="field remarks-row"><label class="field-label">'+T('field_remarks')+'</label><textarea placeholder="'+T('remarks_placeholder')+'" oninput="setFloorRemarks(\''+f+'\',this.value)">'+esc(fd.remarks)+'</textarea></div>'
      + '</div></div>';
  }).join('');

  const addHtml = def.additional.map((label,ai)=>{
    const item = draft.additionalData[ai];
    return '<div class="item-row"><span class="item-name">'+tx(label)+'</span><div class="toggle-pair">'
      + '<button class="toggle-btn '+(item.status===true?'ok-active':'')+'" onclick="setAdditional('+ai+',true)">'+T('btn_ok')+'</button>'
      + '<button class="toggle-btn '+(item.status===false?'notok-active':'')+'" onclick="setAdditional('+ai+',false)">'+T('btn_issue')+'</button>'
      + '</div></div>';
  }).join('');

  return '<span class="section-label">'+icon('clipboard',14)+' '+T('label_floorwise_checklist')+'</span>'
    + autoAdvRow + floorsHtml
    + '<div class="card"><span class="section-label">'+T('label_additional_inspection')+'</span>'+addHtml+'</div>'
    + signatureBlock();
}
function toggleFloor(f){ state.draft._openFloor = (state.draft._openFloor===f)? null : f; render(); }
function setFloorItem(f,ii,val){
  const fd = state.draft.floorData[f];
  fd.items[ii] = fd.items[ii]===val ? null : val;
  if(fd.items[ii]===false){ reopenFloorIssue(f, ii); return; }
  maybeAdvanceFloor(f);
  render();
}
// After any single item on a floor gets its final value — whether marked
// OK directly here, or an issue confirmed via the popup in saveIssuePopup()
// — check whether that was the floor's last remaining item and, if
// Auto-advance is on, move to the next floor. Mirrors markFloorAllOk()'s
// own advance step below, so the toggle's promise ("auto-advance to next
// floor after all items checked") holds true no matter how the floor got
// completed — including the common case of tapping through items one at a
// time on a floor that has a real issue on it, where the bulk "Mark all
// OK" button isn't usable in the first place.
function maybeAdvanceFloor(f){
  const draft = state.draft;
  if(!draft || draft.formType!=='daily-tower' || !draft._autoAdvance) return;
  if(draft._openFloor !== f) return; // already moved on, or not the active floor
  const fd = draft.floorData[f];
  if(!fd || fd.items.some(v=>v===null)) return; // not complete yet
  const def = SECTION_DEFS['daily-tower'];
  const idx = def.floors.indexOf(f);
  const next = def.floors[idx+1];
  draft._openFloor = next || null;
  if(next) showToast(f+' floor done — moved to '+next);
}
function reopenFloorIssue(f, ii){
  const def = SECTION_DEFS['daily-tower'];
  openIssuePopup(f+'_'+ii, def.floorItems[ii], def.floorItems[ii]+' — '+f+' Floor', {type:'floor', f:f});
}
function markFloorAllOk(f){
  const fd = state.draft.floorData[f];
  const hasExisting = fd.items.some(v=>v!==null);
  const doIt = ()=>{
    fd.items = fd.items.map(()=>true);
    if(state.draft._autoAdvance){
      const def = SECTION_DEFS['daily-tower'];
      const idx = def.floors.indexOf(f);
      const next = def.floors[idx+1];
      state.draft._openFloor = next || null;
      showToast(next ? (f+' floor done — moved to '+next) : 'All floors marked OK — last floor reached');
    } else {
      showToast('All items marked OK for '+f+' floor');
    }
    render();
  };
  if(hasExisting){
    askConfirm({
      title:'Overwrite '+f+' floor?',
      message:'This will mark every item on this floor as OK, including any issues already flagged. This can\'t be undone.',
      confirmLabel:'Mark all OK',
      danger:true,
      onConfirm: doIt
    });
  } else {
    doIt();
  }
}
function copyPrevFloor(f){
  const def = SECTION_DEFS['daily-tower'];
  const idx = def.floors.indexOf(f);
  if(idx<=0){ showToast('No previous floor'); return; }
  const prev = def.floors[idx-1];
  const src = state.draft.floorData[prev];
  state.draft.floorData[f].items = [...src.items];
  render(); showToast('Copied from '+prev+' floor');
}
function setFloorRemarks(f,val){ state.draft.floorData[f].remarks = val; }
function setAdditional(ai,val){

/* =========================================================
   WEATHER AMBIENCE — a light rain animation auto-shows on the
   home hero during monsoon months (no admin action needed), and
   an admin can escalate to Heavy Rain / Storm Warning from
   Settings when a real alert is issued — that also posts a home
   banner, since a signal residents can miss (motion) should never
   be the *only* way critical info is conveyed. Cleared automatically
   never happens on its own — an admin sets it back to Normal — since
   an auto-expiring warning could silently understate real weather.
   Stored shared (storeSet/storeGet) like AUTO_ASSIGN above, so every
   device shows the same state. */
const MONSOON_MONTHS = [6,7,8,9]; // Jun–Sep — adjust for your region if needed
function isMonsoonSeason(d){
  const m = (d||new Date()).getMonth()+1;
  return MONSOON_MONTHS.includes(m);
}
const WEATHER_ALERT_LEVELS = {
  'heavy-rain': {label:'Heavy Rain Alert', badge:'Heavy rain', icon:'waterDrop', bannerCls:'warn',
    bannerTitle:'Heavy rain alert — active', bannerSub:'Check terrace/basement drainage and clear roof outlets before it worsens.'},
  'storm': {label:'Storm Warning', badge:'Storm warning', icon:'flame', bannerCls:'danger',
    bannerTitle:'Storm warning — active', bannerSub:'Secure loose items, check drainage & emergency lighting, and review tree/boundary safety.'}
};
let WEATHER_ALERT = null; // null | 'heavy-rain' | 'storm' — loaded from settings:weatherAlert, admin-set
async function loadWeatherAlert(){
  try{ const r = await storeGet('settings:weatherAlert'); WEATHER_ALERT = (r && r.level) || null; }catch(e){ WEATHER_ALERT = null; }
}
async function setWeatherAlert(level){
  level = level || null;
  WEATHER_ALERT = level;

/* Effective state driving both the hero animation and the home banner.
   Admin override always wins over the season guess. */
function getWeatherState(){
  if(WEATHER_ALERT) return WEATHER_ALERT;
  return isMonsoonSeason() ? 'monsoon' : 'clear';
}
function weatherLayer(){
  const ws = getWeatherState();
  if(ws==='clear') return '';
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return '';
  const isStorm = ws==='storm';
  const isHeavy = ws==='heavy-rain';
  const cls = isStorm ? 'storm' : isHeavy ? 'heavy' : 'light';
  const count = isStorm ? 32 : isHeavy ? 24 : 14;
  let drops = '';
  for(let i=0;i<count;i++){
    const left = (Math.random()*100).toFixed(1);
    const dur = (isStorm ? (0.5+Math.random()*0.3) : isHeavy ? (0.75+Math.random()*0.35) : (1.1+Math.random()*0.7)).toFixed(2);
    const delay = (Math.random()*2.5).toFixed(2);
    drops += '<span class="rain-drop" style="left:'+left+'%;animation-duration:'+dur+'s;animation-delay:-'+delay+'s;"></span>';
  }
  const badge = (ws==='monsoon')
    ? '<div class="weather-badge">'+icon('waterDrop',11)+' Monsoon</div>'
    : '<div class="weather-badge">'+icon(WEATHER_ALERT_LEVELS[ws].icon,11)+' '+WEATHER_ALERT_LEVELS[ws].badge+'</div>';
  return '<div class="weather-layer '+cls+'" aria-hidden="true">'+drops+'</div>'+badge;
}

function allAssignablePeople(){
  const seen = new Set();

  (DB.members||[]).forEach(m=>{ if(m.name && !seen.has(m.name)){ seen.add(m.name); out.push({name:m.name, role:m.role, trade:''}); } });

}

// Keeps /assignments/{defectId} in sync with a defect's assignedTo name —
// this is the whole reason a worker's Firestore rules can enforce "only
// defects assigned to you" without being able to peek inside the defect's
// own (opaque, JSON-string) record to check that field directly. Runs
// automatically from storeSet() for every defect save, so no individual
// assignment UI needs to remember to call this itself.
async function syncDefectAssignment(key, defect){
  const db = await initFirebase();
  if(!db) return;
  const uid = resolveWorkerUidByName(defect && defect.assignedTo);
  try{
    if(uid){
      await fbWithTimeout(db.collection('assignments').doc(key).set({assignedToUid: uid, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}));
    } else {
      await fbWithTimeout(db.collection('assignments').doc(key).delete());
    }
  }catch(e){ console.error('assignment sync failed', e); }
}

/* =========================================================
   OFFLINE SMART AI ASSISTANT
   This is intentionally local/rule-based: no extension, no API key,
   no internet call. It can later be swapped to a backend AI endpoint.
========================================================= */
const AI_RULES = [
  {re:/fire|smoke|extinguisher|alarm|hydrant|sprinkler/i, tags:['Fire Hazard'], priority:'high', vendor:'fire safety vendor', action:'Treat as urgent. Barricade the area if needed and inform security/admin immediately.'},
  {re:/electric|wire|spark|shock|panel|mcb|light|tube|cable|short/i, tags:['Electrical Hazard'], priority:'high', vendor:'electrician', action:'Switch off the affected circuit if safe, mark the area, and call the electrician.'},
  {re:/leak|seep|water|drain|pipe|pump|overflow|moisture|damp/i, tags:['Equipment Damage','Slip/Spill Risk'], priority:'medium', vendor:'plumber', action:'Trace the source, keep the floor dry, and ask plumbing/maintenance to inspect.'},
  {re:/crack|broken|railing|tile|wall|ceiling|glass|structural|loose|damage/i, tags:['Structural/Safety'], priority:'high', vendor:'maintenance vendor', action:'Restrict access near the damaged area and schedule repair with before/after photos.'},
  {re:/slip|spill|oil|grease|wet|mud/i, tags:['Slip/Spill Risk'], priority:'medium', vendor:'housekeeping', action:'Clean immediately, put warning signage, and verify the surface is dry.'},
  {re:/garbage|dust|dirty|stain|smell|odour|odor|pest|clean|litter/i, tags:['Cleanliness'], priority:'low', vendor:'housekeeping', action:'Assign housekeeping and recheck after cleaning.'},
  {re:/lift|motor|camera|cctv|gate|boom|rfid|dg|transformer|equipment/i, tags:['Equipment Damage'], priority:'medium', vendor:'AMC/vendor', action:'Log with the relevant AMC vendor and monitor until restored.'}
];
// Each rule's keyword list is derived straight from its own regex source
// (e.g. "fire|smoke|extinguisher") so there is exactly one place to edit
// a rule's vocabulary — the regex above — and the fuzzy matcher below
// always stays in sync with it.
AI_RULES.forEach(r=>{ r.words = r.re.source.split('|'); });

/* ---- lightweight fuzzy matching (typo-tolerant AI_RULES lookup) ----
   Ground staff typing on a phone routinely mistype keywords ("garbge",
   "dustt"). A strict regex like /garbage|dust/i would simply miss those
   and the issue would fall through to a generic/low-priority bucket.
   Instead of hand-rolling a fuzzy list per rule, we reuse each rule's
   existing regex vocabulary (see r.words above) and additionally accept
   any typed word that's "close enough" (small Levenshtein edit distance)
   to one of those keywords. This is intentionally simple — no library,
   no network call — in keeping with this assistant being fully offline. */
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(!m) return n;
  if(!n) return m;
  let prev = new Array(n+1);
  for(let j=0; j<=n; j++) prev[j] = j;
  for(let i=1; i<=m; i++){
    const cur = [i];
    for(let j=1; j<=n; j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    prev = cur;
  }
  return prev[n];
}
// Short keywords ("dust") tolerate 1 typo'd letter; longer ones ("extinguisher")
// tolerate 2 — a fixed tolerance would be too strict on long words and too
// loose on short ones (e.g. "gate" vs "late" is 1 typo but a different word).
function fuzzyTolerance(len){ return len<=5 ? 1 : 2; }
function tokenizeWords(text){ return (text||'').toLowerCase().split(/[^a-z]+/).filter(Boolean); }
function ruleFuzzyHit(tokens, words){
  for(const w of words){
    if(!w || w.length<3) continue; // too short to fuzzy-match reliably
    const tol = fuzzyTolerance(w.length);
    for(const t of tokens){
      if(Math.abs(t.length - w.length) > tol) continue; // cheap pre-filter
      if(t[0] !== w[0]) continue; // typos almost never change the first letter (avoids e.g. "late" matching "gate")
      if(t===w || levenshtein(t, w) <= tol) return true;
    }
  }
  return false;
}
function aiUnique(arr){ return [...new Set((arr||[]).filter(Boolean))]; }
function aiTextParts(ctx){ return [ctx.label, ctx.location, ctx.observation].filter(Boolean).join(' - '); }
function aiAnalyzeIssue(ctx){
  const text = aiTextParts(ctx);
  const tokens = tokenizeWords(text);
  const hits = AI_RULES.filter(r=> r.re.test(text) || ruleFuzzyHit(tokens, r.words));
  let tags = aiUnique(hits.flatMap(h=>h.tags));
  if(ctx.existingTags && ctx.existingTags.length) tags = aiUnique(tags.concat(ctx.existingTags));
  if(!tags.length) tags = ['Other'];
  let priority = (hits.find(h=>h.priority==='high') || hits.find(h=>h.priority==='medium') || hits[0] || {}).priority || ctx.priority || 'medium';
  if(ctx.hasPhoto && priority==='low') priority = 'medium';
  if(isRecurringLocation(ctx.location||'') && priority!=='high') priority = bumpPriority(priority);
  const vendor = (hits[0] && hits[0].vendor) || 'maintenance team';
  const action = (hits[0] && hits[0].action) || 'Assign to the maintenance team, add a clear photo, and verify after completion.';
  const assignee = autoAssignFor(tags) || ctx.assignedTo || '';
  const observation = (ctx.observation || suggestDefectText(ctx.label || ctx.location || 'Issue')).trim();
  const cleanObservation = observation.length > 8 ? observation : ((ctx.label||'Issue')+' observed at '+(ctx.location||'site')+'.');
  const whatsapp = 'Max Heights Majestic - issue reported\nLocation: '+(ctx.location||'Not specified')+'\nPriority: '+priority.toUpperCase()+'\nTags: '+tags.join(', ')+'\nAction: '+action;
  return {priority, tags, vendor, action, assignee, observation:cleanObservation, whatsapp};
}

function openIssuePopup(stableId, label, location, writeBack){
  const draft = state.draft;
  if(!draft) return;
  draft.defectMeta = draft.defectMeta || {};
  const meta = draft.defectMeta[stableId] || {};
  const crit = isCritical(label);
  let existingRemarks = '';
  if(writeBack && writeBack.type==='section'){
    existingRemarks = draft.sectionData[writeBack.key][writeBack.ii].remarks || '';
  }
  const basePriority = crit ? 'high' : 'medium';
  state._issuePopup = {stableId:stableId, label:label, location:location, writeBack:writeBack||null};
  state._issueAi = null;
  state._issueDraft = {
    observation: meta.observation || existingRemarks || '',
    priority: meta.priority || (isRecurringLocation(location) ? bumpPriority(basePriority) : basePriority),
    tags: (meta.tags || (writeBack && writeBack.type==='section' ? (draft.sectionData[writeBack.key][writeBack.ii].tags||[]) : [])).slice(),
    photos: (meta.photos || (meta.photo ? [meta.photo] : [])).slice(),
    media: (meta.media || []).slice(),
    assignedTo: meta.assignedTo || ''
  };
  const _ac={label:label,location:location,observation:state._issueDraft.observation,
    priority:state._issueDraft.priority,existingTags:state._issueDraft.tags,hasPhoto:false};
  state._issueAi=aiAnalyzeIssue(_ac);
  if(!state._issueDraft.tags.length)state._issueDraft.tags=state._issueAi.tags.slice();
  if(state._issueAi.priority==='high')state._issueDraft.priority='high';
  render();
}
function issueSnapshotObs(){
  const el = document.getElementById('ipObs');
  if(el && state._issueDraft) state._issueDraft.observation = el.value;
}
function saveIssuePopup(){
  const p = state._issuePopup, d = state._issueDraft, draft = state.draft;
  if(!p || !draft){ state._issuePopup=null; state._issueDraft=null; render(); return; }
  issueSnapshotObs();
  // Final auto-analysis against whatever was actually typed/photographed —
  // this is the only place priority/tags get decided; there's no manual
  // picker for the person filling the form to press or fiddle with.
  const finalAi = aiAnalyzeIssue({label:p.label, location:p.location, observation:d.observation, hasPhoto:(d.photos&&d.photos.length>0)});
  d.tags = finalAi.tags.slice();
  d.priority = isCritical(p.label) ? 'high' : finalAi.priority;
  if(!d.assignedTo && finalAi.assignee) d.assignedTo = finalAi.assignee;
  /* Auto-tag Recurring if same location had issues before */
  if(p.location && isRecurringLocation(p.location) && !d.tags.includes('Recurring')){
    d.tags = ['Recurring',...d.tags];
    if(d.priority==='low') d.priority = 'medium';
  }
  draft.defectMeta[p.stableId] = {
    observation: d.observation, priority: d.priority, tags: d.tags.slice(),
    photos: d.photos.slice(), photo: d.photos[0] || null, media: (d.media||[]).slice(),
    assignedTo: d.assignedTo || autoAssignFor(d.tags)
  };
  if(p.writeBack && p.writeBack.type==='section'){
    const row = draft.sectionData[p.writeBack.key][p.writeBack.ii];
    row.remarks = d.observation;
    row.tags = d.tags.slice();
    row.flagged = true;
  }
  if(p.writeBack && p.writeBack.type==='floor'){
    maybeAdvanceFloor(p.writeBack.f);
  }
  state._issuePopup = null; state._issueDraft = null;
  render();
  showToast('Issue saved — it will be logged as a defect on submit');
}

async function analyzePhotoWithClaude(dataUrl){
  const apiKey=CLAUDE_API_KEY;
  if(!apiKey){showToast('Settings mein Claude API key daalo pehle');return null;}
  const b64=dataUrl.split(',')[1];
  const mt=dataUrl.startsWith('data:image/png')?'image/png':'image/jpeg';
  showToast('AI photo analyze kar raha hai...');
  try{
    const res=await Promise.race([
      fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,
          'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:180,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:'Housing society maintenance assistant. Describe this maintenance issue in ONE short English sentence (max 20 words). Be specific: exact problem + location clue. No intro text.'}
        ]}]})
      }),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
    ]);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error((e.error&&e.error.message)||'API '+res.status);}
    const data=await res.json();
    const t=(data.content||[]).find(b=>b.type==='text');
    return t?t.text.trim():null;
  }catch(e){showToast('AI error: '+e.message.slice(0,50));return null;}
}

let LAST_SCROLLED_FLOOR = null;

/* Count-up animation for dashboard/home stat numbers. Only animates values
   that are plain integers (optionally with a trailing '%'); anything else
   (e.g. "2.3 days" for MTTR) is left as static text since counting it up
   wouldn't make sense. Respects prefers-reduced-motion. */
function animateStatNums(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.stat-num').forEach((el)=>{
    if(el.dataset.animated) return;
    const raw = el.textContent.trim();
    const m = raw.match(/^(\d+)(%?)$/);
    if(!m) return;
    const target = parseInt(m[1], 10);
    const suffix = m[2] || '';
    if(!isFinite(target) || target === 0){ el.dataset.animated = '1'; return; }
    el.dataset.animated = '1';
    const dur = 600;
    const start = performance.now();
    function tick(now){
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
      el.textContent = Math.round(target * eased) + suffix;
      if(p < 1) requestAnimationFrame(tick);
      else el.textContent = target + suffix;
    }
    requestAnimationFrame(tick);
  });
}
/* Material-style button ripple: delegated so it also covers buttons that
   get re-created on every render() call. */
document.addEventListener('click', function(e){
  const btn = e.target.closest('.btn');
  if(!btn || btn.disabled) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = ((e.clientX ?? rect.left + rect.width/2) - rect.left - size/2) + 'px';
  ripple.style.top = ((e.clientY ?? rect.top + rect.height/2) - rect.top - size/2) + 'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', ()=> ripple.remove());
});

function collectDraftStats(draft){
  const def = SECTION_DEFS[draft.formType] || {floors:[], sections:{}};
  let ok=0, notOk=0, unset=0;
  const tally = v=>{ if(v===true)ok++; else if(v===false)notOk++; else unset++; };
  if(draft.formType==='daily-tower'){
    (def.floors||[]).forEach(f=>{ const fd=(draft.floorData||{})[f]; ((fd&&fd.items)||[]).forEach(tally); });
    (draft.additionalData||[]).forEach(a=> tally(a.status));
  } else {
    Object.keys(def.sections||{}).forEach(k=> (((draft.sectionData||{})[k])||[]).forEach(r=> tally(r.status)));
  }
  return {ok, notOk, unset};
}

function gatherFlaggedDefects(draft){
  const def = SECTION_DEFS[draft.formType];
  const out = [];
  const meta = draft.defectMeta || {};
  function push(stableId, location, observation, baseTags, defaultPriority){
    const m = meta[stableId] || {};
    const recurring = isRecurringLocation(location);
    const obsText = m.observation || observation || '';
    const photos = (m.photos || (m.photo ? [m.photo] : [])).slice();
    let priority, tags;
    if(m.priority && m.tags){
      // Already decided by AI when this issue was logged via the Issue Popup.
      priority = m.priority;
      tags = m.tags;
    } else {
      // Flagged without going through the Issue Popup (e.g. Skip was
      // tapped) — AI decides from whatever text/photo is available, same
      // as everywhere else. No manual picker here either.
      const ai = aiAnalyzeIssue({label:location, location:location, observation:obsText, existingTags:baseTags, hasPhoto:photos.length>0});
      priority = defaultPriority==='high' ? 'high' : ai.priority;
      tags = ai.tags;
    }
    if(recurring && !tags.includes('Recurring')){
      // Priority is already adjusted for recurring locations inside
      // aiAnalyzeIssue() (or, for the pre-set branch, inside
      // saveIssuePopup() at the time it was logged) — bumping again here
      // would double-count it. Just make sure the tag is present.
      tags = tags.concat('Recurring');
    }
    out.push({
      stableId, location, recurring,
      observation: obsText || 'Marked not OK during inspection.',
      priority, tags, photos, photo: photos[0] || null, media: (m.media||[]).slice(),
      assignedTo: m.assignedTo || autoAssignFor(tags)
    });
  }
  if(draft.formType!=='daily-tower'){
    Object.entries(def.sections).forEach(([key,sec])=>{
      draft.sectionData[key].forEach((row,ii)=>{
        if(row.status===false && row.flagged){
          push(key+'_'+ii, sec.items[ii] + ' — ' + sec.title, row.remarks, row.tags, isCritical(sec.items[ii])?'high':'medium');
        }
      });
    });
  } else {
    def.floors.forEach(f=>{
      draft.floorData[f].items.forEach((v,ii)=>{
        if(v===false) push(f+'_'+ii, def.floorItems[ii]+' — '+f+' Floor', draft.floorData[f].remarks, null, isCritical(def.floorItems[ii])?'high':'medium');
      });
    });
    draft.additionalData.forEach((a,ai)=>{
      if(a.status===false) push('add_'+ai, def.additional[ai], null, null, 'medium');
    });
  }
  return out;
}

function compressImage(file, maxWidth, quality, watermarkLabel){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = reject;
      img.onload = ()=>{
        const scale = Math.min(1, maxWidth/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        if(watermarkLabel) drawPhotoWatermark(ctx, canvas.width, canvas.height, watermarkLabel);
        // Prefer WebP — a representative test photo came out roughly 60%
        // smaller than JPEG at the same resolution/quality, which is what
        // lets us afford noticeably more resolution (better for reading
        // fine detail like a hairline crack or wiring colours) at a
        // similar or smaller file size than before. Per spec, a browser
        // that can't encode to a requested type must silently substitute
        // PNG instead of erroring — detect that (PNG here would be much
        // BIGGER than JPEG, since it's lossless) and use JPEG instead.
        let out = canvas.toDataURL('image/webp', quality);
        if(!out.startsWith('data:image/webp')) out = canvas.toDataURL('image/jpeg', quality);
        resolve(out);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
// Stamps a small, legible date/time + who-attached-it label directly into
// a photo's own pixels (not EXIF — this app's canvas re-encoding strips
// that anyway, and EXIF is trivial for anyone to edit regardless). Worth
// being honest about what this is and isn't: it's a lightweight, visible
// reference — useful when scanning through photos later — but it records
// when the photo was ATTACHED here, not when it was actually taken, so on
// its own it can't prove a photo is fresh rather than reused. The
// capture="environment" hint already on every photo input in this app is
// what steers toward the camera over the gallery in the first place;
// this just adds a clear record once something's attached.
function drawPhotoWatermark(ctx, w, h, label){
  const text = label+' · '+new Date().toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  const fontSize = Math.max(14, Math.round(w/32));
  ctx.font = fontSize+'px sans-serif';
  const padX = fontSize*0.6, padY = fontSize*0.5;
  const barHeight = fontSize + padY*2;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, h-barHeight, w, barHeight);
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, padX, h-barHeight/2);
}
// Who to credit in the watermark for whatever's being attached right
// now — the signed-in staff member for every normal flow, or the
// resident's own entered name on the public complaint form (residents
// have no signed-in identity at all).
function watermarkLabelForCurrentContext(){
  if(state.residentMode) return (state._residentDraft && state._residentDraft.rcName) || 'Resident';
  return (state.currentUser && state.currentUser.name) || '';
}

async function submitInspection(){
  if(state._submitting) return;
  const draft = state.draft;

  if(draft.date && draft.date > todayStr()){
    showToast('Inspection date can\'t be in the future — please correct it');
    return;
  }

  if(draft.mobile && !/^[0-9]{10}$/.test(draft.mobile)){
    showToast('Mobile number must be exactly 10 digits (or left blank)');
    return;
  }

  const flaggedNoPhoto = gatherFlaggedDefects(draft).filter(fd=> fd.priority==='high' && !fd.photo);
  if(flaggedNoPhoto.length>0){
    showToast('Add a photo for each High priority issue before submitting ('+flaggedNoPhoto.length+' missing)');
    return;
  }

  state._submitting = true; render();
  draft.submittedAt = new Date().toISOString();
  draft.status = 'submitted';
  const key = 'insp:'+draft.id;
  const clean = JSON.parse(JSON.stringify(draft));
  delete clean._openFloor; delete clean._openSection;
  const ok = await storeSet(key, clean);
  if(!ok){ state._submitting = false; showToast('Failed to save. Try again.'); render(); return; }

  const flagged = gatherFlaggedDefects(draft);
  for(const fd of flagged){
    const defect = {
      id: uid('def'), sourceRecordId: draft.id, formType: draft.formType, tower: draft.tower,
      location: fd.location, observation: fd.observation, priority: fd.priority,
      tags: fd.tags || [], photo: fd.photo || null, photos: fd.photos || [], resolutionPhoto:null, resolutionNote:null,
      media: fd.media || [],
      assignedTo: fd.assignedTo || '', targetDate: '', status: 'open', createdAt: new Date().toISOString(), closedAt: null,
      source: 'inspection', resolvedBy: null, rating: null, review: null, ratedAt: null
    };
    await storeSet('defect:'+defect.id, defect);
  }
  await logAudit('inspection_submitted', SECTION_DEFS[draft.formType].label+' — Tower '+draft.tower+' by '+draft.supervisorName);
  await loadAll();
  state.draft = null;
  state._submitting = false;
  await clearAutosave();
  // One-tap WhatsApp handoff: group the just-logged defects by assigned
  // supervisor and prepare a ready-made message for each. (A browser app
  // can't silently send WhatsApp messages — that needs the WhatsApp
  // Business API on a server — so this opens WhatsApp with the message
  // pre-filled; the person just hits Send.)
  const byAssignee = {};
  flagged.forEach(fd=>{ if(fd.assignedTo){ (byAssignee[fd.assignedTo] = byAssignee[fd.assignedTo] || []).push(fd); } });
  const waGroups = Object.keys(byAssignee).map(name=>{
    const list = byAssignee[name];
    const msg = '🏢 Max Heights Majestic — '+list.length+' issue'+(list.length>1?'s':'')+' assigned to you\n'
      + towerLine(draft.formType, draft.tower)+' · '+fmtDate(draft.date)+'\n'
      + list.map(fd=>'• '+fd.location+' ['+fd.priority.toUpperCase()+']'+(fd.observation?' — '+fd.observation:'')).join('\n')
      + '\nReported by '+(draft.supervisorName||'—')+'. Please update the status in the MHM Inspection app once fixed.';
    return {name:name, mobile: memberMobile(name), count:list.length, msg:msg};
  });
  showToast('Inspection submitted ✓');
  goto('home');
  if(waGroups.length){ state._waShare = waGroups; render(); }
}

async function cycleDefectStatus(id){
  const def = DB.defects.find(x=>x.id===id);
  if(!def) return;
  if(def.status==='open'){
    const prevStatus = def.status;
    def.status = 'in-progress';
    const ok = await storeSet('defect:'+def.id, def);
    if(!ok){ def.status = prevStatus; showToast('Could not update — check your connection and try again'); render(); return; }
    await logAudit('defect_status', def.location+' moved to in-progress');
    render();
    return;
  }
  if(def.status==='in-progress'){
    state._resolveOpen = id;
    render();
    return;
  }
}
function openResolution(){ /* placeholder kept for symmetry */ }
async function saveResolution(id){
  const def = DB.defects.find(x=>x.id===id);
  const afterPhoto = state._resolveAfterPhoto || def.resolutionPhoto;
  const needAfter = def.priority === 'high' || def.priority === 'urgent';
  if(needAfter && !afterPhoto){
    showToast('High priority defect ke liye after photo required hai');
    return;
  }
  const prevStatus = def.status, prevClosedAt = def.closedAt, prevNote = def.resolutionNote,
        prevBy = def.resolvedBy, prevPhoto = def.resolutionPhoto;
  def.status = 'closed';
  def.closedAt = new Date().toISOString();
  def.resolvedBy = state.currentUser ? state.currentUser.name : (state.role==='admin' ? 'Admin' : 'Supervisor');
  def.resolutionNote = document.getElementById('resNote') ? document.getElementById('resNote').value.trim() : '';
  if(afterPhoto) def.resolutionPhoto = afterPhoto;
  const ok = await storeSet('defect:'+def.id, def);
  if(!ok){
    def.status = prevStatus; def.closedAt = prevClosedAt; def.resolutionNote = prevNote;
    def.resolvedBy = prevBy; def.resolutionPhoto = prevPhoto;
    showToast('Could not save — check your connection and try again');
    render(); return;
  }
  await logAudit('defect_resolved', def.location+' marked resolved'+(afterPhoto?' (with after photo)':''));
  state._resolveOpen = null;
  state._resolveAfterPhoto = null;
  render();
  showToast('Defect marked resolved ✓');
}

/* Per-device "already popped up" memory so the same task doesn't
   interrupt the person again on every 45s background sync — it still
   stays visible in the persistent task list until marked done. */
async function getSeenTaskIds(){
  const v = await storeGetPersonal('seenTaskPopups');
  return Array.isArray(v) ? v : [];
}
async function markTaskPopupSeen(id){
  const seen = await getSeenTaskIds();
  if(!seen.includes(id)){ seen.push(id); await storeSetPersonal('seenTaskPopups', seen); }
}
async function checkForTaskPopup(){
  if(state.role!=='supervisor') return;
  if(state._taskPopup || state.showPinModal || state._newTaskOpen) return; // don't stack modals
  const pending = DB.tasks.filter(t=>t.status==='pending');
  if(!pending.length) return;
  const seen = await getSeenTaskIds();
  const unseen = pending.find(t=>!seen.includes(t.id));
  if(unseen){
    state._taskPopup = unseen.id;
    await markTaskPopupSeen(unseen.id);
    renderModalLayer();
  }
}

    + '<div class="field search-field" style="margin-bottom:0;"><input type="text" id="defSearchInput" placeholder="'+T('defects_search_placeholder')+'" value="'+esc(f.q)+'" oninput="handleDefSearch(this.value)">'+(f.q? '<button type="button" class="search-clear-btn" title="Clear search" onclick="document.getElementById(\'defSearchInput\').value=\'\'; state.defFilter.q=\'\'; render();">'+icon('x',14)+'</button>' : '')+'</div>'
    + '<div class="filter-bar">'+['open','in-progress','closed','overdue'].map(s=>'<button class="filter-chip '+(f.status===s?'active':'')+'" onclick="state.defFilter.status=\''+s+'\'; render()">'+T(statusLabelKey[s])+' <span class="chip-count">'+(s==='overdue'?overdueCount:(statusCounts[s]||0))+'</span></button>').join('')+'</div>'
    + '<div class="filter-bar">'+['all','high','medium','low'].map(p=>'<button class="filter-chip '+(f.priority===p?'active':'')+'" onclick="state.defFilter.priority=\''+p+'\'; render()">'+T(priorityLabelKey[p])+' <span class="chip-count">'+(priorityCounts[p]||0)+'</span></button>').join('')+'</div>'

async function saveDefectEdit(id){
  const def = DB.defects.find(x=>x.id===id);
  const prev = {assignedTo:def.assignedTo, targetDate:def.targetDate, priority:def.priority};
  const assignEl = document.getElementById('edAssign'), targetEl = document.getElementById('edTarget'), priorityEl = document.getElementById('edPriority');
  if(assignEl) def.assignedTo = assignEl.value;
  if(targetEl) def.targetDate = targetEl.value;
  if(priorityEl) def.priority = priorityEl.value;
  const pnEl = document.getElementById('edProgressNote');
  if(pnEl && pnEl.value.trim()) def.progressNote = pnEl.value.trim();
  const ok = await storeSet('defect:'+def.id, def);
  if(!ok){ Object.assign(def, prev); showToast('Could not save — check your connection and try again'); render(); return; }
  const changes = [];
  if(prev.assignedTo!==def.assignedTo) changes.push('assignee → '+(def.assignedTo||'—'));
  if(prev.targetDate!==def.targetDate) changes.push('target date → '+(def.targetDate||'—'));
  if(prev.priority!==def.priority) changes.push('priority → '+def.priority);
  await logAudit('defect_edited', def.location+(changes.length? ' — '+changes.join(', ') : ''));
  state._editOpen = null;
  render();
  showToast('Defect updated');
}

function renderModalLayer(){
  const layer = document.getElementById('modalLayer');
  if(state._lightbox){ layer.innerHTML = '<div class="lightbox-overlay" onclick="closeLightbox()"><button class="lightbox-close" onclick="closeLightbox()">✕</button><img src="'+state._lightbox+'" alt="photo"></div>'; return; }
  if(state.showPinModal){ layer.innerHTML = pinModal(); bindPinInputs(); return; }
  if(state._issuePopup){ layer.innerHTML = issuePopupModal(); return; }
  if(state._waShare){ layer.innerHTML = waShareModal(); return; }
  if(state._editOpen){ layer.innerHTML = defectEditModal(state._editOpen); return; }
  if(state._newDefectOpen){ layer.innerHTML = newDefectModal(); return; }
  if(state._resolveOpen){ layer.innerHTML = resolutionModal(state._resolveOpen); return; }
  if(state._userPickerRole){ layer.innerHTML = userPickerModal(state._userPickerRole); return; }
  if(state._newMemberOpen){ layer.innerHTML = newMemberModal(); return; }
  if(state._newStaffOpen){ layer.innerHTML = newStaffAccountModal(); return; }
  if(state._editStaffOpen){ layer.innerHTML = editStaffAccountModal(); return; }
  if(state._newTaskOpen){ layer.innerHTML = newTaskModal(); return; }
  if(state._taskCompleteOpen){ layer.innerHTML = taskCompleteModal(state._taskCompleteOpen); return; }
  if(state._taskPopup){ layer.innerHTML = taskPopupModal(state._taskPopup); return; }
  if(state._newVendorOpen){ layer.innerHTML = newVendorModal(); return; }
  if(state._sosDetail){ const _sd = DB.sos.find(x=>x.id===state._sosDetail); if(_sd){ layer.innerHTML = sosDetailModal(_sd); return; } state._sosDetail = null; }
  if(state._newSosOpen){ layer.innerHTML = newSosModal(); return; }
  if(state._installOpen){ layer.innerHTML = installPromptModal(); return; }
  if(state._confirmOpen){ layer.innerHTML = confirmModal(state._confirmOpen); return; }
  if(state._auditLogOpen){ layer.innerHTML = auditLogModal(); return; }
  if(state._changePasswordOpen){ layer.innerHTML = changePasswordModal(); return; }
  layer.innerHTML = '';
}
function closeModals(){ state.showPinModal=false; state._editOpen=null; state._newDefectOpen=false; state._resolveOpen=null; state._resolveAfterPhoto=null; state._newTaskOpen=false; state._taskCompleteOpen=null; state._taskCompletePhoto=null; state._userPickerRole=null; state._newMemberOpen=null; state._newStaffOpen=null; state._newStaffError=null; state._editStaffOpen=null; state._editStaffError=null; state.pinPurpose=null; state._pendingMemberId=null; state._confirmOpen=null; state._installOpen=false; state._issuePopup=null; state._issueDraft=null; state._issueAi=null; state._waShare=null; state._newVendorOpen=false; state._newSosOpen=false; state._sosMedia=[]; state._sosDetail=null; state._auditLogOpen=false; state._changePasswordOpen=null; state._changePasswordError=null; render(); }

function installPromptModal(){
  const ios = isIOSDevice();
  const inApp = ios && isInAppBrowser();
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeInstallPrompt()"><div class="modal-sheet card">'
    + '<div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;"><div class="tile-icon accent" style="width:42px;height:42px;">'+icon('device-mobile-down',20)+'</div><div><b style="font-size:15px;">Install app</b><div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">Chrome logo ke bina app list me khulega</div></div></div>'
    + (inApp
      ? '<p style="font-size:13px; color:var(--ink-soft); line-height:1.5; margin-top:10px;">Ye link kisi doosre app (WhatsApp/Instagram/Facebook) ke andar khula hai — yahan se install nahi ho sakta. Upar <b>"•••"</b> ya menu button dabao, <b>"Open in Safari"</b> chuno, phir Safari me neeche '+icon('share',13)+' <b>Share</b> → <b>"Add to Home Screen"</b> se install karo.</p>'
      : (ios
        ? '<p style="font-size:13px; color:var(--ink-soft); line-height:1.5; margin-top:10px;">Is iPhone/iPad par install karne ke liye: neeche '+icon('share',13)+' <b>Share</b> button dabao, phir <b>"Add to Home Screen"</b> chuno.</p>'
        : '<p style="font-size:13px; color:var(--ink-soft); line-height:1.5; margin-top:10px;">Is phone par is app ko full app ki tarah install kar sakte hain. Install hone ke baad ye message nahi dikhega.</p>'))
    + '<div class="btn-row" style="margin-top:14px;">'
      + (ios
        ? '<button class="btn btn-primary" onclick="closeInstallPrompt()">Samajh gaya</button>'
        : '<button class="btn btn-ghost" onclick="closeInstallPrompt()">Later</button><button class="btn btn-primary" onclick="triggerPwaInstall()">Install app</button>')
    + '</div>'
    + '</div></div>';
}
/* Generic confirm modal — replaces jarring native confirm() popups.
   Usage: askConfirm({title, message, confirmLabel, danger:true/false, onConfirm: fnName_as_string_or_function}) */
function askConfirm(opts){ state._confirmOpen = opts; render(); }
function confirmModal(opts){
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;"><div class="tile-icon '+(opts.danger?'':'accent')+'" style="width:38px;height:38px;'+(opts.danger?'background:var(--danger-tint); color:var(--danger);':'')+'">'+icon(opts.danger?'alertTriangle':'info',18)+'</div><b style="font-size:15px;">'+esc(opts.title)+'</b></div>'
    + '<p style="font-size:13px; color:var(--ink-soft); line-height:1.5; margin-top:8px;">'+esc(opts.message)+'</p>'
    + '<div class="btn-row" style="margin-top:14px;"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" onclick="runConfirm()">'+esc(opts.confirmLabel||'Confirm')+'</button></div>'
    + '</div></div>';
}
function runConfirm(){
  const opts = state._confirmOpen;
  state._confirmOpen = null;
  if(opts && typeof opts.onConfirm==='function') opts.onConfirm();
}

function pinModal(){
  const pendingMember = DB.members.find(x=>x.id===state._pendingMemberId);
  const titleText = 'PIN for '+(pendingMember?pendingMember.name:'');
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<div style="display:flex; align-items:center; gap:10px; margin-bottom:4px;"><div class="tile-icon accent" style="width:38px;height:38px;">'+icon('lock',18)+'</div><div><b style="font-size:15px;">'+titleText+'</b><div style="font-size:11.5px; color:var(--ink-soft);">Just identifies who\'s filling this in — not a security check.</div></div></div>'
    + '<div class="field" style="margin-top:12px;"><input type="password" inputmode="numeric" id="pinEntry" placeholder="Enter PIN" style="text-align:center; font-size:22px; letter-spacing:.3em;"></div>'
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="submitPin(document.getElementById(\'pinEntry\').value)">Continue</button></div>'
