/* =========================================================
   DASHBOARD VIEW (admin) — with Chart.js (feature-detected;
   falls back to the CSS bar visualizations if the library
   failed to load, e.g. no internet on first run).
========================================================= */
function deltaHtml(cur, prev, inverse){
  if(prev===0 && cur===0) return '<span class="delta flat">— no change</span>';
  if(prev===0) return '<span class="delta up">new this week</span>';
  const pct = Math.round(((cur-prev)/prev)*100);
  if(pct===0) return '<span class="delta flat">— flat vs last week</span>';
  const good = inverse ? pct<0 : pct>0;
  const arrow = pct>0?'↑':'↓';
  return '<span class="delta '+(good?'down':'up')+'">'+arrow+' '+Math.abs(pct)+'% vs last week</span>';
}
let chartInstances = {};
function backupReminderBanner(){
  if(!DB.inspections.length && !DB.defects.length) return '';
  const lastBackup = DB.audit.find(a=>a.action==='backup_exported');
  const daysSince = lastBackup ? Math.floor((Date.now()-new Date(lastBackup.at).getTime())/86400000) : null;
  if(daysSince===null){
    return '<div class="banner warn">'+icon('info',18)+'<div><b>No backup has ever been exported</b>This app has no real server — a backup is the only copy of your data outside this browser. <span onclick="goto(\'settings\')" style="text-decoration:underline;cursor:pointer;">Export one now →</span></div></div>';
  }
  if(daysSince>=7){
    return '<div class="banner warn">'+icon('info',18)+'<div><b>Last backup was '+daysSince+' days ago</b>Consider exporting a fresh backup, especially before clearing or editing data. <span onclick="goto(\'settings\')" style="text-decoration:underline;cursor:pointer;">Export now →</span></div></div>';
  }
  return '';
}
function viewDashboard(){
  const byType = {};
  Object.keys(SECTION_DEFS).forEach(k=> byType[k] = DB.inspections.filter(r=>r.formType===k).length);
  const openDefects = DB.defects.filter(x=>x.status!=='closed');
  const overdue = DB.defects.filter(isOverdue);
  const byPriority = {high:0, medium:0, low:0};
  openDefects.forEach(dd=> byPriority[dd.priority] = (byPriority[dd.priority]||0)+1);

  const towerStats = TOWERS.map(t=>{
    const recs = DB.inspections.filter(r=>r.tower===t);
    const defs = DB.defects.filter(x=>x.tower===t && x.status!=='closed');
    return {tower:t, count:recs.length, open:defs.length};
  }).filter(t=>t.count>0 || t.open>0);

  const locationCounts = {};
  DB.defects.forEach(x=>{ locationCounts[x.location] = (locationCounts[x.location]||0)+1; });
  const topLocations = Object.entries(locationCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const wStart = weekStartKey();
  const wPrevStart = new Date(wStart); wPrevStart.setDate(wPrevStart.getDate()-7);
  const thisWeekSubs = DB.inspections.filter(r=> r.submittedAt && new Date(r.submittedAt) >= wStart).length;
  const lastWeekSubs = DB.inspections.filter(r=> r.submittedAt && new Date(r.submittedAt) >= wPrevStart && new Date(r.submittedAt) < wStart).length;
  const thisWeekNewDefects = DB.defects.filter(x=> x.createdAt && new Date(x.createdAt) >= wStart).length;
  const lastWeekNewDefects = DB.defects.filter(x=> x.createdAt && new Date(x.createdAt) >= wPrevStart && new Date(x.createdAt) < wStart).length;

  const towerIssueCounts = TOWERS.map(t=> ({tower:t, count: DB.defects.filter(x=>x.tower===t).length}));
  // Weekly scorecard per tower
  const weekStart = weekStartKey();
  const towerScorecard = TOWERS.map(t=>{
    const inspThisWeek = DB.inspections.filter(r=> r.tower===t && r.submittedAt && new Date(r.submittedAt)>=weekStart);
    const defectsOpen = DB.defects.filter(d=> d.tower===t && d.status!=='closed').length;
    const defectsClosed = DB.defects.filter(d=> d.tower===t && d.status==='closed').length;
    const totalDef = defectsOpen + defectsClosed;
    const resRate = totalDef ? Math.round(defectsClosed/totalDef*100) : 100;
    return {tower:t, inspCount:inspThisWeek.length, defectsOpen, resRate};
  });
  const maxIssue = Math.max(1, ...towerIssueCounts.map(t=>t.count));

  // staff productivity + scorecard (submissions, avg score, defects raised)
  const staffCounts = {};
  DB.inspections.forEach(r=>{ if(r.supervisorName) staffCounts[r.supervisorName] = (staffCounts[r.supervisorName]||0)+1; });
  const staffList = Object.entries(staffCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const staffScoreAgg = {};
  DB.inspections.forEach(r=>{
    if(!r.supervisorName) return;
    const s = collectDraftStats(r);
    if(!staffScoreAgg[r.supervisorName]) staffScoreAgg[r.supervisorName] = {ok:0, notOk:0};
    staffScoreAgg[r.supervisorName].ok += s.ok;
    staffScoreAgg[r.supervisorName].notOk += s.notOk;
  });
  const staffDefectsRaised = {};
  DB.defects.forEach(x=>{
    if(!x.sourceRecordId) return;
    const rec = DB.inspections.find(r=>r.id===x.sourceRecordId);
    if(rec && rec.supervisorName) staffDefectsRaised[rec.supervisorName] = (staffDefectsRaised[rec.supervisorName]||0)+1;
  });
  const staffScorecard = staffList.map(([name,count])=>{
    const agg = staffScoreAgg[name] || {ok:0, notOk:0};
    const score = agg.ok+agg.notOk>0 ? (agg.ok/(agg.ok+agg.notOk))*100 : 100;
    return {name, submissions:count, score, raised: staffDefectsRaised[name]||0};
  });

  // Mean time to resolve — average time from raised to closed, closed defects only
  const closedDefects = DB.defects.filter(x=>x.status==='closed' && x.closedAt);
  const mttrHours = closedDefects.length
    ? closedDefects.reduce((sum,x)=> sum + (new Date(x.closedAt) - new Date(x.createdAt)), 0) / closedDefects.length / 3600000
    : null;
  const mttrLabel = mttrHours===null ? '—' : (mttrHours>=24 ? (mttrHours/24).toFixed(1)+'d' : Math.round(mttrHours)+'h');

  // Resolution performance — who fixes things, how fast, and how residents rate them
  const resAgg = {};
  closedDefects.forEach(x=>{
    if(!x.resolvedBy) return;
    if(!resAgg[x.resolvedBy]) resAgg[x.resolvedBy] = {n:0, ms:0, rSum:0, rN:0};
    const a = resAgg[x.resolvedBy];
    a.n++; a.ms += Math.max(0, new Date(x.closedAt) - new Date(x.createdAt));
    if(x.rating){ a.rSum += x.rating; a.rN++; }
  });
  const resPerf = Object.keys(resAgg).map(name=>{
    const a = resAgg[name];
    return {name:name, n:a.n, avgH:a.ms/a.n/3600000, avgR: a.rN ? (a.rSum/a.rN) : null};
  }).sort((a,b)=>b.n-a.n).slice(0,8);

  const avgScoreAgg = (()=>{
    let ok=0, notOk=0;
    DB.inspections.forEach(r=>{ const s = collectDraftStats(r); ok+=s.ok; notOk+=s.notOk; });
    return {ok, notOk};
  })();
  const avgScore = (avgScoreAgg.ok+avgScoreAgg.notOk>0) ? (avgScoreAgg.ok/(avgScoreAgg.ok+avgScoreAgg.notOk))*100 : 100;

  const html = '<div class="pageheader"><div><div class="pagetitle">'+icon('barChart',19)+' Dashboard</div><div class="pagesub">Portfolio overview</div></div></div>'
    + backupReminderBanner()
    + '<div class="two-col-desktop">'

      + '<div class="stat-card glass"><div class="stat-card-head"><div class="stat-icon">'+icon('clipboard',16)+'</div></div><div class="stat-num">'+DB.inspections.length+'</div><div class="stat-label">Total Filed</div>'+deltaHtml(thisWeekSubs,lastWeekSubs,false)+'</div>'
      + '<div class="stat-card glass '+(overdue.length?'danger':'ok')+'"><div class="stat-card-head"><div class="stat-icon">'+icon('alertTriangle',16)+'</div></div><div class="stat-num">'+overdue.length+'</div><div class="stat-label">Overdue</div>'+deltaHtml(thisWeekNewDefects,lastWeekNewDefects,true)+'</div>'
      + '<div class="stat-card glass"><div class="stat-card-head"><div class="stat-icon">'+icon('spark',16)+'</div></div><div class="stat-num">'+Math.round(avgScore)+'%</div><div class="stat-label">Avg Housekeeping Score</div></div>'
      + '<div class="stat-card glass"><div class="stat-card-head"><div class="stat-icon">'+icon('refresh',16)+'</div></div><div class="stat-num">'+mttrLabel+'</div><div class="stat-label">Avg Time to Resolve</div></div>'
      + '<div class="stat-card glass warn"><div class="stat-card-head"><div class="stat-icon">'+icon('alertTriangle',16)+'</div></div><div class="stat-num">'+openDefects.length+'</div><div class="stat-label">Open Defects</div></div>'
    + '</div>'
    + '<div class="card"><span class="section-label">'+icon('spark',13)+' Housekeeping Score</span>'
      + '<div style="display:flex; align-items:center; gap:20px; margin-top:10px;">'
      + scoreGauge(avgScore, 92)
      + '<div style="flex:1; display:flex; flex-direction:column; gap:9px;">'
        + '<div style="display:flex; align-items:center; gap:8px;"><span class="audit-dot audit-dot-ok"></span><span style="font-size:12.5px; color:var(--ink-soft); flex:1;">OK items</span><b style="font-family:var(--font-mono); font-size:13px;">'+avgScoreAgg.ok+'</b></div>'
        + '<div style="display:flex; align-items:center; gap:8px;"><span class="audit-dot audit-dot-warn"></span><span style="font-size:12.5px; color:var(--ink-soft); flex:1;">Flagged items</span><b style="font-family:var(--font-mono); font-size:13px;">'+avgScoreAgg.notOk+'</b></div>'

    + '<div class="card"><span class="section-label">'+icon('alertTriangle',13)+' Defects Opened vs Closed</span><div class="chart-box"><canvas id="chartDefectTrend"></canvas></div></div>'

  setTimeout(()=>renderCharts(byType, towerIssueCounts, staffList), 30);
  return html;
}
function renderCharts(byType, towerIssueCounts, staffList){
  if(typeof Chart==='undefined'){
    const note = document.createElement('div');
    note.className='chart-fallback-note';
    note.textContent='Charts need an internet connection to load Chart.js the first time — showing the bar view instead.';
    document.querySelectorAll('.chart-box').forEach(b=>{ if(!b.querySelector('canvas')) return; b.style.display='none'; });
    return;
  }
  document.getElementById('towerHeatFallback').style.display='none';
  Object.values(chartInstances).forEach(c=>{ try{c.destroy();}catch(e){} });
  chartInstances = {};
  const cssVar = n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
  Chart.defaults.color = cssVar('--ink-soft');

  // inspections last 14 days
  const days = [...Array(14)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(13-i)); return localDateKey(d); });
  const counts = days.map(day=> DB.inspections.filter(r=>r.date===day).length);
  const c1 = document.getElementById('chartTrend');
  if(c1) chartInstances.trend = new Chart(c1, {type:'bar', data:{labels:days.map(d=>d.slice(5)), datasets:[{label:'Inspections', data:counts, backgroundColor:cssVar('--accent1'), borderRadius:4}]}, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{precision:0}}}, maintainAspectRatio:false}});

  // defects opened vs closed last 14 days
  const opened = days.map(day=> DB.defects.filter(x=>x.createdAt && localDateKey(x.createdAt)===day).length);
  const closed = days.map(day=> DB.defects.filter(x=>x.closedAt && localDateKey(x.closedAt)===day).length);
  const c2 = document.getElementById('chartDefectTrend');
  if(c2) chartInstances.defectTrend = new Chart(c2, {type:'line', data:{labels:days.map(d=>d.slice(5)), datasets:[
    {label:'Opened', data:opened, borderColor:cssVar('--notok'), backgroundColor:'transparent', tension:.3},
    {label:'Closed', data:closed, borderColor:cssVar('--ok'), backgroundColor:'transparent', tension:.3}
  ]}, options:{maintainAspectRatio:false, scales:{y:{beginAtZero:true, ticks:{precision:0}}}}});

  // tower comparison
  const c3 = document.getElementById('chartTower');
  if(c3) chartInstances.tower = new Chart(c3, {type:'bar', data:{labels:towerIssueCounts.map(t=>'Tower '+t.tower), datasets:[{label:'All-time defects', data:towerIssueCounts.map(t=>t.count), backgroundColor:cssVar('--accent3'), borderRadius:4}]}, options:{indexAxis:'y', plugins:{legend:{display:false}}, maintainAspectRatio:false, scales:{x:{beginAtZero:true, ticks:{precision:0}}}}});

  // staff productivity
  const c4 = document.getElementById('chartStaff');
  if(c4 && staffList.length) chartInstances.staff = new Chart(c4, {type:'bar', data:{labels:staffList.map(s=>s[0]), datasets:[{label:'Inspections filed', data:staffList.map(s=>s[1]), backgroundColor:cssVar('--accent4'), borderRadius:4}]}, options:{indexAxis:'y', plugins:{legend:{display:false}}, maintainAspectRatio:false, scales:{x:{beginAtZero:true, ticks:{precision:0}}}}});
}
/* =========================================================
   REPORT BUILDER (admin) — branded PDF (jsPDF), Excel
   (SheetJS), QR (qrcodejs), and CSV/print fallbacks.
   Every external-library feature is feature-detected; if the
   library didn't load (e.g. no internet the first time), we
   fall back to the built-in browser print or CSV export
   instead of failing silently.
========================================================= */
async function nextReportNumber(){
  const cur = await storeGet('settings:reportCounter');
  const n = (cur && cur.value ? cur.value : 0) + 1;
  await storeSet('settings:reportCounter', {value:n});
  const today = todayStr().replace(/-/g,'');
  return 'MHM-INS-'+today+'-'+String(n).padStart(4,'0');
}
function generateQRDataUrl(text){
  return new Promise((resolve)=>{
    if(typeof QRCode==='undefined'){ resolve(null); return; }
    try{
      const holder = document.createElement('div');
      holder.style.cssText = 'position:fixed; left:-9999px; top:-9999px;';
      document.body.appendChild(holder);
      new QRCode(holder, {text:text, width:120, height:120, correctLevel: QRCode.CorrectLevel.M});
      setTimeout(()=>{
        const canvas = holder.querySelector('canvas');
        const img = holder.querySelector('img');
        let data = null;
        if(canvas) data = canvas.toDataURL('image/png');
        else if(img && img.src) data = img.src;
        document.body.removeChild(holder);
        resolve(data);
      }, 120);
    }catch(e){ resolve(null); }
  });
}

async function generateBrandedPDF(){
  if(typeof window.jspdf==='undefined'){
    showToast('PDF engine unavailable — using browser print instead');
    printConsolidated();
    return;
  }
  const btn = document.getElementById('pdfBtn');
  if(btn) btn.disabled = true;
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 40;
    const reportNo = await nextReportNumber();
    // Optional date range from the report builder
    const rFromEl = document.getElementById('rptFrom'), rToEl = document.getElementById('rptTo');
    const rFrom = rFromEl && rFromEl.value ? rFromEl.value : null;
    const rTo = rToEl && rToEl.value ? rToEl.value : null;
    const inRange = (dateStr)=>{
      if(!dateStr) return !rFrom && !rTo;
      const d = localDateKey(dateStr);
      if(rFrom && d < rFrom) return false;
      if(rTo && d > rTo) return false;
      return true;
    };
    const rangeLabel = (rFrom||rTo) ? ('   ·   Period: '+(rFrom? fmtDate(rFrom):'start')+' — '+(rTo? fmtDate(rTo):'today')) : '';
    // ~90x68pt photo pairs in the defect sections
    function addDefectPhotos(x){
      const before = (x.photos && x.photos[0]) || x.photo;
      if(!before && !x.resolutionPhoto) return;
      const imgW = 90, imgH = 68;
      if(y > pageH-70-imgH-14){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      let xPos = margin;
      try{
        if(before){
          doc.addImage(before, 'JPEG', xPos, y, imgW, imgH);
          doc.setFontSize(7.5); doc.setTextColor(120,128,150);
          doc.text(x.resolutionPhoto? 'Before' : 'Photo', xPos, y+imgH+9);
          xPos += imgW+10;
        }
        if(x.resolutionPhoto){
          doc.addImage(x.resolutionPhoto, 'JPEG', xPos, y, imgW, imgH);
          doc.setFontSize(7.5); doc.setTextColor(120,128,150);
          doc.text('After', xPos, y+imgH+9);
          xPos += imgW+10;
        }
        if(x.photos && x.photos.length>1){
          for(const extra of x.photos.slice(1,3)){
            if(xPos + imgW > pageW-margin) break;
            doc.addImage(extra, 'JPEG', xPos, y, imgW, imgH);
            xPos += imgW+10;
          }
        }
        doc.setFontSize(9); doc.setTextColor(20,27,46);
        y += imgH + 16;
      }catch(e){ doc.setFontSize(9); doc.setTextColor(20,27,46); }
    }

    function header(){
      doc.setFillColor(15,76,76);
      doc.rect(0,0,pageW,64,'F');
      try{ doc.addImage(LOGO_96, 'PNG', margin, 10, 44, 44); }catch(e){}
      doc.setTextColor(255,255,255);
      doc.setFontSize(14); doc.setFont(undefined,'bold');
      doc.text('Max Heights Majestic', margin+56, 30);
      doc.setFontSize(9.5); doc.setFont(undefined,'normal');
      doc.text('Resident Welfare Society — Inspection Report', margin+56, 44);
      doc.setTextColor(20,27,46);
    }
    function footer(pageNum, totalPages){
      doc.setFontSize(8.5); doc.setTextColor(120,128,150);
      doc.text('Report '+reportNo, margin, pageH-20);
      doc.text('Page '+pageNum+' of '+totalPages, pageW-margin-70, pageH-20);
      doc.setTextColor(20,27,46);
    }

    let y = 90;
    header();
    doc.setFontSize(11); doc.setFont(undefined,'bold');
    doc.text('Report No: '+reportNo, margin, y); y+=14;
    doc.setFont(undefined,'normal'); doc.setFontSize(9.5);
    doc.text('Generated: '+fmtDateTime(new Date().toISOString())+rangeLabel+'   ·   Inspections: '+DB.inspections.filter(r=>inRange(r.date)).length+'   ·   Open Defects: '+DB.defects.filter(x=>x.status!=='closed' && inRange(x.createdAt)).length, margin, y); y+=22;

    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Inspection Submissions', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    let pageNum = 1;
    const rowsA = DB.inspections.filter(r=> inRange(r.date)).slice(0,200);
    for(const r of rowsA){
      const s = collectDraftStats(r);
      const line = fmtDate(r.date)+'  ·  '+SECTION_DEFS[r.formType].label+'  ·  '+towerLine(r.formType, r.tower)+'  ·  '+(r.supervisorName||'—')+'  ·  '+s.ok+' OK / '+s.notOk+' issues';
      if(y > pageH-70){ footer(pageNum, '~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(line, margin, y); y+=13;
    }
    y+=10;
    if(y > pageH-120){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Open Defects', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    const rowsB = DB.defects.filter(x=>x.status!=='closed' && inRange(x.createdAt));
    if(!rowsB.length){ doc.text('No open defects at time of report.', margin, y); y+=13; }
    for(const x of rowsB){
      const tag = isBreach(x) ? ' [CRITICAL BREACH]' : (isOverdue(x) ? ' [OVERDUE]' : '');
      const who = x.assignedTo ? '  ·  Assigned: '+x.assignedTo : '';
      const src2 = x.source==='resident' ? 'Resident complaint'+(x.flat? ' (Flat '+x.flat+')' : '') : 'Tower '+x.tower;
      const lines = doc.splitTextToSize('['+x.priority.toUpperCase()+'] '+src2+' — '+x.location+' — '+(x.observation||'')+tag+who, pageW-margin*2);
      if(y > pageH-70){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(lines, margin, y); y += lines.length*12 + 4;
      addDefectPhotos(x);
    }

    // Resolved defects — with exact resolution time, duration and resident rating
    y+=10;
    if(y > pageH-120){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Resolved Defects', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    const rowsC = DB.defects.filter(x=>x.status==='closed' && inRange(x.closedAt)).sort((a,b)=>(b.closedAt||'').localeCompare(a.closedAt||'')).slice(0,150);
    if(!rowsC.length){ doc.text('No resolved defects yet.', margin, y); y+=13; }
    for(const x of rowsC){
      const src2 = x.source==='resident' ? 'Resident complaint'+(x.flat? ' (Flat '+x.flat+')' : '') : 'Tower '+x.tower;
      const ratingTxt = x.rating ? ('  ·  Resident rating: '+x.rating+'/5'+(x.review? ' — "'+x.review+'"' : '')) : '';
      const lines = doc.splitTextToSize('[RESOLVED '+fmtDateTime(x.closedAt)+resolutionDurationText(x)+'] '+src2+' — '+x.location+' — '+(x.observation||'')+(x.resolutionNote? '  ·  Fix: '+x.resolutionNote : '')+(x.resolvedBy? '  ·  By: '+x.resolvedBy : '')+ratingTxt, pageW-margin*2);
      if(y > pageH-70){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(lines, margin, y); y += lines.length*12 + 4;
      addDefectPhotos(x);
    }
    const total = doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){ doc.setPage(p); doc.setFontSize(8.5); doc.setTextColor(120,128,150); doc.text('Report '+reportNo, margin, pageH-20); doc.text('Page '+p+' of '+total, pageW-margin-70, pageH-20); }

    doc.save(reportNo+'.pdf');
    await logAudit('report_generated', 'PDF report '+reportNo);
    showToast('PDF downloaded');
  }catch(e){
    console.error(e);
    showToast('PDF generation failed — using print fallback');
    printConsolidated();
  }
  if(btn) btn.disabled = false;
}

async function generateMonthlySummaryPDF(){
  const monthStr = (document.getElementById('msMonth') && document.getElementById('msMonth').value) || todayStr().slice(0,7);
  const mStart = new Date(monthStr+'-01T00:00:00');
  const mEnd = new Date(mStart); mEnd.setMonth(mEnd.getMonth()+1);
  const inMonth = (iso)=> iso && new Date(iso) >= mStart && new Date(iso) < mEnd;
  const monthLabel = mStart.toLocaleDateString('en-IN',{month:'long', year:'numeric'});

  const insp = DB.inspections.filter(r=> inMonth(r.submittedAt));
  const byType = {};
  insp.forEach(r=>{ const l = SECTION_DEFS[r.formType] ? SECTION_DEFS[r.formType].label : r.formType; byType[l] = (byType[l]||0)+1; });
  const raised = DB.defects.filter(x=> inMonth(x.createdAt));
  const resolved = DB.defects.filter(x=> x.status==='closed' && inMonth(x.closedAt));
  const stillOpen = DB.defects.filter(x=> x.status!=='closed');
  const resComplaints = raised.filter(x=> x.source==='resident');
  const avgH = resolved.length ? resolved.reduce((s,x)=> s + Math.max(0, new Date(x.closedAt)-new Date(x.createdAt)), 0)/resolved.length/3600000 : null;
  const ratedInMonth = DB.defects.filter(x=> x.rating && inMonth(x.ratedAt));
  const avgRating = ratedInMonth.length ? ratedInMonth.reduce((s,x)=>s+x.rating,0)/ratedInMonth.length : null;
  const locCounts = {};
  raised.forEach(x=>{ locCounts[x.location] = (locCounts[x.location]||0)+1; });
  const hotspots = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const perf = {};
  resolved.forEach(x=>{
    if(!x.resolvedBy) return;
    if(!perf[x.resolvedBy]) perf[x.resolvedBy] = {n:0, ms:0, rSum:0, rN:0};
    perf[x.resolvedBy].n++; perf[x.resolvedBy].ms += Math.max(0, new Date(x.closedAt)-new Date(x.createdAt));
    if(x.rating){ perf[x.resolvedBy].rSum += x.rating; perf[x.resolvedBy].rN++; }
  });
  const perfRows = Object.keys(perf).map(n=>{ const a=perf[n]; return {name:n, n:a.n, avgH:a.ms/a.n/3600000, avgR:a.rN? (a.rSum/a.rN):null}; }).sort((a,b)=>b.n-a.n);
  const fmtH = (h)=> h===null ? '—' : (h>=24 ? (h/24).toFixed(1)+' days' : Math.round(h)+'h');

  if(typeof window.jspdf==='undefined'){
    showToast('PDF engine unavailable — using browser print instead');
    const area = document.getElementById('printArea');

function exportDefectsCsv(){
  const rows = [['ID','Source','Tower','Flat','Form','Location','Observation','Priority','Status','Assigned To','Target Date','Created At','Resolved At','Resolved By','Resolution Note','Resident Rating','Resident Review','Overdue']];
  DB.defects.forEach(x=> rows.push([x.id, x.source==='resident'?'Resident':'Inspection', x.tower, x.flat||'', defectFormLabel(x), x.location, x.observation, x.priority, x.status, x.assignedTo, x.targetDate, x.createdAt, x.closedAt||'', x.resolvedBy||'', x.resolutionNote||'', x.rating||'', x.review||'', isOverdue(x)?'YES':'NO']));
  const csv = rows.map(r=> r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'defect-log-'+todayStr()+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV downloaded');
}
function exportExcel(){
  if(typeof XLSX==='undefined'){ showToast('Excel engine unavailable — downloading CSV instead'); exportDefectsCsv(); return; }
  try{
    const wb = XLSX.utils.book_new();
    // Summary sheet — open the file and the picture is right there
    const closedAll = DB.defects.filter(x=>x.status==='closed' && x.closedAt);
    const avgResH = closedAll.length ? closedAll.reduce((s,x)=> s + Math.max(0, new Date(x.closedAt)-new Date(x.createdAt)),0)/closedAll.length/3600000 : null;
    const ratedAll = DB.defects.filter(x=>x.rating);
    const avgRate = ratedAll.length ? (ratedAll.reduce((s,x)=>s+x.rating,0)/ratedAll.length) : null;
    const sumRows = [
      ['Max Heights Majestic — Summary', ''],
      ['Generated', fmtDateTime(new Date().toISOString())],
      ['', ''],
      ['Total inspections', DB.inspections.length],
      ['Total defects', DB.defects.length],
      ['Open defects', DB.defects.filter(x=>x.status!=='closed').length],
      ['Overdue', DB.defects.filter(isOverdue).length],
      ['Resolved', closedAll.length],
      ['Avg resolution time', avgResH===null? '—' : (avgResH>=24 ? (avgResH/24).toFixed(1)+' days' : Math.round(avgResH)+'h')],
      ['Resident complaints', DB.defects.filter(x=>x.source==='resident').length],
      ['Avg resident rating', avgRate===null? '—' : avgRate.toFixed(1)+' / 5 ('+ratedAll.length+' reviews)'],
      ['', ''],
      ['Open defects by tower', '']
    ];
    TOWERS.forEach(t=>{
      const n = DB.defects.filter(x=>x.tower===t && x.status!=='closed').length;
      if(n) sumRows.push(['Tower '+t, n]);
    });
    const perfAgg = {};
    closedAll.forEach(x=>{
      if(!x.resolvedBy) return;
      if(!perfAgg[x.resolvedBy]) perfAgg[x.resolvedBy]={n:0,ms:0,rS:0,rN:0};
      perfAgg[x.resolvedBy].n++; perfAgg[x.resolvedBy].ms += Math.max(0,new Date(x.closedAt)-new Date(x.createdAt));
      if(x.rating){ perfAgg[x.resolvedBy].rS+=x.rating; perfAgg[x.resolvedBy].rN++; }
    });
    if(Object.keys(perfAgg).length){
      sumRows.push(['','']);
      sumRows.push(['Supervisor performance','Fixed','Avg time','Avg rating']);
      Object.keys(perfAgg).sort((a,b)=>perfAgg[b].n-perfAgg[a].n).forEach(name=>{
        const a=perfAgg[name]; const h=a.ms/a.n/3600000;
        sumRows.push([name, a.n, (h>=24?(h/24).toFixed(1)+' days':Math.round(h)+'h'), a.rN? (a.rS/a.rN).toFixed(1)+'/5':'—']);
      });
    }
    const sumWs = XLSX.utils.aoa_to_sheet(sumRows);
    sumWs['!cols'] = [{wch:28},{wch:16},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb, sumWs, 'Summary');
    const insRows = DB.inspections.map(r=>{ const s=recordStats(r); return {Date:r.date, Type:SECTION_DEFS[r.formType].label, Tower:r.tower, Supervisor:r.supervisorName, OK:s.ok, Issues:s.notOk, SubmittedAt:r.submittedAt}; });
    const defRows = DB.defects.map(x=>({Source:x.source==='resident'?'Resident':'Inspection', Tower:x.tower, Flat:x.flat||'', Location:x.location, Observation:x.observation, Priority:x.priority, Status:x.status, AssignedTo:x.assignedTo, TargetDate:x.targetDate, CreatedAt:x.createdAt, ResolvedAt:x.closedAt||'', ResolvedBy:x.resolvedBy||'', ResolutionNote:x.resolutionNote||'', ResidentRating:x.rating||'', ResidentReview:x.review||'', Overdue:isOverdue(x)?'YES':'NO'}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(insRows), 'Inspections');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(defRows), 'Defects');
    XLSX.writeFile(wb, 'max-heights-inspections-'+todayStr()+'.xlsx');
    showToast('Excel file downloaded');
  }catch(e){ console.error(e); showToast('Excel export failed — downloading CSV instead'); exportDefectsCsv(); }
}


/* =========================================================

   and after resolution give a star rating + review. Complaints
   are stored as defects (source:'resident') so they flow through

   inspection defects, and appear in every report/export.
========================================================= */

async function saveResidentComplaint(){
  snapshotResidentForm();
  const d = state._residentDraft;
  if(!d.rcName || !d.rcName.trim()){ showToast(T('toast_enter_name')); return; }
  if(!d.rcFlat || !d.rcFlat.trim()){ showToast(T('toast_enter_flat')); return; }
  if(!d.rcProblem || !d.rcProblem.trim()){ showToast(T('toast_enter_problem')); return; }
  if(!d.rcMobile || !/^[0-9]{10}$/.test(d.rcMobile.trim())){ showToast('Mobile number is required (10 digits)'); return; }
  if(state.residentMode){
    await doSaveResidentComplaint();
    return;
  }
  // Duplicate check — same flat, similar wording, in the last 5 days
  const textNew = (d.rcProblem||'').toLowerCase();
  const fiveDaysAgo = new Date(Date.now() - 5*24*3600*1000).toISOString();
  const dup = DB.defects.find(x=> x.source==='resident' && x.status!=='closed' && x.createdAt > fiveDaysAgo
    && x.flat && d.rcFlat && x.flat.toLowerCase()===d.rcFlat.trim().toLowerCase()
    && textNew.length>3 && (x.observation||'').toLowerCase().split(' ').some(w=> w.length>3 && textNew.includes(w)));
  if(dup){
    const statusTxt = dup.status==='in-progress' ? T('status_inprogress') : T('status_open');
    askConfirm({
      title: T('dup_title'),
      message: '"'+dup.location+'" — '+fmtDateTime(dup.createdAt)+' · '+statusTxt+(dup.assignedTo? ' · '+dup.assignedTo : '')+'. '+T('dup_msg'),
      confirmLabel: T('dup_confirm'),
      danger: false,
      onConfirm: ()=> doSaveResidentComplaint()
    });
    return;
  }
  await doSaveResidentComplaint();
}
async function doSaveResidentComplaint(){
  const d = state._residentDraft;
  const flatLoc = 'Flat '+d.rcFlat.trim();
  const observationText = (d.rcProblem && d.rcProblem.trim()) || 'Complaint raised by resident.';
  // Auto-analyze silently — no button, no resident-facing step. Same local
  // rule engine used elsewhere, run automatically against the complaint text
  // so priority/tags/vendor are set without anyone having to press Analyze.
  const ai = aiAnalyzeIssue({label:'Resident Complaint', location:flatLoc, observation:observationText, existingTags:['Resident Complaint'], hasPhoto: state._residentPhotos.length>0});
  const defect = {
    id: uid('def'), sourceRecordId: null, formType: 'resident', source: 'resident',
    residentName: d.rcName.trim(), flat: d.rcFlat.trim(), mobile: (d.rcMobile||'').trim(),
    tower: d.rcTower || 'A',
    location: flatLoc,
    observation: observationText,
    priority: ai.priority, tags: aiUnique(['Resident Complaint'].concat(ai.tags)),
    photo: state._residentPhotos[0] || null, photos: state._residentPhotos.slice(), resolutionPhoto: null, resolutionNote: null,
    media: state._residentMedia.slice(),
    assignedTo: d.rcAssign || ai.assignee || autoAssignFor(['Resident Complaint']) || '', targetDate: '',
    status: 'open', createdAt: new Date().toISOString(), closedAt: null,
    resolvedBy: null, rating: null, review: null, ratedAt: null
  };
  const ok = await storeSet('defect:'+defect.id, defect);
  if(!ok){ showToast('Could not save — check your connection and try again'); return; }
  DB.defects.unshift(defect);
  await logAudit('resident_complaint', defect.location+' — by '+defect.residentName+' (Flat '+defect.flat+')');
  const assigned = defect.assignedTo, mobile = memberMobile(assigned);
  if(state.residentMode){
    state._residentSubmitted = true;
    state._residentFormOpen = false;
    state._residentPhotos = [];
    state._residentMedia = [];
    state._residentDraft = {};
    render();
    setTimeout(()=>{ try{ window.close(); }catch(e){} }, 1200);
    return;
  }
  closeResidentForm();
  showToast(T('toast_complaint_done'));
  if(assigned && mobile){
    state._waShare = [{name: assigned, mobile: mobile, count: 1,
      msg: '🏢 Max Heights Majestic — new resident complaint\n📍 '+defect.location+' (Flat '+defect.flat+', '+defect.residentName+')\n📝 '+defect.observation+'\n🗓 '+fmtDateTime(defect.createdAt)+'\nPlease update the status in the MHM Inspection app once fixed.'}];
    render();
  }
}

function pickRateStars(id, n){
  const el = document.getElementById('rv_'+id);

async function saveResidentRating(id){
  const c = DB.defects.find(x=>x.id===id); if(!c) return;
  const stars = (state._rateOpen===id) ? state._rateStars : 0;
  if(!stars){ showToast('Tap the stars to rate first'); return; }
  const el = document.getElementById('rv_'+id);
  const prev = {rating:c.rating, review:c.review, ratedAt:c.ratedAt};
  c.rating = stars;
  c.review = el ? el.value.trim() : (state._reviewDraft[id]||'');
  c.ratedAt = new Date().toISOString();
  const ok = await storeSet('defect:'+c.id, c);
  if(!ok){ Object.assign(c, prev); showToast('Could not save — check your connection and try again'); render(); return; }
  await logAudit('resident_rating', c.location+' rated '+stars+'/5 by resident');
  state._rateOpen = null; state._rateStars = 0; delete state._reviewDraft[id];
  render();
  showToast(T('rate_thanks'));
}

/* Groups raw audit action keys into a small set of visual categories so
   the log is scannable at a glance instead of a flat list of similar-looking
   rows. Purely cosmetic — doesn't change what's logged or its data. */
function auditActionCategory(action){
  if(action==='data_cleared') return 'danger';
  if(action==='defect_logged' || action==='defect_status' || action==='defect_edited' || action==='task_assigned' || action==='member_removed' || action==='staff_removed') return 'warn';
  if(action==='inspection_submitted' || action==='defect_resolved' || action==='task_completed' || action==='member_added' || action==='staff_added') return 'ok';
  return 'info'; // report_generated, backup_exported, member_edited, staff_edited, etc.
}

}

async function saveVendor(){
  const name = (document.getElementById('venName').value||'').trim();
  const mobile = (document.getElementById('venMobile').value||'').trim();
  if(!name){ showToast('Vendor name is required'); return; }
  if(!/^[0-9]{10}$/.test(mobile)){ showToast('Mobile must be exactly 10 digits'); return; }
  const v = {
    id: uid('ven'),
    name,
    trade: document.getElementById('venTrade').value,
    mobile,
    notes: (document.getElementById('venNotes').value||'').trim(),
    createdAt: new Date().toISOString()
  };
  const ok = await storeSet('vendor:'+v.id, v);
  if(!ok){ showToast('Failed to save. Try again.'); return; }
  DB.vendors.push(v);
  DB.vendors.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
  await logAudit('vendor_added', 'Vendor '+name+' ('+v.trade+') added');
  closeModals();
  showToast('Vendor saved ✓');
}
function confirmDeleteVendor(id){
  const v = DB.vendors.find(x=>x.id===id);
  if(!v) return;
  askConfirm({
    title:'Remove vendor?',
    message:'Delete '+v.name+' ('+v.mobile+') from the vendor directory? This cannot be undone.',
    confirmLabel:'Remove', danger:true,
    onConfirm: ()=> deleteVendor(id)
  });
}
async function deleteVendor(id){
  const v = DB.vendors.find(x=>x.id===id);
  if(!v) return;
  await storeDelete('vendor:'+id);
  DB.vendors = DB.vendors.filter(x=>x.id!==id);
  await logAudit('vendor_deleted', 'Vendor '+v.name+' removed');
  render();
  showToast('Vendor removed');
}

  const files = input.files;

  const file = files[0];

  reader.onload = function(e){ onLoaded({type:type, dataUrl:e.target.result, name:file.name, mime:file.type}); };

function attachSosMedia(input, type){
  const files = input.files;
  if(!files || !files.length) return;
  const file = files[0];
  if((state._sosMedia||[]).length >= 3){ showToast('Maximum 3 files'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    if(!state._sosMedia) state._sosMedia=[];
    state._sosMedia.push({type:type, dataUrl:e.target.result, name:file.name, mime:file.type});
    render();
    showToast(type.charAt(0).toUpperCase()+type.slice(1)+' attached');
  };
  if(type==='audio'||type==='video'){
    reader.readAsDataURL(file);
  } else {
    compressImage(file, 800, 0.7).then(url=>{
      if(!state._sosMedia) state._sosMedia=[];
      state._sosMedia.push({type:'photo', dataUrl:url, name:file.name, mime:'image/jpeg'});
      render();
      showToast('Photo attached');
    }).catch(()=>showToast('Could not read image'));
    return;
  }
  reader.onerror = ()=>showToast('Could not read file');
}
function removeSosMedia(idx){ state._sosMedia.splice(idx,1); render(); }

    if(m.type==='photo'){
      html += '<span style="position:relative;display:inline-block;margin:4px;">'
             +'<img src="'+m.dataUrl+'" style="width:72px;height:72px;border-radius:10px;object-fit:cover;border:1px solid var(--border);">'
             +'<button type="button" onclick="removeSosMedia('+i+')" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:11px;cursor:pointer;">x</button>'
             +'</span>';
    } else if(m.type==='video'){
      html += '<span style="position:relative;display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin:4px;">'
             +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>'
             +'<span style="font-size:11px;color:var(--ink-soft);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(m.name)+'</span>'
             +'<button type="button" onclick="removeSosMedia('+i+')" style="margin-left:4px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;">x</button>'
             +'</span>';
    } else if(m.type==='audio'){
      html += '<span style="position:relative;display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin:4px;">'
             +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>'
             +'<span style="font-size:11px;color:var(--ink-soft);">Voice note</span>'
             +'<button type="button" onclick="removeSosMedia('+i+')" style="margin-left:4px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;">x</button>'
             +'</span>';
    }
  });
  if(items.length < 3){
    html += '<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">'
          + '<label style="display:flex;align-items:center;gap:5px;background:var(--surface-2);border:1.5px dashed var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink-soft);">'
          + icon('camera',16)+' Photo<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="attachSosMedia(this,\'photo\')"></label>'
          + '<label style="display:flex;align-items:center;gap:5px;background:var(--surface-2);border:1.5px dashed var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink-soft);">'
          + icon('camera',16)+' Video<input type="file" accept="video/*" capture="environment" style="display:none;" onchange="attachSosMedia(this,\'video\')"></label>'
          + '<label style="display:flex;align-items:center;gap:5px;background:var(--surface-2);border:1.5px dashed var(--border);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink-soft);">'
          + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>'
          + ' Audio<input type="file" accept="audio/*" capture="microphone" style="display:none;" onchange="attachSosMedia(this,\'audio\')"></label>'

  const media = state._sosMedia||[];
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'

/* =========================================================
   SOS WHATSAPP BROADCAST
========================================================= */
function getSosAlertNumbers(){
  const raw=(localStorage.getItem('sos_alert_nums')||'').trim();
  const fromField=raw.split(',').map(n=>n.trim().replace(/\D/g,'')).filter(n=>n.length>=10);
  const fromMembers=(DB.members||[]).filter(m=>m.mobile&&m.mobile.length>=10).map(m=>m.mobile.replace(/\D/g,''));
  return [...new Set([...fromField,...fromMembers])];
}
function buildSosWaMsg(s){
  const kind=sosKindMeta(s.kind).label.toUpperCase();
  const time=new Date(s.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  return encodeURIComponent(
    '*EMERGENCY SOS - '+kind+'*\n'
    +'Society: Max Heights Majestic\n'
    +(s.tower?'Tower: '+s.tower+'\n':'')
    +(s.flat?'Flat: '+s.flat+'\n':'')
    +'Raised by: '+s.raisedBy+(s.mobile?' ('+s.mobile+')':'')+'\n'
    +'Time: '+time+'\n'
    +(s.note?'Detail: '+s.note+'\n':'')
    +'\nPlease respond immediately.'
  );
}
function sendSosWaAlerts(s){
  const nums=getSosAlertNumbers();
  if(!nums.length){ showToast('Settings mein SOS alert numbers add karo pehle'); return; }
  const msg=buildSosWaMsg(s);
  nums.forEach((num,idx)=>{
    setTimeout(()=>{ window.open('https://wa.me/91'+num+'?text='+msg,'_blank'); },idx*1800);
  });
  showToast('WhatsApp alert '+nums.length+' number(s) par bhej raha hai...');
}

async function raiseSos(){
  const name = (document.getElementById('sosName').value||'').trim();
  const mobile = (document.getElementById('sosMobile').value||'').trim();
  if(!name){ showToast('Your name is required'); return; }
  if(mobile && !/^[0-9]{10}$/.test(mobile)){ showToast('Mobile must be exactly 10 digits (or left blank)'); return; }
  const s = {
    id: uid('sos'),
    kind: state._sosKind || 'general',
    raisedBy: name,
    flat: (document.getElementById('sosFlat').value||'').trim(),
    tower: document.getElementById('sosTower').value || '',
    mobile,
    note: (document.getElementById('sosNote').value||'').trim(),
    media: (state._sosMedia||[]).map(m=>({type:m.type,dataUrl:m.dataUrl,name:m.name,mime:m.mime})),
    status: 'active',
    createdAt: new Date().toISOString(),
    acknowledgedBy: null, acknowledgedAt: null,
    resolvedAt: null
  };
  const ok = await storeSet('sos:'+s.id, s);
  if(!ok){ showToast('Failed to save. Try again.'); return; }
  DB.sos.unshift(s);
  await logAudit('sos_raised', sosKindMeta(s.kind).label+' SOS raised by '+name+(s.tower? ' (Tower '+s.tower+')':''));
  state.sosFilter.status = 'active';
  closeModals();
  showToast('SOS raised! WhatsApp alerts bhej rahe hain...');
  setTimeout(()=>sendSosWaAlerts(s), 700);
}
async function advanceSos(id, to){
  const s = DB.sos.find(x=>x.id===id);
  if(!s) return;
  s.status = to;
  if(to==='acknowledged'){
    s.acknowledgedBy = state.currentUser ? state.currentUser.name : 'admin';
    s.acknowledgedAt = new Date().toISOString();
  }
  if(to==='resolved'){ s.resolvedAt = new Date().toISOString(); }
  await storeSet('sos:'+s.id, s);
  await logAudit('sos_'+to, sosKindMeta(s.kind).label+' SOS from '+s.raisedBy+' marked '+to);
  render();
  showToast(to==='resolved' ? 'SOS resolved ✓' : 'SOS acknowledged');
}

async function exportBackup(){
  const backup = {exportedAt:new Date().toISOString(), inspections:DB.inspections, defects:DB.defects, audit:DB.audit, tasks:DB.tasks, members:DB.members, vendors:DB.vendors, sos:DB.sos};
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='max-heights-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  await logAudit('backup_exported', 'Backup JSON downloaded');
  await loadAll();
  showToast('Backup downloaded');
}
function confirmClearData(){
  askConfirm({
    title:'Clear all data?',
    message:'This permanently deletes ALL inspections, defects and tasks for everyone using this app, on every device. This cannot be undone.',
    confirmLabel:'Delete everything',
    danger:true,
    onConfirm: doClearData
  });
}
async function doClearData(){
  for(const r of DB.inspections) await storeDelete('insp:'+r.id);
  for(const x of DB.defects) await storeDelete('defect:'+x.id);
  for(const t of DB.tasks) await storeDelete('task:'+t.id);
  for(const s of DB.sos) await storeDelete('sos:'+s.id);
  await logAudit('data_cleared', 'All inspections, defects, tasks and SOS alerts were cleared');
  await loadAll();
  render();
  showToast('All data cleared');
}
