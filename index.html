function bindPinInputs(){
  const el = document.getElementById('pinEntry');
  if(el){ el.focus(); el.addEventListener('keydown', e=>{ if(e.key==='Enter') submitPin(el.value); }); }
}

function defectEditModal(id){
  const def = DB.defects.find(x=>x.id===id);
  if(!def) return '';
  if(def.source==='resident') return residentComplaintDetailModal(id);
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<span class="section-label">Edit Defect</span>'
    + '<div class="field"><label class="field-label">Assigned To</label><input type="text" id="edAssign" list="assignSuggest" value="'+esc(def.assignedTo)+'"></div>'
    + '<datalist id="assignSuggest">'+assignSuggestOptionsHtml()+'</datalist>'
    + '<div class="field"><label class="field-label">Target Completion Date</label><input type="date" id="edTarget" value="'+(def.targetDate||'')+'"></div>'
    + '<div class="field"><label class="field-label">Priority</label><select id="edPriority">'+['high','medium','low'].map(p=>'<option value="'+p+'" '+(def.priority===p?'selected':'')+'>'+p+'</option>').join('')+'</select></div>'
    + '<div class="field"><label class="field-label">Tags</label><div class="tag-row">'+TAG_OPTIONS.map(tag=>'<button type="button" class="tag-chip '+((def.tags||[]).includes(tag)?'active':'')+'" onclick="toggleEditTag(\''+id+'\',\''+tag.replace(/'/g,"\\\\'")+'\')">'+tag+'</button>').join('')+'</div></div>'
    + '<div class="field"><label class="field-label">Progress update</label><textarea id="edProgressNote" placeholder="Status update / next steps — e.g. Plumber ko call kiya, kal aayega" style="min-height:56px;">'+esc(def.progressNote||'')+'</textarea></div>'
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveDefectEdit(\''+id+'\')">Save</button></div>'
    + '</div></div>';
}
// Resident complaints keep the resident's own words (observation, flat,
// photos) read-only here — staff can look at the full detail, assign it,
// change its status, and set/update a target date + progress note, but
// can't quietly rewrite what was actually reported. Inspection-raised
// defects still go through the full editable form above.
function residentComplaintDetailModal(id){
  const def = DB.defects.find(x=>x.id===id);
  if(!def) return '';
  const statusLabelKey = {open:'status_open', 'in-progress':'status_inprogress', closed:'status_closed'};
  const photos = (def.photos && def.photos.length) ? def.photos : (def.photo ? [def.photo] : []);
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<span class="section-label">'+icon('star',14)+' Resident Complaint</span>'
    + (def.code ? '<div style="font-size:11px; font-family:var(--font-mono); color:var(--ink-soft); margin:-6px 0 10px;">'+esc(def.code)+' · '+fmtDateTime(def.createdAt)+'</div>' : '')

    + '<div class="card" style="background:var(--surface-2); margin-bottom:14px;">'
      + '<div style="font-size:13px; font-weight:800;">'+esc(def.residentName||'—')+'</div>'
      + '<div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">'+esc(def.location)+(def.mobile? ' · <a href="tel:'+esc(def.mobile)+'" style="color:inherit; text-decoration:underline;">'+esc(def.mobile)+' '+icon('phone',10)+'</a>' : '')+'</div>'
      + '<div style="font-size:13.5px; margin-top:10px; line-height:1.5;">'+esc(def.observation)+'</div>'
      + (photos.length ? '<div class="photo-row" style="flex-wrap:wrap; margin-top:10px;">'+photos.map(ph=>'<img class="photo-thumb" src="'+ph+'" onclick="openLightbox(\''+ph+'\')" style="cursor:pointer;">').join('')+'</div>' : '')
      + mediaPlaybackHtml(def.media)
    + '</div>'

    + '<div class="settings-row" style="padding:0 0 12px;"><div class="settings-row-text"><b>Status</b><span>'+T(statusLabelKey[def.status])+(def.status==='closed' && def.closedAt ? ' · '+fmtDateTime(def.closedAt)+(def.resolvedBy? ' by '+esc(def.resolvedBy):'') : '')+'</span></div>'
      + (def.status==='open' ? '<button class="btn btn-sm btn-primary" onclick="cycleDefectStatus(\''+id+'\')">Mark In Progress</button>' : '')
      + (def.status==='in-progress' ? '<button class="btn btn-sm btn-primary" onclick="cycleDefectStatus(\''+id+'\')">Mark Resolved</button>' : '')
    + '</div>'
    + (def.status==='closed' && def.resolutionNote ? '<p style="font-size:12.5px; color:var(--ink-soft); margin:-6px 0 12px;">Fix: '+esc(def.resolutionNote)+'</p>' : '')

    + '<div class="field"><label class="field-label">Assigned To</label><input type="text" id="edAssign" list="assignSuggest" value="'+esc(def.assignedTo)+'"></div>'
    + '<datalist id="assignSuggest">'+assignSuggestOptionsHtml()+'</datalist>'
    + (def.assignedTo && memberMobile(def.assignedTo) ? '<div class="btn-row" style="margin:-6px 0 12px;"><button class="btn btn-sm" style="background:#25D366;color:#fff;border:none;" onclick="notifyDefectWhatsApp(\''+id+'\')">'+icon('send',13)+' Notify '+esc(def.assignedTo)+' on WhatsApp</button></div>' : '')
    + '<div class="field"><label class="field-label">Target Completion Date</label><input type="date" id="edTarget" value="'+(def.targetDate||'')+'"></div>'
    + '<div class="field"><label class="field-label">Progress update</label><textarea id="edProgressNote" placeholder="Status update / next steps — e.g. Plumber ko call kiya, kal aayega" style="min-height:56px;">'+esc(def.progressNote||'')+'</textarea></div>'
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Close</button><button class="btn btn-primary" onclick="saveDefectEdit(\''+id+'\')">Save</button></div>'
    + '</div></div>';
}
function newDefectModal(){
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<span class="section-label">Log a Defect</span>'
    + '<div class="field"><label class="field-label">Location</label><input type="text" id="ndLoc" placeholder="e.g. Lift Lobby – 4th Floor"></div>'
    + '<div class="field"><label class="field-label">Observation</label><textarea id="ndObs" placeholder="Describe the issue"></textarea></div>'
    + '<p style="font-size:11px;color:var(--ink-faint);margin:-4px 0 10px;">'+icon('spark',11)+' Priority & tags are set automatically from your description.</p>'
    + '<div class="field"><label class="field-label">Tower</label><select id="ndTower">'+TOWERS.map(t=>'<option>'+t+'</option>').join('')+'</select></div>'
    + '<div class="field"><label class="field-label">Assigned To</label><input type="text" id="ndAssign" list="assignSuggest" placeholder="Optional"></div>'
    + '<datalist id="assignSuggest">'+assignSuggestOptionsHtml()+'</datalist>'
    + '<div class="field"><label class="field-label">Photo</label><div class="photo-row">'+(state._newDefectPhoto? '<img class="photo-thumb" src="'+state._newDefectPhoto+'"><button type="button" class="btn btn-sm btn-ghost" onclick="state._newDefectPhoto=null; render();">Remove</button>' : '<label class="photo-add-btn">'+icon('camera',15)+' Add photo (optional)<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="attachNewDefectPhoto(this)"></label>')+'</div></div>'
    + '<div class="field"><label class="field-label">Video / Audio (optional)</label><div style="display:flex;flex-wrap:wrap;">'
        + videoAudioChipsHtml(state._newDefectMedia, 'removeNewDefectMedia')
        + (state._newDefectMedia.length<3 ? videoAudioAddButtonsHtml('attachNewDefectVideo','attachNewDefectAudio') : '')
      +'</div></div>'
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveNewDefect()">Save</button></div>'
    + '</div></div>';
}
function resolutionModal(id){
  const def = DB.defects.find(x=>x.id===id);
  if(!def) return '';
  const afterPhoto = state._resolveAfterPhoto || def.resolutionPhoto;
  const needAfter = def.priority === 'high' || def.priority === 'urgent';
  return '<div class="modal-backdrop" onclick="if(event.target===this){ state._resolveAfterPhoto=null; closeModals(); }"><div class="modal-sheet card">'
    + '<span class="section-label">'+icon('check',15)+' Mark Resolved</span>'
    + '<p style="font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:12px;">'+esc(def.location)+'</p>'
    + (def.photo ? '<div style="display:flex;gap:8px;margin-bottom:14px;">'
        + '<div style="flex:1;text-align:center;"><img src="'+def.photo+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--border);">'
          + '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700;display:block;margin-top:4px;">Before</span></div>'
        + '<div style="flex:1;text-align:center;">'
          + (afterPhoto
            ? '<img src="'+afterPhoto+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:2px solid var(--ok);" onclick="openLightbox(\''+afterPhoto+'\')"><button onclick="state._resolveAfterPhoto=null;renderModalLayer();" style="background:none;border:none;font-size:10px;color:var(--notok);cursor:pointer;display:block;margin:2px auto;">Remove</button>'
            : '<label style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;aspect-ratio:1;border:2px dashed '+(needAfter ? 'var(--danger)' : 'var(--border)')+';border-radius:10px;cursor:pointer;background:var(--surface-2);gap:6px;">'
              + icon('camera',22)
              + '<span style="font-size:11px;color:var(--ink-soft);font-weight:700;">'+(needAfter ? 'Required *' : 'Add photo')+'</span>'
              + '<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="attachAfterPhoto(this)"></label>')
          + '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ok);font-weight:700;display:block;margin-top:4px;">After</span></div>'
      + '</div>'
    : '<div class="field"><label class="field-label">After Photo'+(needAfter ? ' <span style=\"color:var(--danger)\">*</span>' : '')+'</label>'
      + '<div class="photo-row">'
        + (afterPhoto
          ? '<img class="photo-thumb" src="'+afterPhoto+'"><button onclick="state._resolveAfterPhoto=null;renderModalLayer();" style="background:none;border:none;font-size:12px;color:var(--notok);cursor:pointer;">✕</button>'
          : '<label class="photo-add-btn">'+icon('camera',15)+' '+(needAfter ? 'After photo (required)' : 'Add after photo')+'<input type="file" accept="image/*" capture="environment" style="display:none;" onchange="attachAfterPhoto(this)"></label>')
      + '</div></div>')
    + '<div class="field"><label class="field-label">Resolution Note (optional)</label><textarea id="resNote" placeholder="What was done to fix this? Materials used? Who fixed it?"></textarea></div>'
    + (needAfter && !afterPhoto ? '<p style="font-size:11.5px;color:var(--danger);margin-bottom:8px;">'+icon('alertTriangle',13)+' After photo required for High priority defects.</p>' : '')
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="state._resolveAfterPhoto=null; closeModals();">Cancel</button><button class="btn btn-primary" onclick="saveResolution(\''+id+'\')">'+icon('check',15)+' Mark Resolved</button></div>'
    + '</div></div>';
}
function attachAfterPhoto(input){
  const file = input.files && input.files[0];
  if(!file) return;
  compressImage(file, 1080, 0.75, watermarkLabelForCurrentContext()).then(dataUrl => {
    state._resolveAfterPhoto = dataUrl;
    renderModalLayer();
  }).catch(()=> showToast('Could not read photo'));
}

/* Supervisor: the popup that surfaces a pending task, styled by priority. */
function taskPopupModal(id){
  const task = DB.tasks.find(t=>t.id===id);
  if(!task) return '';
  const meta = TASK_PRIORITIES[task.priority] || TASK_PRIORITIES.medium;
  return '<div class="modal-backdrop"><div class="modal-sheet card" style="padding-top:0; overflow:hidden;">'
    + '<div class="task-popup-head '+task.priority+'">'+icon(task.priority==='urgent'?'alertTriangle':'wrench',20)+'<div><b style="font-size:14px; display:block;">'+meta.label+' Task Assigned</b><span style="font-size:11.5px; opacity:.85;">'+fmtDateTime(task.createdAt)+'</span></div></div>'
    + '<b style="font-size:15px; display:block; margin-bottom:4px;">'+esc(task.title)+'</b>'
    + (task.description? '<p style="font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-bottom:8px;">'+esc(task.description)+'</p>' : '')
    + (task.assignedTo? '<p style="font-size:11.5px; color:var(--ink-faint); margin-bottom:10px;">For: '+esc(task.assignedTo)+'</p>' : '')

/* =========================================================
   DASHBOARD VIEW (admin) — with Chart.js (feature-detected;
   falls back to the CSS bar visualizations if the library
   failed to load, e.g. no internet on first run).
========================================================= */
function deltaHtml(cur, prev, inverse){
  if(prev===0 && cur===0) return '<span class="delta flat">— no change</span>';
  if(prev===0) return '<span class="delta up">new this week</span>';
  const pct = Math.round(((cur-prev)/prev)*100);
  if(pct===0) return '<span class="delta flat">— flat vs last week</span>';
  const good = inverse ? pct<0 : pct>0;
  const arrow = pct>0?'↑':'↓';
  return '<span class="delta '+(good?'down':'up')+'">'+arrow+' '+Math.abs(pct)+'% vs last week</span>';
}

  if(!DB.inspections.length && !DB.defects.length) return '';
  const lastBackup = DB.audit.find(a=>a.action==='backup_exported');
  const daysSince = lastBackup ? Math.floor((Date.now()-new Date(lastBackup.at).getTime())/86400000) : null;
  if(daysSince===null){
    return '<div class="banner warn">'+icon('info',18)+'<div><b>No backup has ever been exported</b>This app has no real server — a backup is the only copy of your data outside this browser. <span onclick="goto(\'settings\')" style="text-decoration:underline;cursor:pointer;">Export one now →</span></div></div>';
  }
  if(daysSince>=7){
    return '<div class="banner warn">'+icon('info',18)+'<div><b>Last backup was '+daysSince+' days ago</b>Consider exporting a fresh backup, especially before clearing or editing data. <span onclick="goto(\'settings\')" style="text-decoration:underline;cursor:pointer;">Export now →</span></div></div>';
  }
  return '';
}

/* ---- Premium chart theming: gradient fills + soft glow ----
   Gradients need a live canvas context and known pixel dimensions, so
   Chart.js's own documented pattern is a *scriptable* option: a
   function Chart.js calls on every layout/resize, which must return
   null before the first layout pass (chartArea not known yet) — Chart.js
   simply re-asks once it is, so the null case below is expected, not
   an error case. */
function verticalGradient(ctx, chartArea, stops){
  if(!chartArea) return null;
  const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
  stops.forEach(([offset,color])=>g.addColorStop(offset,color));
  return g;
}
function horizontalGradient(ctx, chartArea, stops){
  if(!chartArea) return null;
  const g = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
  stops.forEach(([offset,color])=>g.addColorStop(offset,color));
  return g;
}
// "r,g,b" so a gradient can fade to alpha 0 of its OWN hue — fading to
// a generic transparent-black instead reads muddy near the baseline.
function hexToRgbTriplet(hex){
  hex = (hex||'').trim().replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex,16);
  if(hex.length!==6 || isNaN(n)) return '30,127,118';
  return [(n>>16)&255,(n>>8)&255,n&255].join(',');
}
// Soft glow behind whatever a dataset draws (a bar, or a line + its
// points), in that dataset's own colour — registered once globally so
// every chart picks it up without repeating plugin config 4 times.
let chartPluginsRegistered = false;
function ensureChartPlugins(){
  if(chartPluginsRegistered || typeof Chart==='undefined') return;
  Chart.register({
    id:'premiumGlow',
    beforeDatasetDraw(chart, args){
      const ds = chart.data.datasets[args.index];
      chart.ctx.save();
      chart.ctx.shadowColor = ds._glowColor || ds.borderColor || 'rgba(0,0,0,0)';
      chart.ctx.shadowBlur = ds._glow || 0;
    },
    afterDatasetDraw(chart){ chart.ctx.restore(); }
  });
  chartPluginsRegistered = true;
}
function renderCharts(byType, towerIssueCounts, staffList){
  if(typeof Chart==='undefined'){
    const note = document.createElement('div');
    note.className='chart-fallback-note';
    note.textContent='Charts need an internet connection to load Chart.js the first time — showing the bar view instead.';
    document.querySelectorAll('.chart-box').forEach(b=>{ if(!b.querySelector('canvas')) return; b.style.display='none'; });
    return;
  }
  ensureChartPlugins();
  document.getElementById('towerHeatFallback').style.display='none';
  Object.values(chartInstances).forEach(c=>{ try{c.destroy();}catch(e){} });
  chartInstances = {};
  const cssVar = n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
  Chart.defaults.color = cssVar('--ink-soft');

  // inspections last 14 days — vertical bars: solid at the bar's own
  // tip (the actual value), fading toward transparent at the zero
  // baseline, so intensity reads as "distance from zero".
  const days = [...Array(14)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(13-i)); return localDateKey(d); });
  const counts = days.map(day=> DB.inspections.filter(r=>r.date===day).length);
  const c1 = document.getElementById('chartTrend');
  if(c1){
    const rgb1 = hexToRgbTriplet(cssVar('--accent1'));
    chartInstances.trend = new Chart(c1, {type:'bar', data:{labels:days.map(d=>d.slice(5)), datasets:[{
      label:'Inspections', data:counts, borderRadius:4, borderWidth:1.5,
      borderColor:'rgb('+rgb1+')', _glowColor:'rgba('+rgb1+',.55)', _glow:6,
      backgroundColor:(context)=>{
        const {chart} = context; const {ctx, chartArea} = chart;
        return verticalGradient(ctx, chartArea, [[0,'rgba('+rgb1+',.85)'],[1,'rgba('+rgb1+',.05)']]);
      }
    }]}, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{precision:0}}}, maintainAspectRatio:false}});
  }

  // defects opened vs closed last 14 days — area-fill line chart:
  // solid-ish fill right under each line fading to transparent at the
  // x-axis, plus glowing points. Opened/Closed keep their own red/green
  // semantic colour rather than both becoming brand-teal, since which
  // line is which matters here — only the *treatment* (gradient +
  // glow) is what's shared with the rest of the dashboard.
  const opened = days.map(day=> DB.defects.filter(x=>x.createdAt && localDateKey(x.createdAt)===day).length);
  const closed = days.map(day=> DB.defects.filter(x=>x.closedAt && localDateKey(x.closedAt)===day).length);
  const c2 = document.getElementById('chartDefectTrend');
  if(c2){
    const rgbOpen = hexToRgbTriplet(cssVar('--notok'));
    const rgbClose = hexToRgbTriplet(cssVar('--ok'));
    const lineDataset = (label, data, rgb)=>({
      label:label, data:data, tension:.35, fill:true,
      borderColor:'rgb('+rgb+')', borderWidth:2.5,
      pointBackgroundColor:'rgb('+rgb+')', pointBorderColor:cssVar('--surface'),
      pointBorderWidth:2, pointRadius:4, pointHoverRadius:6, pointHoverBorderWidth:2,
      _glowColor:'rgba('+rgb+',.85)', _glow:9,
      backgroundColor:(context)=>{
        const {chart} = context; const {ctx, chartArea} = chart;
        return verticalGradient(ctx, chartArea, [[0,'rgba('+rgb+',.38)'],[1,'rgba('+rgb+',0)']]);
      }
    });
    chartInstances.defectTrend = new Chart(c2, {type:'line', data:{labels:days.map(d=>d.slice(5)), datasets:[
      lineDataset('Opened', opened, rgbOpen),
      lineDataset('Closed', closed, rgbClose)
    ]}, options:{maintainAspectRatio:false, interaction:{intersect:false, mode:'index'}, scales:{y:{beginAtZero:true, ticks:{precision:0}}}}});
  }

  // tower comparison — horizontal bars: solid at each bar's own tip
  // (the value, on the right), fading toward transparent at the
  // left-hand zero baseline. Same "intensity = distance from zero"
  // rule as the vertical bars above, just rotated with the axis.
  const c3 = document.getElementById('chartTower');
  if(c3){
    const rgb3 = hexToRgbTriplet(cssVar('--accent3'));
    chartInstances.tower = new Chart(c3, {type:'bar', data:{labels:towerIssueCounts.map(t=>'Tower '+t.tower), datasets:[{
      label:'All-time defects', data:towerIssueCounts.map(t=>t.count), borderRadius:4, borderWidth:1.5,
      borderColor:'rgb('+rgb3+')', _glowColor:'rgba('+rgb3+',.55)', _glow:6,
      backgroundColor:(context)=>{
        const {chart} = context; const {ctx, chartArea} = chart;
        return horizontalGradient(ctx, chartArea, [[0,'rgba('+rgb3+',.05)'],[1,'rgba('+rgb3+',.85)']]);
      }
    }]}, options:{indexAxis:'y', plugins:{legend:{display:false}}, maintainAspectRatio:false, scales:{x:{beginAtZero:true, ticks:{precision:0}}}}});
  }

  // staff productivity — same horizontal-bar treatment, its own hue.
  const c4 = document.getElementById('chartStaff');
  if(c4 && staffList.length){
    const rgb4 = hexToRgbTriplet(cssVar('--accent4'));
    chartInstances.staff = new Chart(c4, {type:'bar', data:{labels:staffList.map(s=>s[0]), datasets:[{
      label:'Inspections filed', data:staffList.map(s=>s[1]), borderRadius:4, borderWidth:1.5,
      borderColor:'rgb('+rgb4+')', _glowColor:'rgba('+rgb4+',.55)', _glow:6,
      backgroundColor:(context)=>{
        const {chart} = context; const {ctx, chartArea} = chart;
        return horizontalGradient(ctx, chartArea, [[0,'rgba('+rgb4+',.05)'],[1,'rgba('+rgb4+',.85)']]);
      }
    }]}, options:{indexAxis:'y', plugins:{legend:{display:false}}, maintainAspectRatio:false, scales:{x:{beginAtZero:true, ticks:{precision:0}}}}});
  }
}
/* =========================================================
   REPORT BUILDER (admin) — branded PDF (jsPDF), Excel
   (SheetJS), QR (qrcodejs), and CSV/print fallbacks.
   Every external-library feature is feature-detected; if the
   library didn't load (e.g. no internet the first time), we
   fall back to the built-in browser print or CSV export
   instead of failing silently.
========================================================= */
async function nextReportNumber(){
  const cur = await storeGet('settings:reportCounter');
  const n = (cur && cur.value ? cur.value : 0) + 1;
  await storeSet('settings:reportCounter', {value:n});
  const today = todayStr().replace(/-/g,'');
  return 'MHM-INS-'+today+'-'+String(n).padStart(4,'0');
}
function generateQRDataUrl(text){
  return new Promise((resolve)=>{
    if(typeof QRCode==='undefined'){ resolve(null); return; }
    try{
      const holder = document.createElement('div');
      holder.style.cssText = 'position:fixed; left:-9999px; top:-9999px;';
      document.body.appendChild(holder);
      new QRCode(holder, {text:text, width:120, height:120, correctLevel: QRCode.CorrectLevel.M});
      setTimeout(()=>{
        const canvas = holder.querySelector('canvas');
        const img = holder.querySelector('img');
        let data = null;
        if(canvas) data = canvas.toDataURL('image/png');
        else if(img && img.src) data = img.src;
        document.body.removeChild(holder);
        resolve(data);
      }, 120);
    }catch(e){ resolve(null); }
  });
}

async function generateBrandedPDF(){
  if(typeof window.jspdf==='undefined'){
    showToast('PDF engine unavailable — using browser print instead');
    printConsolidated();
    return;
  }
  const btn = document.getElementById('pdfBtn');
  if(btn) btn.disabled = true;
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 40;
    const reportNo = await nextReportNumber();
    // Optional date range from the report builder
    const rFromEl = document.getElementById('rptFrom'), rToEl = document.getElementById('rptTo');
    const rFrom = rFromEl && rFromEl.value ? rFromEl.value : null;
    const rTo = rToEl && rToEl.value ? rToEl.value : null;
    const inRange = (dateStr)=>{
      if(!dateStr) return !rFrom && !rTo;
      const d = localDateKey(dateStr);
      if(rFrom && d < rFrom) return false;
      if(rTo && d > rTo) return false;
      return true;
    };
    const rangeLabel = (rFrom||rTo) ? ('   ·   Period: '+(rFrom? fmtDate(rFrom):'start')+' — '+(rTo? fmtDate(rTo):'today')) : '';
    // ~90x68pt photo pairs in the defect sections
    function addDefectPhotos(x){
      const before = (x.photos && x.photos[0]) || x.photo;
      if(!before && !x.resolutionPhoto) return;
      const imgW = 90, imgH = 68;
      if(y > pageH-70-imgH-14){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      let xPos = margin;
      try{
        if(before){
          doc.addImage(before, 'JPEG', xPos, y, imgW, imgH);
          doc.setFontSize(7.5); doc.setTextColor(120,128,150);
          doc.text(x.resolutionPhoto? 'Before' : 'Photo', xPos, y+imgH+9);
          xPos += imgW+10;
        }
        if(x.resolutionPhoto){
          doc.addImage(x.resolutionPhoto, 'JPEG', xPos, y, imgW, imgH);
          doc.setFontSize(7.5); doc.setTextColor(120,128,150);
          doc.text('After', xPos, y+imgH+9);
          xPos += imgW+10;
        }
        if(x.photos && x.photos.length>1){
          for(const extra of x.photos.slice(1,3)){
            if(xPos + imgW > pageW-margin) break;
            doc.addImage(extra, 'JPEG', xPos, y, imgW, imgH);
            xPos += imgW+10;
          }
        }
        doc.setFontSize(9); doc.setTextColor(20,27,46);
        y += imgH + 16;
      }catch(e){ doc.setFontSize(9); doc.setTextColor(20,27,46); }
    }

    function header(){
      doc.setFillColor(15,76,76);
      doc.rect(0,0,pageW,64,'F');
      try{ doc.addImage(LOGO_96, 'PNG', margin, 10, 44, 44); }catch(e){}
      doc.setTextColor(255,255,255);
      doc.setFontSize(14); doc.setFont(undefined,'bold');
      doc.text('Max Heights Majestic', margin+56, 30);
      doc.setFontSize(9.5); doc.setFont(undefined,'normal');
      doc.text('Resident Welfare Society — Inspection Report', margin+56, 44);
      doc.setTextColor(20,27,46);
    }
    function footer(pageNum, totalPages){
      doc.setFontSize(8.5); doc.setTextColor(120,128,150);
      doc.text('Report '+reportNo, margin, pageH-20);
      doc.text('Page '+pageNum+' of '+totalPages, pageW-margin-70, pageH-20);
      doc.setTextColor(20,27,46);
    }

    let y = 90;
    header();
    doc.setFontSize(11); doc.setFont(undefined,'bold');
    doc.text('Report No: '+reportNo, margin, y); y+=14;
    doc.setFont(undefined,'normal'); doc.setFontSize(9.5);
    doc.text('Generated: '+fmtDateTime(new Date().toISOString())+rangeLabel+'   ·   Inspections: '+DB.inspections.filter(r=>inRange(r.date)).length+'   ·   Open Defects: '+DB.defects.filter(x=>x.status!=='closed' && inRange(x.createdAt)).length, margin, y); y+=22;

    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Inspection Submissions', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    let pageNum = 1;
    const rowsA = DB.inspections.filter(r=> inRange(r.date)).slice(0,200);
    for(const r of rowsA){
      const s = collectDraftStats(r);
      const line = fmtDate(r.date)+'  ·  '+SECTION_DEFS[r.formType].label+'  ·  '+towerLine(r.formType, r.tower)+'  ·  '+(r.supervisorName||'—')+'  ·  '+s.ok+' OK / '+s.notOk+' issues';
      if(y > pageH-70){ footer(pageNum, '~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(line, margin, y); y+=13;
    }
    y+=10;
    if(y > pageH-120){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Open Defects', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    const rowsB = DB.defects.filter(x=>x.status!=='closed' && inRange(x.createdAt));
    if(!rowsB.length){ doc.text('No open defects at time of report.', margin, y); y+=13; }
    for(const x of rowsB){
      const tag = isBreach(x) ? ' [CRITICAL BREACH]' : (isOverdue(x) ? ' [OVERDUE]' : '');
      const who = x.assignedTo ? '  ·  Assigned: '+x.assignedTo : '';
      const src2 = x.source==='resident' ? 'Resident complaint'+(x.flat? ' (Flat '+x.flat+')' : '') : 'Tower '+x.tower;
      const lines = doc.splitTextToSize('['+x.priority.toUpperCase()+'] '+src2+' — '+x.location+' — '+(x.observation||'')+tag+who, pageW-margin*2);
      if(y > pageH-70){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(lines, margin, y); y += lines.length*12 + 4;
      addDefectPhotos(x);
    }

    // Resolved defects — with exact resolution time, duration and resident rating
    y+=10;
    if(y > pageH-120){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
    doc.setFont(undefined,'bold'); doc.setFontSize(12);
    doc.text('Resolved Defects', margin, y); y+=16;
    doc.setFont(undefined,'normal'); doc.setFontSize(9);
    const rowsC = DB.defects.filter(x=>x.status==='closed' && inRange(x.closedAt)).sort((a,b)=>(b.closedAt||'').localeCompare(a.closedAt||'')).slice(0,150);
    if(!rowsC.length){ doc.text('No resolved defects yet.', margin, y); y+=13; }
    for(const x of rowsC){
      const src2 = x.source==='resident' ? 'Resident complaint'+(x.flat? ' (Flat '+x.flat+')' : '') : 'Tower '+x.tower;
      const ratingTxt = x.rating ? ('  ·  Resident rating: '+x.rating+'/5'+(x.review? ' — "'+x.review+'"' : '')) : '';
      const lines = doc.splitTextToSize('[RESOLVED '+fmtDateTime(x.closedAt)+resolutionDurationText(x)+'] '+src2+' — '+x.location+' — '+(x.observation||'')+(x.resolutionNote? '  ·  Fix: '+x.resolutionNote : '')+(x.resolvedBy? '  ·  By: '+x.resolvedBy : '')+ratingTxt, pageW-margin*2);
      if(y > pageH-70){ footer(pageNum,'~'); doc.addPage(); pageNum++; header(); y=90; }
      doc.text(lines, margin, y); y += lines.length*12 + 4;
      addDefectPhotos(x);
    }
    const total = doc.internal.getNumberOfPages();
    for(let p=1;p<=total;p++){ doc.setPage(p); doc.setFontSize(8.5); doc.setTextColor(120,128,150); doc.text('Report '+reportNo, margin, pageH-20); doc.text('Page '+p+' of '+total, pageW-margin-70, pageH-20); }

    doc.save(reportNo+'.pdf');
    await logAudit('report_generated', 'PDF report '+reportNo);
    showToast('PDF downloaded');
  }catch(e){
    console.error(e);
    showToast('PDF generation failed — using print fallback');
    printConsolidated();
  }
  if(btn) btn.disabled = false;
}

async function generateMonthlySummaryPDF(){
  const monthStr = (document.getElementById('msMonth') && document.getElementById('msMonth').value) || todayStr().slice(0,7);
  const mStart = new Date(monthStr+'-01T00:00:00');
  const mEnd = new Date(mStart); mEnd.setMonth(mEnd.getMonth()+1);
  const inMonth = (iso)=> iso && new Date(iso) >= mStart && new Date(iso) < mEnd;
  const monthLabel = mStart.toLocaleDateString('en-IN',{month:'long', year:'numeric'});

  const insp = DB.inspections.filter(r=> inMonth(r.submittedAt));
  const byType = {};
  insp.forEach(r=>{ const l = SECTION_DEFS[r.formType] ? SECTION_DEFS[r.formType].label : r.formType; byType[l] = (byType[l]||0)+1; });
  const raised = DB.defects.filter(x=> inMonth(x.createdAt));
  const resolved = DB.defects.filter(x=> x.status==='closed' && inMonth(x.closedAt));
  const stillOpen = DB.defects.filter(x=> x.status!=='closed');
  const resComplaints = raised.filter(x=> x.source==='resident');
  const avgH = resolved.length ? resolved.reduce((s,x)=> s + Math.max(0, new Date(x.closedAt)-new Date(x.createdAt)), 0)/resolved.length/3600000 : null;
  const ratedInMonth = DB.defects.filter(x=> x.rating && inMonth(x.ratedAt));
  const avgRating = ratedInMonth.length ? ratedInMonth.reduce((s,x)=>s+x.rating,0)/ratedInMonth.length : null;
  const locCounts = {};
  raised.forEach(x=>{ locCounts[x.location] = (locCounts[x.location]||0)+1; });
  const hotspots = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const perf = {};
  resolved.forEach(x=>{
    if(!x.resolvedBy) return;
    if(!perf[x.resolvedBy]) perf[x.resolvedBy] = {n:0, ms:0, rSum:0, rN:0};
    perf[x.resolvedBy].n++; perf[x.resolvedBy].ms += Math.max(0, new Date(x.closedAt)-new Date(x.createdAt));
    if(x.rating){ perf[x.resolvedBy].rSum += x.rating; perf[x.resolvedBy].rN++; }
  });
  const perfRows = Object.keys(perf).map(n=>{ const a=perf[n]; return {name:n, n:a.n, avgH:a.ms/a.n/3600000, avgR:a.rN? (a.rSum/a.rN):null}; }).sort((a,b)=>b.n-a.n);
  const fmtH = (h)=> h===null ? '—' : (h>=24 ? (h/24).toFixed(1)+' days' : Math.round(h)+'h');

  if(typeof window.jspdf==='undefined'){
    showToast('PDF engine unavailable — using browser print instead');
    const area = document.getElementById('printArea');
    area.innerHTML = '<h2>Max Heights Majestic — Monthly Summary · '+monthLabel+'</h2>'
      + '<p style="font-size:12px;">Inspections filed: '+insp.length+' · Issues raised: '+raised.length+' · Resolved: '+resolved.length+' · Still open: '+stillOpen.length+'</p>'
      + '<p style="font-size:12px;">Avg resolution time: '+fmtH(avgH)+' · Resident complaints: '+resComplaints.length+' · Avg resident rating: '+(avgRating? avgRating.toFixed(1)+'/5 ('+ratedInMonth.length+' reviews)':'—')+'</p>'
      + (hotspots.length? '<h3>Hotspots</h3>'+hotspots.map(([l,c])=>'<p style="font-size:12px; margin:2px 0;">'+esc(l)+' — '+c+'×</p>').join('') : '')
      + (perfRows.length? '<h3>Supervisor Performance</h3>'+perfRows.map(s=>'<p style="font-size:12px; margin:2px 0;">'+esc(s.name)+' — fixed '+s.n+' · avg '+fmtH(s.avgH)+(s.avgR? ' · '+s.avgR.toFixed(1)+'/5':'')+'</p>').join('') : '');
    document.body.classList.add('printing-report');
    area.style.display='block';
    setTimeout(()=>{ window.print(); area.style.display='none'; document.body.classList.remove('printing-report'); }, 50);
    return;
  }
  const btn = document.getElementById('msBtn');
  if(btn) btn.disabled = true;
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const margin = 40;
    doc.setFillColor(15,76,76);
    doc.rect(0,0,pageW,64,'F');
    try{ doc.addImage(LOGO_96, 'PNG', margin, 10, 44, 44); }catch(e){}
    doc.setTextColor(255,255,255);
    doc.setFontSize(14); doc.setFont(undefined,'bold');
    doc.text('Max Heights Majestic', margin+56, 30);
    doc.setFontSize(9.5); doc.setFont(undefined,'normal');
    doc.text('Monthly Summary — '+monthLabel, margin+56, 44);
    doc.setTextColor(20,27,46);

    let y = 92;
    function h2(t){ doc.setFont(undefined,'bold'); doc.setFontSize(12); doc.text(t, margin, y); y+=15; doc.setFont(undefined,'normal'); doc.setFontSize(9.5); }
    function line(t){ const ls = doc.splitTextToSize(t, pageW-margin*2); doc.text(ls, margin, y); y += ls.length*12 + 2; }

    h2('At a Glance');
    line('Inspections filed: '+insp.length+'    ·    Issues raised: '+raised.length+'    ·    Issues resolved: '+resolved.length+'    ·    Still open at month end: '+stillOpen.length);
    line('Average resolution time: '+fmtH(avgH)+'    ·    Resident complaints raised: '+resComplaints.length);
    line('Average resident rating: '+(avgRating? avgRating.toFixed(1)+' / 5  ('+ratedInMonth.length+' review'+(ratedInMonth.length!==1?'s':'')+')' : 'no ratings this month'));
    y+=8;

    if(Object.keys(byType).length){
      h2('Inspections by Type');
      Object.entries(byType).forEach(([label,c])=> line(label+': '+c));
      y+=8;
    }
    if(hotspots.length){
      h2('Hotspot Locations (most issues raised)');
      hotspots.forEach(([loc,c])=> line(c+'×  '+loc));
      y+=8;
    }
    if(perfRows.length){
      h2('Supervisor Performance (resolutions this month)');
      perfRows.forEach(s=> line(s.name+' — fixed '+s.n+'  ·  avg '+fmtH(s.avgH)+(s.avgR? '  ·  resident rating '+s.avgR.toFixed(1)+'/5' : '')));
    }
    doc.setFontSize(8.5); doc.setTextColor(120,128,150);
    doc.text('Generated '+fmtDateTime(new Date().toISOString()), margin, doc.internal.pageSize.getHeight()-20);
    doc.save('MHM-monthly-summary-'+monthStr+'.pdf');
    await logAudit('report_generated', 'Monthly summary '+monthStr);
    showToast('Monthly summary downloaded');
  }catch(e){
    console.error(e);
    showToast('PDF generation failed');
  }
  if(btn) btn.disabled = false;
}

function exportDefectsCsv(){
  const rows = [['ID','Source','Tower','Flat','Form','Location','Observation','Priority','Status','Assigned To','Target Date','Created At','Resolved At','Resolved By','Resolution Note','Resident Rating','Resident Review','Overdue']];
  DB.defects.forEach(x=> rows.push([x.id, x.source==='resident'?'Resident':'Inspection', x.tower, x.flat||'', defectFormLabel(x), x.location, x.observation, x.priority, x.status, x.assignedTo, x.targetDate, x.createdAt, x.closedAt||'', x.resolvedBy||'', x.resolutionNote||'', x.rating||'', x.review||'', isOverdue(x)?'YES':'NO']));
  const csv = rows.map(r=> r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'defect-log-'+todayStr()+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV downloaded');
}
function exportExcel(){
  if(typeof XLSX==='undefined'){ showToast('Excel engine unavailable — downloading CSV instead'); exportDefectsCsv(); return; }
  try{
    const wb = XLSX.utils.book_new();
    // Summary sheet — open the file and the picture is right there
    const closedAll = DB.defects.filter(x=>x.status==='closed' && x.closedAt);
    const avgResH = closedAll.length ? closedAll.reduce((s,x)=> s + Math.max(0, new Date(x.closedAt)-new Date(x.createdAt)),0)/closedAll.length/3600000 : null;
    const ratedAll = DB.defects.filter(x=>x.rating);
    const avgRate = ratedAll.length ? (ratedAll.reduce((s,x)=>s+x.rating,0)/ratedAll.length) : null;
    const sumRows = [
      ['Max Heights Majestic — Summary', ''],
      ['Generated', fmtDateTime(new Date().toISOString())],
      ['', ''],
      ['Total inspections', DB.inspections.length],
      ['Total defects', DB.defects.length],
      ['Open defects', DB.defects.filter(x=>x.status!=='closed').length],
      ['Overdue', DB.defects.filter(isOverdue).length],
      ['Resolved', closedAll.length],
      ['Avg resolution time', avgResH===null? '—' : (avgResH>=24 ? (avgResH/24).toFixed(1)+' days' : Math.round(avgResH)+'h')],
      ['Resident complaints', DB.defects.filter(x=>x.source==='resident').length],
      ['Avg resident rating', avgRate===null? '—' : avgRate.toFixed(1)+' / 5 ('+ratedAll.length+' reviews)'],
      ['', ''],
      ['Open defects by tower', '']
    ];
    TOWERS.forEach(t=>{
      const n = DB.defects.filter(x=>x.tower===t && x.status!=='closed').length;
      if(n) sumRows.push(['Tower '+t, n]);
    });
    const perfAgg = {};
    closedAll.forEach(x=>{
      if(!x.resolvedBy) return;
      if(!perfAgg[x.resolvedBy]) perfAgg[x.resolvedBy]={n:0,ms:0,rS:0,rN:0};
      perfAgg[x.resolvedBy].n++; perfAgg[x.resolvedBy].ms += Math.max(0,new Date(x.closedAt)-new Date(x.createdAt));
      if(x.rating){ perfAgg[x.resolvedBy].rS+=x.rating; perfAgg[x.resolvedBy].rN++; }
    });
    if(Object.keys(perfAgg).length){
      sumRows.push(['','']);
      sumRows.push(['Supervisor performance','Fixed','Avg time','Avg rating']);
      Object.keys(perfAgg).sort((a,b)=>perfAgg[b].n-perfAgg[a].n).forEach(name=>{
        const a=perfAgg[name]; const h=a.ms/a.n/3600000;
        sumRows.push([name, a.n, (h>=24?(h/24).toFixed(1)+' days':Math.round(h)+'h'), a.rN? (a.rS/a.rN).toFixed(1)+'/5':'—']);
      });
    }
    const sumWs = XLSX.utils.aoa_to_sheet(sumRows);
    sumWs['!cols'] = [{wch:28},{wch:16},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb, sumWs, 'Summary');
    const insRows = DB.inspections.map(r=>{ const s=recordStats(r); return {Date:r.date, Type:SECTION_DEFS[r.formType].label, Tower:r.tower, Supervisor:r.supervisorName, OK:s.ok, Issues:s.notOk, SubmittedAt:r.submittedAt}; });
    const defRows = DB.defects.map(x=>({Source:x.source==='resident'?'Resident':'Inspection', Tower:x.tower, Flat:x.flat||'', Location:x.location, Observation:x.observation, Priority:x.priority, Status:x.status, AssignedTo:x.assignedTo, TargetDate:x.targetDate, CreatedAt:x.createdAt, ResolvedAt:x.closedAt||'', ResolvedBy:x.resolvedBy||'', ResolutionNote:x.resolutionNote||'', ResidentRating:x.rating||'', ResidentReview:x.review||'', Overdue:isOverdue(x)?'YES':'NO'}));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(insRows), 'Inspections');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(defRows), 'Defects');
    XLSX.writeFile(wb, 'max-heights-inspections-'+todayStr()+'.xlsx');
    showToast('Excel file downloaded');
  }catch(e){ console.error(e); showToast('Excel export failed — downloading CSV instead'); exportDefectsCsv(); }
}

   RESIDENT COMPLAINTS PORTAL
   Residents raise complaints (with photo), track their status,
   and after resolution give a star rating + review. Complaints
   are stored as defects (source:'resident') so they flow through
   the exact same assign → WhatsApp → resolve pipeline as
   inspection defects, and appear in every report/export.
========================================================= */

}

}

// Local-only record of THIS device's own recent resident-complaint
// submissions — used solely to catch an accidental double-submit (a
// slow-connection double-tap, or reloading and resubmitting because it
// wasn't clear the first one went through). Never synced or read by
// anyone else; kept small and pruned by age.
async function checkResidentLocalDuplicate(flat, problemText){
  try{
    const saved = await storeGetPersonal('residentRecentComplaints');
    const items = (saved && saved.value) || [];
    const fiveDaysAgo = Date.now() - 5*24*3600*1000;
    const textNew = (problemText||'').toLowerCase();
    const flatNorm = (flat||'').trim().toLowerCase();
    return items.find(x=> x.at > fiveDaysAgo && x.flat===flatNorm
      && textNew.length>3 && (x.problemText||'').split(' ').some(w=> w.length>3 && textNew.includes(w))
    ) || null;
  }catch(e){ return null; } // never block a real submission over a failed local-storage read
}
async function rememberResidentComplaintLocally(flat, problemText){
  try{
    const saved = await storeGetPersonal('residentRecentComplaints');
    const items = (saved && saved.value) || [];
    items.push({flat:(flat||'').trim().toLowerCase(), problemText:(problemText||'').toLowerCase(), at: Date.now()});
    while(items.length>8) items.shift();
    await storeSetPersonal('residentRecentComplaints', {value: items});
  }catch(e){}
}
async function saveResidentComplaint(){
  snapshotResidentForm();
  const d = state._residentDraft;
  if(!d.rcName || !d.rcName.trim()){ showToast(T('toast_enter_name')); return; }
  if(!d.rcFlat || !d.rcFlat.trim()){ showToast(T('toast_enter_flat')); return; }
  if(!d.rcProblem || !d.rcProblem.trim()){ showToast(T('toast_enter_problem')); return; }
  if(!d.rcMobile || !/^[0-9]{10}$/.test(d.rcMobile.trim())){ showToast('Mobile number is required (10 digits)'); return; }
  if(state.residentMode){
    // DB.defects is always empty for a resident session (Firestore only
    // grants them create access, never read — see firestore.rules), so
    // the cross-complaint check below literally has nothing to compare
    // against here. The only duplicate this device CAN meaningfully
    // detect is one it submitted itself, so check that instead: no new
    // read permission needed, no other resident's data ever touched.
    const recentDup = await checkResidentLocalDuplicate(d.rcFlat, d.rcProblem);
    if(recentDup){
      askConfirm({
        title: T('rc_dup_title'),
        message: T('rc_dup_msg'),
        confirmLabel: T('rc_dup_confirm'),
        danger: false,
        onConfirm: ()=> doSaveResidentComplaint()
      });
      return;
    }
    await doSaveResidentComplaint();
    return;
  }
  // Duplicate check — same flat, similar wording, in the last 5 days
  const textNew = (d.rcProblem||'').toLowerCase();
  const fiveDaysAgo = new Date(Date.now() - 5*24*3600*1000).toISOString();
  const dup = DB.defects.find(x=> x.source==='resident' && x.status!=='closed' && x.createdAt > fiveDaysAgo
    && x.flat && d.rcFlat && x.flat.toLowerCase()===d.rcFlat.trim().toLowerCase()
    && textNew.length>3 && (x.observation||'').toLowerCase().split(' ').some(w=> w.length>3 && textNew.includes(w)));
  if(dup){
    const statusTxt = dup.status==='in-progress' ? T('status_inprogress') : T('status_open');
    askConfirm({
      title: T('dup_title'),
      message: '"'+dup.location+'" — '+fmtDateTime(dup.createdAt)+' · '+statusTxt+(dup.assignedTo? ' · '+dup.assignedTo : '')+'. '+T('dup_msg'),
      confirmLabel: T('dup_confirm'),
      danger: false,
      onConfirm: ()=> doSaveResidentComplaint()
    });
    return;
  }
  await doSaveResidentComplaint();
}
async function doSaveResidentComplaint(){
  if(state._residentSubmitting) return; // guard against double-tap while a save is already in flight
  const d = state._residentDraft;
  const flatLoc = 'Flat '+d.rcFlat.trim();
  const observationText = (d.rcProblem && d.rcProblem.trim()) || 'Complaint raised by resident.';
  // Auto-analyze silently — no button, no resident-facing step. Same local
  // rule engine used elsewhere, run automatically against the complaint text
  // so priority/tags/vendor are set without anyone having to press Analyze.
  const ai = aiAnalyzeIssue({label:'Resident Complaint', location:flatLoc, observation:observationText, existingTags:['Resident Complaint'], hasPhoto: state._residentPhotos.length>0});
  const defect = {
    id: uid('def'), code: genComplaintId(), sourceRecordId: null, formType: 'resident', source: 'resident',
    residentName: d.rcName.trim(), flat: d.rcFlat.trim(), mobile: (d.rcMobile||'').trim(),
    tower: d.rcTower || 'A',
    location: flatLoc,
    observation: observationText,
    priority: ai.priority, tags: aiUnique(['Resident Complaint'].concat(ai.tags)),
    photo: state._residentPhotos[0] || null, photos: state._residentPhotos.slice(), resolutionPhoto: null, resolutionNote: null,
    media: state._residentMedia.slice(),
    assignedTo: d.rcAssign || ai.assignee || autoAssignFor(['Resident Complaint']) || '', targetDate: '',
    status: 'open', createdAt: new Date().toISOString(), closedAt: null,
    resolvedBy: null, rating: null, review: null, ratedAt: null
  };

  if(state.residentMode){
    // The public complaint link never starts background sync or the
    // online-reconnect listener (see init() — resident mode returns
    // early, on purpose, since it's a single-form portal). That's fine
    // for a normal save, but if the cloud write fails here, nothing would
    // ever come back to retry it — the record would sit local-only on
    // this one device forever while the resident sees a "submitted"
    // screen implying staff already has it. Give this specific save a
    // real chance before deciding what to honestly tell them.
    state._residentSubmitting = true; render();
    const status = await storeSetWithStatus('defect:'+defect.id, defect);
    if(!status.localOk && !status.cloudOk){
      state._residentSubmitting = false;
      showToast('Could not save — check your connection and try again');
      render();
      return;
    }
    DB.defects.unshift(defect);
    await rememberResidentComplaintLocally(d.rcFlat, d.rcProblem);
    await logAudit('resident_complaint', defect.location+' — by '+defect.residentName+' (Flat '+defect.flat+')');
    let confirmed = status.cloudOk;
    for(let i=0; i<4 && !confirmed; i++){
      await new Promise(res=>setTimeout(res, 2000));
      await flushSyncQueue();
      confirmed = !SYNC_QUEUE.some(q=>q.key==='defect:'+defect.id);
    }
    // Still keep trying quietly for as long as this tab happens to stay
    // open, in case connectivity returns later than the retries above.
    window.addEventListener('online', ()=>{ flushSyncQueue(); });
    state._residentSubmitting = false;
    state._residentSubmitted = true;
    state._residentSubmittedCode = defect.code;
    state._residentSubmittedDefectId = defect.id;
    state._residentSubmittedConfirmed = confirmed;
    state._residentFormOpen = false;
    state._residentPhotos = [];
    state._residentMedia = [];
    state._residentDraft = {};
    render();
    return;
  }

  const ok = await storeSet('defect:'+defect.id, defect);
  if(!ok){ showToast('Could not save — check your connection and try again'); return; }
  DB.defects.unshift(defect);
  await logAudit('resident_complaint', defect.location+' — by '+defect.residentName+' (Flat '+defect.flat+')');
  const assigned = defect.assignedTo, mobile = memberMobile(assigned);
  closeResidentForm();
  showToast(T('toast_complaint_done'));
  if(assigned && mobile){
    state._waShare = [{name: assigned, mobile: mobile, count: 1,
      msg: '🏢 Max Heights Majestic — new resident complaint\n📍 '+defect.location+' (Flat '+defect.flat+', '+defect.residentName+')\n📝 '+defect.observation+'\n🗓 '+fmtDateTime(defect.createdAt)+'\nPlease update the status in the MHM Inspection app once fixed.'}];
    render();
  }
}
// Manual re-try for the "saved but not yet confirmed" screen — same
// mechanism as the automatic retries above, just triggered by hand.
async function retryResidentSync(){
  const id = state._residentSubmittedDefectId;
  if(!id) return;
  showToast('Trying again…');
  await flushSyncQueue();
  const confirmed = !SYNC_QUEUE.some(q=>q.key==='defect:'+id);
  state._residentSubmittedConfirmed = confirmed;
  render();
  showToast(confirmed ? 'Confirmed — your complaint reached our server ✓' : 'Still couldn\'t confirm — please check your connection');
}
function setReviewText(id, val){ state._reviewDraft[id] = val; }
function pickRateStars(id, n){
  const el = document.getElementById('rv_'+id);
  if(el) state._reviewDraft[id] = el.value;
  state._rateOpen = id; state._rateStars = n;
  render();
}
async function saveResidentRating(id){
  const c = DB.defects.find(x=>x.id===id); if(!c) return;
  const stars = (state._rateOpen===id) ? state._rateStars : 0;
  if(!stars){ showToast('Tap the stars to rate first'); return; }
  const el = document.getElementById('rv_'+id);
  const prev = {rating:c.rating, review:c.review, ratedAt:c.ratedAt};
  c.rating = stars;
  c.review = el ? el.value.trim() : (state._reviewDraft[id]||'');
  c.ratedAt = new Date().toISOString();
  const ok = await storeSet('defect:'+c.id, c);
  if(!ok){ Object.assign(c, prev); showToast('Could not save — check your connection and try again'); render(); return; }
  await logAudit('resident_rating', c.location+' rated '+stars+'/5 by resident');
  state._rateOpen = null; state._rateStars = 0; delete state._reviewDraft[id];
  render();
  showToast(T('rate_thanks'));
}
function residentRatingWidget(c){
  const active = state._rateOpen===c.id ? state._rateStars : 0;
  let starsRow = '';
  for(let i=1;i<=5;i++){
    starsRow += '<button type="button" class="btn btn-ghost" style="min-width:40px; padding:6px 8px; font-size:22px; line-height:1; color:'+(i<=active?'var(--warn)':'var(--ink-faint)')+'; border:none; background:none;" onclick="pickRateStars(\''+c.id+'\','+i+')">'+(i<=active?'★':'☆')+'</button>';
  }
  return '<div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);">'
    + '<div style="font-weight:700; font-size:13px;">'+T('rate_q')+'</div>'
    + '<div style="display:flex; align-items:center; margin:4px 0;">'+starsRow+'</div>'
    + '<div class="field" style="margin-bottom:8px;"><textarea id="rv_'+c.id+'" placeholder="'+T('rate_review_ph')+'" oninput="setReviewText(\''+c.id+'\',this.value)">'+esc(state._reviewDraft[c.id]||'')+'</textarea></div>'
    + '<button class="btn btn-primary btn-sm" onclick="saveResidentRating(\''+c.id+'\')">'+icon('star',14)+' '+T('rate_submit')+'</button>'
    + '</div>';
}

// Ticks the countdown above down to 0, then attempts to auto-close the tab —
// so a resident who filed a complaint never has to remember to tap Close.
// Guarded with a dataset flag on the element (same pattern as
// animateStatNums above) because postRenderHooks() runs after every
// render(); without the guard, any extra render would spawn a second
// interval racing the first.
function initResidentCountdown(){
  const el = document.getElementById('rcCountdownNum');
  if(!el || el.dataset.started) return;
  el.dataset.started = '1';
  let n = 10;
  const timer = setInterval(()=>{
    if(!document.body.contains(el)){ clearInterval(timer); return; }
    n -= 1;
    if(n <= 0){
      clearInterval(timer);
      closeResidentWindow();
      return;
    }
    el.textContent = n;
  }, 1000);
}

function auditActionCategory(action){
  if(action==='data_cleared') return 'danger';
  if(action==='defect_logged' || action==='defect_status' || action==='defect_edited' || action==='task_assigned' || action==='member_removed' || action==='staff_removed' || action==='sync_conflict') return 'warn';
  if(action==='inspection_submitted' || action==='defect_resolved' || action==='task_completed' || action==='member_added' || action==='staff_added') return 'ok';
  return 'info'; // report_generated, backup_exported, member_edited, staff_edited, etc.
}
function auditLogHtml(){
  const entries = DB.audit;
  if(!entries.length) return '<p style="font-size:12.5px; color:var(--ink-faint);">No activity logged yet.</p>';
  return entries.map(e=> '<div class="item-row" style="flex-direction:column; align-items:stretch;"><div style="display:flex; justify-content:space-between; align-items:center;"><b style="font-size:12px; display:flex; align-items:center; gap:6px;"><span class="audit-dot audit-dot-'+auditActionCategory(e.action)+'"></span>'+e.action.replace(/_/g,' ')+(e.by?' — '+esc(e.by):'')+'</b><span class="defect-meta">'+fmtDateTime(e.at)+'</span></div><span style="font-size:11.5px; color:var(--ink-soft); margin-left:14px;">'+esc(e.details||'')+'</span></div>').join('');
}

function auditLogModal(){
  const q = (state._auditLogQ||'').trim().toLowerCase();
  let entries = DB.audit;
  if(q){
    entries = entries.filter(e=>
      e.action.replace(/_/g,' ').toLowerCase().includes(q) ||
      (e.by||'').toLowerCase().includes(q) ||

    if(!entries.length) return '<p style="font-size:12.5px; color:var(--ink-faint);">'+(q? 'No matching activity.' : 'No activity logged yet.')+'</p>';

    + '<div class="field search-field" style="margin:8px 0;"><input type="text" placeholder="Search by action, person or detail…" value="'+esc(state._auditLogQ||'')+'" oninput="state._auditLogQ=this.value; renderModalLayer();"></div>'
    + '<div class="stack" style="gap:8px;">'+html+'</div>'
    + '<div class="btn-row" style="margin-top:10px;"><button class="btn btn-primary" onclick="closeModals()">Close</button></div>'

function teamMembersHtml(){

  const admins = DB.members.filter(m=>m.role==='admin');

    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveVendor()">'+icon('check',15)+' Save vendor</button></div>'

async function saveVendor(){
  const name = (document.getElementById('venName').value||'').trim();
  const mobile = (document.getElementById('venMobile').value||'').trim();
  if(!name){ showToast('Vendor name is required'); return; }
  if(!/^[0-9]{10}$/.test(mobile)){ showToast('Mobile must be exactly 10 digits'); return; }
  const v = {
    id: uid('ven'),
    name,
    trade: document.getElementById('venTrade').value,
    mobile,
    notes: (document.getElementById('venNotes').value||'').trim(),
    createdAt: new Date().toISOString()
  };
  const ok = await storeSet('vendor:'+v.id, v);
  if(!ok){ showToast('Failed to save. Try again.'); return; }
  DB.vendors.push(v);
  DB.vendors.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
  await logAudit('vendor_added', 'Vendor '+name+' ('+v.trade+') added');
  closeModals();
  showToast('Vendor saved ✓');
}
function confirmDeleteVendor(id){
  const v = DB.vendors.find(x=>x.id===id);
  if(!v) return;
  askConfirm({
    title:'Remove vendor?',
    message:'Delete '+v.name+' ('+v.mobile+') from the vendor directory? This cannot be undone.',
    confirmLabel:'Remove', danger:true,
    onConfirm: ()=> deleteVendor(id)
  });
}
async function deleteVendor(id){
  const v = DB.vendors.find(x=>x.id===id);
  if(!v) return;
  await storeDelete('vendor:'+id);
  DB.vendors = DB.vendors.filter(x=>x.id!==id);
  await logAudit('vendor_deleted', 'Vendor '+v.name+' removed');
  render();
  showToast('Vendor removed');
}

   complaint form, Issue Popup, and New Defect form. Photos in each of
   those forms keep their own existing thumbnail handling untouched;
   this only covers video/audio, which look and behave identically
   everywhere (same native-capture approach as the SOS picker above).

// Photos get resized+recompressed (see compressImage), but video/audio
// can't be shrunk the same way — so cap the raw file size instead. Chosen
// so a couple of these plus the rest of a defect's fields comfortably fit
// under Firestore's 1MiB per-document limit even after base64 inflates
// the file by about a third. Without this, an oversized attachment used
// to save fine locally (IndexedDB has no such limit) while silently
// failing to ever reach Firestore.
const MEDIA_FILE_MAX_BYTES = 400 * 1024;
function readMediaFile(input, type, onLoaded){
  const files = input.files;
  if(!files || !files.length) return;
  const file = files[0];
  if(file.size > MEDIA_FILE_MAX_BYTES){
    showToast((type==='video'?'Video':'Audio')+' is too large ('+Math.round(file.size/1024)+'KB) — please use a shorter clip, under '+Math.round(MEDIA_FILE_MAX_BYTES/1024)+'KB');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){ onLoaded({type:type, dataUrl:e.target.result, name:file.name, mime:file.type}); };
  reader.onerror = ()=>showToast('Could not read file');
  reader.readAsDataURL(file);
}

function buildBackupPayload(){
  // Media (photos/video/audio/signatures) is almost certainly the
  // dominant contributor to payload size as data accumulates over months
  // — a base64 photo alone can be tens of KB, multiplied across every
  // inspection/defect/task/SOS ever created. Stripping it keeps
  // JSON.stringify() fast (it currently runs synchronously on the main
  // thread) and the payload small enough to comfortably upload from a
  // mobile browser, while fully preserving what actually matters for a
  // backup: every record's text, status, assignment, and timestamps.
  const stripMedia = (arr) => (arr||[]).map(rec => {
    const clean = {...rec};
    delete clean.photo; delete clean.photos; delete clean.resolutionPhoto;
    delete clean.media; delete clean.signature; delete clean.donePhoto;
    return clean;
  });
  return {
    exportedAt: new Date().toISOString(),
    note: 'Photos, video, audio and signatures are excluded to keep this backup fast and lightweight. All text, status, assignment, and timestamp data is complete.',
    inspections: stripMedia(DB.inspections), defects: stripMedia(DB.defects), audit: DB.audit,
    tasks: stripMedia(DB.tasks), members: DB.members, vendors: DB.vendors, sos: stripMedia(DB.sos)
  };
}
async function exportBackup(){
  const backup = buildBackupPayload();
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='max-heights-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  await logAudit('backup_exported', 'Backup JSON downloaded');
  await loadAll();
  showToast('Backup downloaded');
}
async function backupToGoogleDrive(){
  if(!GOOGLE_DRIVE_ENABLED){
    showToast('Google Drive backup not set up yet — see GOOGLE_DRIVE_CLIENT_ID near FIREBASE_CONFIG in the source');
    return;
  }
  if(state._driveBackupBusy) return;
  state._driveBackupBusy = true; render();
  try{
    await loadGsi();
    const accessToken = await gdriveRequestToken();
    const email = await gdriveSignedInEmail(accessToken);
    if(email && email.toLowerCase()!==GOOGLE_DRIVE_TARGET_EMAIL.toLowerCase()){
      showToast('Signed in as '+email+' — please pick '+GOOGLE_DRIVE_TARGET_EMAIL+' in the Google popup instead');
      return;
    }
    const json = JSON.stringify(buildBackupPayload(), null, 2);
    const folderId = await gdriveGetOrCreateFolder(accessToken);
    await gdriveUploadBackup(accessToken, folderId, json);
    await logAudit('backup_exported', 'Backup uploaded to Google Drive ('+GOOGLE_DRIVE_TARGET_EMAIL+')');
    await loadAll();
    showToast('Backup saved to Google Drive ✓');
  }catch(e){
    console.error('Google Drive backup failed', e);
    showToast('Drive backup failed — '+(e&&e.message?e.message:'please try again'));
  }finally{
    state._driveBackupBusy = false; render();
  }
}

    + '<p class="chart-fallback-note">'
      + (GOOGLE_DRIVE_ENABLED
          ? (last ? 'Last saved to Drive ('+esc(GOOGLE_DRIVE_TARGET_EMAIL)+'): '+fmtDateTime(last.at) : 'Not backed up to Google Drive yet — always saves to '+esc(GOOGLE_DRIVE_TARGET_EMAIL)+', overwriting the same file each time.')
          : 'Needs one-time setup — see the GOOGLE_DRIVE_CLIENT_ID comment near FIREBASE_CONFIG in the source.')
    + '</p>';
}
function confirmClearData(){
  askConfirm({
    title:'Clear all data?',
    message:'This permanently deletes ALL inspections, defects and tasks for everyone using this app, on every device. This cannot be undone.',
    confirmLabel:'Delete everything',
    danger:true,
    onConfirm: doClearData
  });
}
async function doClearData(){
  for(const r of DB.inspections) await storeDelete('insp:'+r.id);
  for(const x of DB.defects) await storeDelete('defect:'+x.id);
  for(const t of DB.tasks) await storeDelete('task:'+t.id);
  for(const s of DB.sos) await storeDelete('sos:'+s.id);
  await logAudit('data_cleared', 'All inspections, defects, tasks and SOS alerts were cleared');
  await loadAll();
  render();
  showToast('All data cleared');
}
</script>
</body>
</html>
