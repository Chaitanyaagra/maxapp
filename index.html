  transition: background-color .4s ease, border-color .4s ease, box-shadow .4s ease;
}
html[data-theme="dark"] .brand-logo {
  border-color: rgba(212, 175, 55, 0.4);
  box-shadow:
    0 3px 14px var(--brand-glow),
    inset 0 1px 1px rgba(255, 255, 255, 0.06);
}
.brand-eyebrow {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
}
.brand-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
}
.icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(255, 252, 245, 0.7);
  border: 1px solid var(--border);
  color: var(--ink);
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), background .2s ease, box-shadow .2s ease;
}
.icon-btn:hover {
  background: #fff;
  border-color: rgba(184, 145, 46, 0.35);
  box-shadow: var(--shadow-sm);
}
.icon-btn:active { transform: scale(0.94); }
html[data-theme="dark"] .icon-btn {
  background: rgba(255,255,255,0.05);
  border-color: rgba(94, 234, 212, 0.14);
}

/* Role switch — refined pill */
.role-switch {
  background: rgba(255, 252, 245, 0.7);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px;
  box-shadow: inset 0 1px 2px rgba(14, 79, 74, 0.05);
}
.role-switch button.active {
  background: linear-gradient(180deg, #1E7F76 0%, #0E4F4A 100%);
  box-shadow:
    0 4px 14px rgba(14, 79, 74, 0.32),
    inset 0 1px 0 rgba(255,255,255,0.15);
  color: #fff;
}

/* ── App container: airy spacing ── */
#app { padding: 20px 18px 28px; }
.stack { gap: 14px; }
.stat-grid { gap: 12px; }

/* ── Card — hairline gold accent, refined depth ── */
.card {
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  padding: 18px;
  transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s ease, border-color .2s ease;
}
.card::before {
  background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 45%);
  opacity: 0.5;
}
html[data-theme="dark"] .card::before {
  background: linear-gradient(135deg, rgba(94,234,212,0.06) 0%, transparent 45%);
}
.card-tight { padding: 14px 16px; }

/* Section labels — editorial tick */
.section-label {
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .18em;
}
.section-label::before {
  content: '';
  display: inline-block;
  width: 18px; height: 1.5px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin-right: 4px;
}

/* ── Home tiles — luxury card with subtle sheen and gold micro-accent ── */
.tile {
  padding: 16px 18px;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.5), transparent 60%),
    var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: transform .28s cubic-bezier(.16,1,.3,1), box-shadow .28s ease, border-color .2s ease;
}
.tile::before {
  background: linear-gradient(135deg, rgba(184,145,46,0.06) 0%, transparent 45%);
  opacity: 0;
  transition: opacity .3s ease;
}
.tile:hover::before { opacity: 1; }
.tile:hover {
  border-color: rgba(184,145,46,0.35);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
html[data-theme="dark"] .tile {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 60%), var(--surface);
}
html[data-theme="dark"] .tile:hover { border-color: rgba(212,175,55,0.35); }

.tile-icon {
  width: 46px; height: 46px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--brand-tint), rgba(255,255,255,0.5));
  color: var(--brand);
  box-shadow:
    0 6px 16px rgba(14,79,74,0.16),
    inset 0 1px 0 rgba(255,255,255,0.5);
  border: 1px solid rgba(14, 79, 74, 0.08);
}
html[data-theme="dark"] .tile-icon {
  background: linear-gradient(135deg, rgba(94,234,212,0.14), rgba(94,234,212,0.04));
  border-color: rgba(94, 234, 212, 0.2);
  color: var(--brand-fg, #5eead4);
}
.tile-icon.accent {
  background: linear-gradient(135deg, #E9CE7B 0%, #B8912E 100%);
  color: #fff;
  border-color: rgba(184, 145, 46, 0.5);
  box-shadow: var(--shadow-gold), inset 0 1px 0 rgba(255,255,255,0.35);
}
.tile-title { font-size: 15px; font-weight: 800; letter-spacing: -0.015em; color: var(--ink); }
.tile-sub { font-size: 12px; color: var(--ink-soft); margin-top: 3px; font-weight: 500; }

/* ── Stat cards — editorial with premium accent bar ── */
.stat-card {
  padding: 16px;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.55), transparent 55%),
    var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.stat-card::before {
  height: 3px;
  opacity: 1;
  background: linear-gradient(90deg, var(--brand) 0%, var(--brand-light) 55%, transparent 100%);
  border-radius: var(--radius) var(--radius) 0 0;
}
.stat-card.danger::before { background: linear-gradient(90deg, var(--danger), #ef8f8f 60%, transparent); }
.stat-card.warn::before { background: linear-gradient(90deg, var(--warn), #f5be7b 60%, transparent); }
.stat-card.ok::before { background: linear-gradient(90deg, var(--ok), #7bd3a7 60%, transparent); }
.stat-card.gold::before { background: linear-gradient(90deg, var(--gold), var(--gold-soft) 60%, transparent); }

html[data-theme="dark"] .stat-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 55%), var(--surface);
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: rgba(184, 145, 46, 0.35);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .16em;
  color: var(--ink-faint);
  font-weight: 600;
}
.stat-card .stat-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--brand-tint), rgba(255,255,255,0.4));
  border: 1px solid rgba(14, 79, 74, 0.08);
  box-shadow: 0 4px 10px rgba(14,79,74,0.14), inset 0 1px 0 rgba(255,255,255,0.55);
}
html[data-theme="dark"] .stat-card .stat-icon {
  background: linear-gradient(135deg, rgba(94,234,212,0.14), rgba(94,234,212,0.04));
  border-color: rgba(94, 234, 212, 0.2);
}

/* ── Buttons — refined with subtle sheen ── */
.btn {
  border-radius: 13px;
  font-weight: 700;
  letter-spacing: 0.005em;
  transition: transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease, background .2s ease, filter .2s ease;
}
.btn-primary {
  background: linear-gradient(180deg, #1E7F76 0%, #0E4F4A 100%);
  border: 1px solid #0E4F4A;
  box-shadow:
    0 8px 22px rgba(14, 79, 74, 0.32),
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.12);
}
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 10px 26px rgba(14,79,74,0.38), inset 0 1px 0 rgba(255,255,255,0.2); }
.btn-accent {
  background: linear-gradient(180deg, #D4AF37 0%, #B8912E 100%);
  color: #fff;
  border: 1px solid #a17e21;
  box-shadow: var(--shadow-gold), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-accent:hover { filter: brightness(1.06); }
.btn-ghost {
  background: rgba(255,252,245,0.6);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: #fff; border-color: rgba(184,145,46,0.35); }
html[data-theme="dark"] .btn-ghost {
  background: rgba(255,255,255,0.03);
  border-color: rgba(94, 234, 212, 0.14);
}
.btn-danger {
  background: linear-gradient(180deg, #dc3535 0%, #a91212 100%);
  border: 1px solid #a91212;
  box-shadow: 0 8px 22px rgba(185, 28, 28, 0.30), inset 0 1px 0 rgba(255,255,255,0.18);
}

/* ── Bottom nav — refined glass + gold hairline ── */
.bottomnav {
  padding: 10px 8px calc(10px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(180deg, rgba(255,252,245,0.72) 0%, rgba(255,252,245,0.9) 100%);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  border-top: 1px solid var(--glass-border);
  box-shadow:
    0 -1px 0 rgba(184, 145, 46, 0.18),
    0 -12px 40px rgba(14, 79, 74, 0.12);
}
html[data-theme="dark"] .bottomnav {
  background: linear-gradient(180deg, rgba(11,22,21,0.7) 0%, rgba(11,22,21,0.92) 100%);
  border-top: 1px solid rgba(94, 234, 212, 0.14);
  box-shadow: 0 -1px 0 rgba(212, 175, 55, 0.16), 0 -12px 40px rgba(0,0,0,0.55);
}
.nav-btn.active .nav-ico {
  background: linear-gradient(135deg, rgba(14,79,74,0.14) 0%, rgba(184,145,46,0.10) 100%);
  box-shadow:
    0 4px 12px rgba(14,79,74,0.22),
    inset 0 0 0 1px rgba(184, 145, 46, 0.28);
}
.nav-btn.active .nav-label { color: var(--brand); }
.nav-btn.nav-cta .nav-ico {
  background: linear-gradient(135deg, #1E7F76 0%, #0E4F4A 55%, #063834 100%);
  box-shadow:
    0 6px 18px rgba(14, 79, 74, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 0 0 1px rgba(184, 145, 46, 0.3);
}
.nav-btn.nav-cta.active .nav-ico {
  box-shadow:
    0 6px 20px rgba(14, 79, 74, 0.5),
    0 0 0 3px rgba(184, 145, 46, 0.22),
    inset 0 1px 0 rgba(255,255,255,0.22);
}

/* ── Record card / defect card / floor card refinements ── */
.record-card, .defect-card, .floor-card {
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.4), transparent 55%),
    var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 14px 16px;
}
html[data-theme="dark"] .record-card,
html[data-theme="dark"] .defect-card,
html[data-theme="dark"] .floor-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 55%), var(--surface);
}
.record-card:hover, .defect-card:hover {
  border-color: rgba(184, 145, 46, 0.30);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.record-type {
  background: linear-gradient(135deg, var(--gold-tint), rgba(255,255,255,0.4));
  color: var(--gold);
  border: 1px solid rgba(184, 145, 46, 0.28);
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: .12em;
}
html[data-theme="dark"] .record-type {
  background: rgba(212, 175, 55, 0.14);
  border-color: rgba(212, 175, 55, 0.3);
  color: #F0D37B;
}
.record-title { font-size: 14.5px; font-weight: 800; letter-spacing: -0.01em; }

/* Pill refinements */
.pill {
  border-radius: 999px;
  padding: 4px 10px;
  font-weight: 800;
  font-size: 9.5px;
  letter-spacing: .1em;
}
.badge { padding: 4px 10px; font-weight: 800; letter-spacing: .02em; }

/* Defect card priority accents */
.defect-card.priority-high { border-left: 3px solid var(--danger); box-shadow: var(--shadow-sm), inset 4px 0 8px rgba(185,28,28,0.05); }
.defect-card.priority-medium { border-left: 3px solid var(--warn); box-shadow: var(--shadow-sm), inset 4px 0 8px rgba(180,83,15,0.05); }
.defect-card.priority-low { border-left: 3px solid var(--ink-faint); }

/* Filter chips — pill with pop */
.filter-chip {
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
  flex-shrink: 0;
}
.filter-chip:hover { border-color: rgba(184, 145, 46, 0.4); color: var(--ink); }
.filter-chip.active {
  background: linear-gradient(180deg, #1E7F76 0%, #0E4F4A 100%);
  border-color: #0E4F4A;
  color: #fff;
  box-shadow: 0 4px 14px rgba(14,79,74,0.32), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* Form fields — refined */
input[type=text], input[type=date], input[type=time], input[type=number], input[type=password], textarea, select {
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  background: rgba(255, 252, 245, 0.55);
  transition: border-color .2s ease, box-shadow .22s ease, background .2s ease;
}
input[type=text]:focus, input[type=date]:focus, input[type=time]:focus, input[type=number]:focus, input[type=password]:focus, textarea:focus, select:focus {
  border-color: var(--brand);
  background: var(--surface);
  box-shadow: 0 0 0 4px rgba(14, 79, 74, 0.10), 0 4px 12px rgba(14,79,74,0.06);
}
html[data-theme="dark"] input[type=text], html[data-theme="dark"] input[type=date],
html[data-theme="dark"] input[type=time], html[data-theme="dark"] input[type=number],
html[data-theme="dark"] input[type=password], html[data-theme="dark"] textarea,
html[data-theme="dark"] select {
  background: rgba(255,255,255,0.03);
}
label.field-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 6px;
}
html[data-theme="dark"] label.field-label { color: #E9CE7B; }

/* Toggle buttons — bolder */
.toggle-btn {
  border-radius: 11px;
  font-weight: 800;
  min-width: 56px;
}
.toggle-btn.ok-active {
  background: linear-gradient(180deg, #26A46F 0%, #1F8A5A 100%);
  border-color: #1F8A5A;
  box-shadow: 0 6px 16px rgba(31, 138, 90, 0.32), inset 0 1px 0 rgba(255,255,255,0.18);
}
.toggle-btn.notok-active {
  background: linear-gradient(180deg, #D65B5B 0%, #B93636 100%);
  border-color: #B93636;
  box-shadow: 0 6px 16px rgba(185, 54, 54, 0.32), inset 0 1px 0 rgba(255,255,255,0.18);
}

/* Chip button */
.chip-btn {
  border-radius: 12px;
  font-weight: 800;
  box-shadow: inset 0 0 0 1px rgba(14, 79, 74, 0.05);
}
.chip-btn.ok-active {
  background: linear-gradient(180deg, #26A46F 0%, #1F8A5A 100%);
  box-shadow: 0 6px 16px rgba(31, 138, 90, 0.32), inset 0 1px 0 rgba(255,255,255,0.18);
}
.chip-btn.notok-active {
  background: linear-gradient(180deg, #D65B5B 0%, #B93636 100%);
  box-shadow: 0 6px 16px rgba(185, 54, 54, 0.32), inset 0 1px 0 rgba(255,255,255,0.18);
}

/* Modal — premium glass sheet */
.modal { background: rgba(6, 20, 19, 0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
.modal-content {
  border-radius: 22px;
  background: linear-gradient(180deg, #ffffff 0%, #fbf7ee 100%);
  border: 1px solid rgba(184, 145, 46, 0.14);
  box-shadow:
    0 40px 80px rgba(6, 20, 19, 0.35),
    0 0 0 1px rgba(184,145,46,0.10),
    inset 0 1px 0 rgba(255,255,255,0.9);
  padding: 22px;
}
html[data-theme="dark"] .modal-content {
  background: linear-gradient(180deg, #142322 0%, #0d1817 100%);
  border-color: rgba(94, 234, 212, 0.14);
  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(94,234,212,0.10),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

/* Toast — refined */
#toast {
  bottom: 100px;
  padding: 12px 22px;
  border-radius: 999px;
  background: linear-gradient(180deg, #143432 0%, #0A1F1E 100%);
  color: #F1EFE8;
  font-weight: 600;
  font-size: 13px;
  border: 1px solid rgba(184, 145, 46, 0.28);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

/* Skeleton — softer */
.skeleton, .skeleton-line {
  background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
  background-size: 1200px 100%;
}

/* Section header — refined */
.section-header {
  background: linear-gradient(180deg, rgba(255,255,255,0.5), var(--surface-2));
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 13px 15px;
}
html[data-theme="dark"] .section-header {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), var(--surface-2));
}
.section-title { font-size: 14px; font-weight: 800; letter-spacing: -0.01em; }

/* Floor card refinement */
.floor-badge {
  background: linear-gradient(135deg, var(--brand-tint), rgba(255,255,255,0.4));
  color: var(--brand);
  border: 1px solid rgba(14, 79, 74, 0.10);
  border-radius: 9px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
  width: 28px; height: 28px;
}
html[data-theme="dark"] .floor-badge {
  background: rgba(94, 234, 212, 0.14);
  border-color: rgba(94, 234, 212, 0.2);
  color: #5eead4;
}

/* Photo thumb & add button */
.photo-thumb {
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.photo-add-btn {
  border-radius: 12px;
  border: 1.5px dashed rgba(184, 145, 46, 0.35);
  background: linear-gradient(180deg, rgba(255,252,245,0.7), rgba(184,145,46,0.04));
  color: var(--gold);
  font-weight: 700;
}
.photo-add-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: linear-gradient(180deg, rgba(184,145,46,0.06), rgba(184,145,46,0.10));
}

/* Selection color */
::selection { background: rgba(14, 79, 74, 0.24); color: var(--ink); }

/* SOS tile — refined danger surface */
.home-sos-tile, .stack > .tile[onclick*="sos"] {
  background:
    radial-gradient(400px 260px at 12% 20%, rgba(185,28,28,0.10), transparent 60%),
    linear-gradient(135deg, #FFF6F5 0%, #FFFFFF 55%, #FFECEC 100%);
  border-color: rgba(185, 28, 28, 0.24);
  box-shadow: 0 18px 40px rgba(185, 28, 28, 0.14), var(--shadow-sm);
}
.home-sos-tile .tile-icon, .stack > .tile[onclick*="sos"] .tile-icon {
  background: linear-gradient(135deg, #E86868 0%, #B91C1C 100%);
  color: #fff;
  border: 1px solid rgba(185, 28, 28, 0.4);
  box-shadow: 0 8px 22px rgba(185, 28, 28, 0.35), inset 0 1px 0 rgba(255,255,255,0.2);
}

/* Empty state — quieter */
.empty-title { font-size: 17px; font-weight: 700; }
.empty-text { font-size: 13px; line-height: 1.5; }

/* Hero role switch — refined pill (used on home) */
.hero-role-switch {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(184, 145, 46, 0.28);
  backdrop-filter: blur(8px);
  padding: 5px;
}
.hrs-btn.active {
  background: linear-gradient(180deg, #ffffff, #FBF3DC);
  color: #063834;
  box-shadow: 0 4px 14px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.9);
}

/* Gold divider utility */
.hr {
  background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  margin: 16px 0;
}

/* Score bubble refinement */
.record-score-bubble {
  background: linear-gradient(135deg, var(--brand-tint), rgba(255,255,255,0.6));
  color: var(--brand);
  border: 1px solid rgba(14, 79, 74, 0.10);
  box-shadow: 0 6px 16px rgba(14, 79, 74, 0.18), inset 0 0 0 4px rgba(255,255,255,0.5);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
}

/* Banner refinement */
.banner {
  border-radius: var(--radius);
  padding: 14px 16px;
  border: 1px solid;
  font-size: 13px;
  line-height: 1.5;
}
.banner.info {
  background: linear-gradient(135deg, var(--brand-tint), rgba(255,255,255,0.6));
  border-color: rgba(14, 79, 74, 0.18);
  color: var(--brand-dark);
}
.banner.warn {
  background: linear-gradient(135deg, var(--warn-tint), rgba(255,255,255,0.6));
  border-color: rgba(180, 83, 15, 0.28);
}
.banner.danger {
  background: linear-gradient(135deg, var(--danger-tint), rgba(255,255,255,0.6));
  border-color: rgba(185, 28, 28, 0.24);
}

/* Sidenav — refined dark elegance */
.sidenav {
  background:
    radial-gradient(400px 300px at 100% 0%, rgba(184,145,46,0.14), transparent 60%),
    linear-gradient(180deg, #052824 0%, #0E4F4A 60%, #063834 100%);
  border-right: 1px solid rgba(184, 145, 46, 0.14);
}
.sidenav-btn { border-radius: 12px; }
.sidenav-btn.active {
  background: linear-gradient(135deg, rgba(184, 145, 46, 0.22), rgba(255,255,255,0.06));
  color: #fff;
  border: 1px solid rgba(184, 145, 46, 0.28);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
.sidenav-brand-text small { color: rgba(233, 206, 123, 0.7); }

/* Loading dots animation for premium feel */
@keyframes premGlow {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* AI assist card refinement */
.ai-assist-card {
  background:
    linear-gradient(180deg, var(--brand-tint), rgba(255,255,255,0.4));
  border: 1px solid rgba(14, 79, 74, 0.16);
  box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.6);
  border-radius: var(--radius);
}
.ai-assist-title { color: var(--brand); }
html[data-theme="dark"] .ai-assist-card {
  background: linear-gradient(180deg, rgba(94, 234, 212, 0.08), rgba(255,255,255,0.02));
  border-color: rgba(94, 234, 212, 0.18);
}

/* Refined tap highlight on all buttons */
button, [role="button"], .tile, .card, .record-card, .defect-card {
  -webkit-tap-highlight-color: transparent;
}

/* Home hero card enhancements (if pattern present in DOM) */
.hero-card {
  background:
    radial-gradient(500px 320px at 100% 0%, rgba(184,145,46,0.16), transparent 60%),
    linear-gradient(160deg, #063834 0%, #0E4F4A 55%, #052824 100%) !important;
  border: 1px solid rgba(184, 145, 46, 0.25) !important;
  color: #fff !important;
  box-shadow:
    0 22px 44px rgba(14, 79, 74, 0.28),
    inset 0 1px 0 rgba(255,255,255,0.08) !important;
}
.hero-card .pagetitle, .hero-card h1, .hero-card h2 { color: #fff; }

/* Number tabular consistency */
.stat-num, .record-date, .defect-meta, .heat-count { font-variant-numeric: tabular-nums; }

/* Chevrons and small carets */
.chev { color: var(--gold); opacity: 0.6; }

/* Focus outline for accessibility (keyboard only) */
:focus-visible {
  outline: 2px solid rgba(184, 145, 46, 0.6);
  outline-offset: 2px;
  border-radius: 8px;
}

/* Print refinement */
@media print {
  body { background: #fff !important; }
}

/* Small phones */
@media (max-width: 380px) {
  .tile { padding: 14px; gap: 12px; }
  .tile-icon { width: 42px; height: 42px; }
  .stat-num { font-size: 26px; }
  #app { padding: 16px 14px 24px; }
}

</style>
</head>

// A plain type="password" input hides what's typed but can't be reasoned
// about once typed, unlike a visible field an admin can double check
// before saving — this pairs the masking with a standard show/hide eye
// toggle so both are available. Used for the Add Staff Account temporary
// password field and every field in the Change Password modal.
function passwordFieldHtml(id, placeholder, autocomplete, oninput){
  return '<div style="position:relative;">'
    + '<input type="password" id="'+id+'" placeholder="'+esc(placeholder||'')+'" '+(autocomplete?'autocomplete="'+autocomplete+'"':'')+(oninput?' oninput="'+esc(oninput)+'"':'')+' style="padding-right:40px; width:100%; box-sizing:border-box;">'
    + '<button type="button" onclick="togglePasswordVisibility(\''+id+'\',this)" aria-label="Show/hide password" style="position:absolute; right:4px; top:50%; transform:translateY(-50%); background:transparent; border:none; color:var(--ink-faint); cursor:pointer; padding:6px; display:flex;">'+icon('eye',16)+'</button>'
    + '</div>';
}
function togglePasswordVisibility(id, btn){
  const el = document.getElementById(id);
  if(!el) return;
  const showing = el.type==='text';
  el.type = showing ? 'password' : 'text';
  btn.innerHTML = icon(showing?'eye':'eyeOff', 16);
}

/* =========================================================
   I18N — English / Hindi
   tx(text)  → translates a *dynamic* label that comes from
               SECTION_DEFS (checklist item names, section titles,
               floor names) via the ITEM_TR lookup table.
   t(key)    → translates a *static* UI string (buttons, field
               labels, headings) via the STR dictionary below.
   Both fall back to the original English text/key if no Hindi
   string is registered, so nothing ever renders blank.
   Scope note: every checklist item, section, and floor name across
   all 4 form types is translated, plus the core screens ground staff
   actually use to fill and submit a checklist (nav, fill form, OK/
   Issue toggles, review, defect status/priority). Deeper admin-only
   surfaces (Settings descriptions, Dashboard analytics copy, audit
   log, report-builder help text) stay English-only for now — flagged
   here rather than silently left half-done. */
function tx(text){
  if(state.lang!=='hi') return text;
  return repairText(ITEM_TR[text] || text);
}
function T(key){
  const dict = STR[state.lang] || STR.en;
  return repairText(dict[key] || STR.en[key] || key);
}
function repairText(text){
  if(typeof text !== 'string') return text;
  if(!/[ÃÂàáâãäåð]/.test(text)) return text;
  try{
    return decodeURIComponent(text.split('').map(ch=>{
      const code = ch.charCodeAt(0);
      return code < 256 ? '%' + code.toString(16).padStart(2,'0') : encodeURIComponent(ch);
    }).join(''));
  }catch(e){
    return text;
  }
}

/* =========================================================
   FIREBASE (real cloud backend — data survives browser clears,
   device loss, and is shared live across every device/person who
   opens this file).

   HOW TO TURN THIS ON (nothing works until you do this — the app
   runs exactly as before, fully local, until FIREBASE_CONFIG has a
   real apiKey in it):
     1. Go to https://console.firebase.google.com → Add project
        (free "Spark" plan is enough for a single society).
     2. Inside the project: Build → Firestore Database → Create
        database → Start in production mode → pick a region close to
        you.
     3. Build → Authentication → Get started → Sign-in method →
        enable "Anonymous". (This app uses anonymous auth just so
        Firestore's security rules can require *some* login without
        making you build a login screen — it does not identify people
        individually.)
     4. Project settings (gear icon) → General → "Your apps" → Add
        app → Web (</>) → register it (no hosting needed) → copy the
        firebaseConfig object it shows you → paste the 6 values into
        FIREBASE_CONFIG below.
     5. Firestore Database → Rules → replace the default rules with
        at least this (locks writes/reads to signed-in — including
        anonymous — sessions only, so the database isn't wide open to
        the entire internet):
          rules_version = '2';
          service cloud.firestore {
            match /databases/{database}/documents {
              match /{document=**} {
                allow read, write: if request.auth != null;
              }
            }
          }
     6. Reload this file. Settings → About will confirm cloud sync is
        active once FIREBASE_CONFIG is filled in correctly.

   Scope: inspections, defects, and the audit log go to Firestore —
   that's the data that actually matters and was the point of this
   section. Per-device UI preferences (dark mode, language, an
   in-progress draft's autosave) stay local on purpose: anonymous auth
   gives each browser its own throwaway identity with no login, so
   there's no stable "account" to sync a personal preference to
   anyway, and losing a theme setting isn't the kind of data loss this
   is for.
   Firestore has a 1MiB-per-document ceiling: an inspection record
   with several defect photos embedded could theoretically approach
   that. Photos here are already compressed client-side (~480px wide)
   before being stored, which keeps records well under that limit in
   practice — just something to know if you ever raise that
   compression quality/size.
========================================================= */

function fbWithTimeout(promise, ms){
  ms = ms || FB_OP_TIMEOUT_MS;
  return Promise.race([
    promise,
    new Promise((_,rej)=> setTimeout(()=>rej(new Error('Firebase timeout after '+ms+'ms')), ms))

      ]), 10000);
      firebase.initializeApp(FIREBASE_CONFIG);
      // NOTE: no automatic signInAnonymously() here anymore. Every visitor
      // used to get an anonymous session for free, which is what made
      // "request.auth != null" rules meaningless — anyone could self-issue
      // that token with zero verification. Auth now happens explicitly:
      // ensureResidentAuth() for the public complaint link (still anonymous,
      // but Firestore rules only let that identity CREATE a new complaint,
      // nothing else), or staffSignIn()/bootstrapFirstAdmin() for real
      // mobile+password staff accounts, which get looked up against a
      // server-side staff/{uid} document that rules key everything else on.
      fbDb = firebase.firestore();
      return fbDb;
    }catch(e){
      console.error('Firebase init failed — falling back to local-only storage', e);
      fbDb = null;
      return null;
    }
  })();
  return fbInitPromise;
}

   settings:autoAssign / settings:reportCounter further down) instead
   of piling up a new file per backup, so there's one current backup
   on Drive at all times.

   Scope used is drive.file — the narrowest Drive permission Google

   folder it creates for its own backups, never anything else already

const GOOGLE_DRIVE_CLIENT_ID = '781289299619-rrfj9uibho592ufpmv8vcelmef33bv6t.apps.googleusercontent.com';
const GOOGLE_DRIVE_TARGET_EMAIL = 'mhmrwa2026@gmail.com';
const GOOGLE_DRIVE_ENABLED = !!GOOGLE_DRIVE_CLIENT_ID;
const GOOGLE_DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email';
const GOOGLE_DRIVE_FOLDER_NAME = 'MHM Inspection Backups';
const GOOGLE_DRIVE_FILE_NAME = 'max-heights-backup.json';
let gdriveTokenClient = null;
let gsiLoadPromise = null;
function loadGsi(){
  if(!gsiLoadPromise) gsiLoadPromise = loadScript('https://accounts.google.com/gsi/client');
  return gsiLoadPromise;
}
// Opens Google's account-chooser popup and resolves with an access
// token. Never reuses a cached session silently — deliberate, since
// the whole point is making sure the RIGHT Drive account gets picked
// each time, not just whichever Google account happens to already be
// signed in on this phone/browser.
function gdriveRequestToken(){
  return new Promise((resolve, reject)=>{
    if(!window.google || !google.accounts || !google.accounts.oauth2){
      reject(new Error('Google sign-in script did not load — check your internet connection'));
      return;
    }
    const timer = setTimeout(()=>reject(new Error('Google sign-in timed out — please try again')), 90000);
    if(!gdriveTokenClient){
      gdriveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_DRIVE_CLIENT_ID,
        scope: GOOGLE_DRIVE_SCOPES,
        callback: ()=>{}
      });
    }
    gdriveTokenClient.callback = (resp)=>{
      clearTimeout(timer);
      if(!resp || resp.error){ reject(new Error((resp&&resp.error_description)||(resp&&resp.error)||'Google sign-in was cancelled')); return; }
      resolve(resp.access_token);
    };
    try{ gdriveTokenClient.requestAccessToken({prompt:'select_account'}); }
    catch(e){ clearTimeout(timer); reject(e); }
  });
}
async function gdriveSignedInEmail(accessToken){
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+accessToken}});
  if(!res.ok) throw new Error('Could not verify the signed-in Google account');
  const data = await res.json();
  return data.email || null;
}
async function gdriveApi(accessToken, url, opts){
  opts = opts || {};
  const headers = Object.assign({Authorization:'Bearer '+accessToken}, opts.headers||{});
  const res = await fetch(url, Object.assign({}, opts, {headers}));
  if(!res.ok){
    let msg = 'Drive API error '+res.status;
    try{ const j = await res.json(); if(j&&j.error&&j.error.message) msg = j.error.message; }catch(e){}
    const err = new Error(msg); err.status = res.status; throw err;
  }
  return res.json();
}
// Folder id is cached in settings:driveBackupFolderId so re-runs never
// need to search Drive again. drive.file scope only ever lets this app
// see files/folders IT created, so the very first search naturally
// finds nothing and a fresh folder gets created.
async function gdriveGetOrCreateFolder(accessToken){
  const cached = await storeGet('settings:driveBackupFolderId');
  if(cached && cached.id) return cached.id;
  const q = encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='"+GOOGLE_DRIVE_FOLDER_NAME+"' and trashed=false");
  const found = await gdriveApi(accessToken, 'https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name)&spaces=drive');
  let folderId = found && found.files && found.files[0] ? found.files[0].id : null;
  if(!folderId){
    const created = await gdriveApi(accessToken, 'https://www.googleapis.com/drive/v3/files', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name:GOOGLE_DRIVE_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder'})
    });
    folderId = created.id;
  }
  await storeSet('settings:driveBackupFolderId', {id:folderId});
  return folderId;
}
// Resumable upload (not the simpler "multipart" method) so large
// backups — this app embeds compressed defect photos, so a mature
// deployment's JSON can run well past a few MB — upload reliably.
// Overwrites the SAME file every time (id cached in
// settings:driveBackupFileId) instead of piling up a new file per
// backup, and transparently re-creates it if that file was ever
// deleted on the Drive side (a stale cached id would otherwise 404
// forever).
async function gdriveUploadBackup(accessToken, folderId, jsonString, isRetry){
  const cached = await storeGet('settings:driveBackupFileId');
  const fileId = (!isRetry && cached && cached.id) ? cached.id : null;
  const metadata = fileId
    ? {name: GOOGLE_DRIVE_FILE_NAME}
    : {name: GOOGLE_DRIVE_FILE_NAME, mimeType:'application/json', parents:[folderId]};
  const initUrl = (fileId
      ? 'https://www.googleapis.com/upload/drive/v3/files/'+fileId
      : 'https://www.googleapis.com/upload/drive/v3/files'
    ) + '?uploadType=resumable';
  const initRes = await fetch(initUrl, {
    method: fileId ? 'PATCH' : 'POST',
    headers:{
      'Authorization':'Bearer '+accessToken,
      'Content-Type':'application/json; charset=UTF-8',
      'X-Upload-Content-Type':'application/json'
    },
    body: JSON.stringify(metadata)
  });
  if(!initRes.ok){
    if(fileId && initRes.status===404 && !isRetry) return gdriveUploadBackup(accessToken, folderId, jsonString, true);
    throw new Error('Could not start Drive upload (status '+initRes.status+')');
  }
  const sessionUrl = initRes.headers.get('Location');
  if(!sessionUrl) throw new Error('Drive did not return an upload session');
  const putRes = await fetch(sessionUrl, {method:'PUT', headers:{'Content-Type':'application/json'}, body: jsonString});
  if(!putRes.ok) throw new Error('Drive upload failed (status '+putRes.status+')');
  const data = await putRes.json();
  await storeSet('settings:driveBackupFileId', {id:data.id});
  return data;
}

/* =========================================================
   REAL AUTH — replaces the old client-side PIN "convenience
   lock". Staff sign in with mobile number + password (Firebase
   Auth doesn't have native phone+password, so the mobile number
   is mapped to a synthetic, unreachable email under the hood —
   nobody ever sees or types an email, it's purely an internal
   identifier). Firestore rules check a staff/{uid} document to
   decide what a signed-in session may read or write, so this is
   enforced on the server, not just hidden behind app UI.
========================================================= */
let AUTH_USER = null;   // firebase.auth().currentUser, once signed in
let STAFF_DOC = null;   // {role, name, mobile} loaded from staff/{uid}

function mobileToAuthEmail(mobile){
  return String(mobile||'').trim() + '@mhm-app.local'; // internal-only identifier, never shown, never sent anywhere
}

// Firebase persists real sign-ins on its own (IndexedDB, survives app
// restarts) — but right after the SDK loads, currentUser can briefly read
// back null even when a valid session is about to be restored, because
// that restoration itself is asynchronous. onAuthStateChanged's first
// callback is Firebase's own signal that it has finished checking, so
// waiting for that is what makes "stay signed in" actually reliable.
function waitForAuthState(){
  return new Promise((resolve)=>{
    const unsub = firebase.auth().onAuthStateChanged(user=>{ unsub(); resolve(user); });
  });
}

// Public resident-complaint link (?resident=1): a lightweight anonymous
// session so Firestore rules have *something* to check, but rules only
// grant this identity permission to CREATE a new complaint — never read,
// list, update, or delete. This intentionally stays low-friction; residents
// should never see a login screen just to report a leaking tap.
async function ensureResidentAuth(){
  const db = await initFirebase();
  if(!db) return null;
  try{
    if(!firebase.auth().currentUser){
      await fbWithTimeout(firebase.auth().signInAnonymously(), 12000);
    }
    return firebase.auth().currentUser;
  }catch(e){ console.error('resident sign-in failed', e); return null; }
}

async function loadStaffDoc(uid){
  const db = await initFirebase();
  if(!db) return null;
  try{
    const doc = await fbWithTimeout(db.collection('staff').doc(uid).get());
    return doc.exists ? doc.data() : null;
  }catch(e){ console.error('could not load staff doc', e); return null; }
}

async function isBootstrapOpen(){
  const db = await initFirebase();
  if(!db) return false;
  try{
    const doc = await fbWithTimeout(db.collection('app_meta').doc('bootstrap').get());
    return !doc.exists;
  }catch(e){
    // If we can't tell (offline, etc.), don't offer to create a fresh
    // admin — safer to fall through to the normal login screen.
    return false;
  }
}

async function staffSignIn(mobile, password){
  const db = await initFirebase();
  if(!db) throw new Error('No connection — check your internet and try again');
  const email = mobileToAuthEmail(mobile);
  const cred = await fbWithTimeout(firebase.auth().signInWithEmailAndPassword(email, password), 12000);
  return cred.user;
}

// The very first account on a fresh deployment: creates both the Auth
// user and their staff/{uid} admin record, then immediately writes
// app_meta/bootstrap to lock this path shut for everyone after — rules
// enforce that lock server-side, so this can only ever succeed once.
async function bootstrapFirstAdmin(mobile, password, name){
  const db = await initFirebase();
  if(!db) throw new Error('No connection — check your internet and try again');
  const email = mobileToAuthEmail(mobile);
  const cred = await fbWithTimeout(firebase.auth().createUserWithEmailAndPassword(email, password), 12000);
  const uid = cred.user.uid;
  const staffData = {role:'admin', name:name.trim(), mobile:mobile.trim(), addedAt: firebase.firestore.FieldValue.serverTimestamp(), addedBy:'bootstrap'};
  await fbWithTimeout(db.collection('staff').doc(uid).set(staffData));
  await fbWithTimeout(db.collection('app_meta').doc('bootstrap').set({usedBy: uid, at: firebase.firestore.FieldValue.serverTimestamp()}));
  return {uid, role:'admin', name:staffData.name, mobile:staffData.mobile};
}

// A second, isolated Firebase Auth instance so an already-signed-in admin
// can create ANOTHER person's account without Firebase silently swapping
// the admin's own browser session over to the new user (which is what
// createUserWithEmailAndPassword does on the primary auth instance).
function getSecondaryAuth(){
  let secApp;
  try{ secApp = firebase.app('mhm-secondary'); }
  catch(e){ secApp = firebase.initializeApp(FIREBASE_CONFIG, 'mhm-secondary'); }
  return secApp.auth();
}

async function adminCreateStaffAccount(mobile, password, role, name, trade){
  const db = await initFirebase();
  if(!db) throw new Error('No connection — check your internet and try again');
  const auth2 = getSecondaryAuth();
  const email = mobileToAuthEmail(mobile);
  const cred = await fbWithTimeout(auth2.createUserWithEmailAndPassword(email, password), 12000);
  const uid = cred.user.uid;
  try{ await auth2.signOut(); }catch(e){}
  const staffData = {role, name:name.trim(), mobile:mobile.trim(), trade: trade||'', addedAt: firebase.firestore.FieldValue.serverTimestamp(), addedBy: STAFF_DOC?STAFF_DOC.name:null};
  await fbWithTimeout(db.collection('staff').doc(uid).set(staffData));
  return {uid, role, name:staffData.name, mobile:staffData.mobile, trade:staffData.trade};
}

function friendlyAuthError(e){
  const code = (e && e.code) || '';
  if(code==='auth/wrong-password' || code==='auth/invalid-credential' || code==='auth/invalid-login-credentials') return 'Incorrect mobile number or password';
  if(code==='auth/user-not-found') return 'No account found for this mobile number — ask your Admin to add you';
  if(code==='auth/email-already-in-use') return 'An account already exists for this mobile number (maybe a removed one — Firebase keeps the old sign-in around even after Remove). Try a different number, or wait and retry.';
  if(code==='auth/weak-password') return 'Password must be at least 6 characters';
  if(code==='auth/network-request-failed') return 'No internet connection — please try again';
  if(code==='auth/too-many-requests') return 'Too many attempts — please wait a bit and try again';
  return (e && e.message) ? e.message : 'Something went wrong — please try again';
}

// Ground staff (worker) and vendor reps both get the same narrow
// "only my assigned defects" experience — mirrors isNarrowStaff() in
// firestore.rules exactly, so client-side routing and server-side
// permissions never disagree about who counts as "narrow".
function isNarrowRole(role){
  return role==='worker' || role==='vendor';
}
function roleLabel(role){
  return {admin:'Admin', supervisor:'Supervisor', worker:'Ground Staff', vendor:'Vendor'}[role] || role;
}
// "Vendor · Electrician" style label — falls back to just the role name
// when no trade is set, so it's always safe to call. Reuses the same
// VENDOR_TRADES vocabulary as the separate Vendors (AMC contacts) list
// further down, so "Electrician"/"Plumber"/etc. mean the same thing
// whether it's a vendor CONTACT or a signed-in staff ACCOUNT.
function roleTradeLabel(role, trade){
  const t = trade && VENDOR_TRADES.find(x=>x.key===trade);
  return roleLabel(role) + (t ? ' · '+t.label : '');
}
function roleIcon(role){
  return {admin:'shield', supervisor:'users', vendor:'briefcase', worker:'wrench'}[role] || 'users';
}
async function onStaffAuthenticated(user, staffData){
  AUTH_USER = user;
  STAFF_DOC = staffData;
  state.currentUser = {name: staffData.name, mobile: staffData.mobile, role: staffData.role, trade: staffData.trade||''};
  state.role = staffData.role;
  state.adminUnlocked = (staffData.role==='admin');
  state._authScreen = null;
  state._authError = null;
  state._authForm = {name:'', mobile:'', password:'', password2:''};
  state.view = isNarrowRole(staffData.role) ? 'mydefects' : 'home';
  state._isNavigating = true;
  showAppNow();
  try{
    if(isNarrowRole(staffData.role)){
      await loadMyAssignedDefects(user.uid);
    } else {
      await loadAll();
      await loadAutoAssignRules();
      await loadWeatherAlert();
      await loadStaffList();
    }
  }catch(e){}
  render();
}
// Workers can't read the broad mhm_records collection (Firestore rules
// only let them read defects specifically assigned to them), so instead
// of loadAll() this queries the small /assignments mirror for their uid,
// then fetches just those individual defect records.
async function loadMyAssignedDefects(uid){
  const db = await initFirebase();
  if(!db){ DB.defects = []; return; }
  try{
    const snap = await fbWithTimeout(db.collection('assignments').where('assignedToUid','==',uid).get());
    const keys = snap.docs.map(d=>d.id); // same ids as mhm_records, e.g. "defect:abc123"
    const results = await Promise.allSettled(keys.map(k=>storeGet(k)));
    DB.defects = results.filter(r=>r.status==='fulfilled' && r.value).map(r=>r.value);
    DB.defects.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  }catch(e){
    console.error('could not load assigned defects', e);
    DB.defects = [];
  }
}
async function loadStaffList(){
  const db = await initFirebase();
  if(!db){ DB.staff = []; return; }
  try{
    const snap = await fbWithTimeout(db.collection('staff').get());
    DB.staff = snap.docs.map(d=>({uid: d.id, ...d.data()}));
    DB.staff.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  }catch(e){
    console.error('could not load staff list', e);
    DB.staff = [];
  }
}

async function submitStaffLogin(){
  const mobile = (document.getElementById('authMobile')||{}).value?.trim() || '';
  const password = (document.getElementById('authPassword')||{}).value || '';
  if(!/^\d{10}$/.test(mobile)){ state._authError = 'Enter a valid 10-digit mobile number'; render(); bindAuthInputs(); return; }
  if(!password){ state._authError = 'Enter your password'; render(); bindAuthInputs(); return; }
  state._authError = null;
  const prevScreen = state._authScreen;
  state._authScreen = 'checking';
  render();
  try{
    const user = await staffSignIn(mobile, password);
    const staffData = await loadStaffDoc(user.uid);
    if(!staffData){
      try{ await firebase.auth().signOut(); }catch(e){}
      state._authError = 'This account has no role assigned — ask your Admin to add you as staff.';
      state._authScreen = 'login';
      render(); bindAuthInputs();
      return;
    }
    await onStaffAuthenticated(user, staffData);
  }catch(e){
    console.error('login failed', e);
    state._authError = friendlyAuthError(e);
    state._authScreen = prevScreen;
    render(); bindAuthInputs();
  }
}

async function submitBootstrap(){
  const name = (document.getElementById('authName')||{}).value?.trim() || '';
  const mobile = (document.getElementById('authMobile')||{}).value?.trim() || '';
  const p1 = (document.getElementById('authPassword')||{}).value || '';
  const p2 = (document.getElementById('authPassword2')||{}).value || '';
  if(!name){ state._authError = 'Enter your name'; render(); bindAuthInputs(); return; }
  if(!/^\d{10}$/.test(mobile)){ state._authError = 'Enter a valid 10-digit mobile number'; render(); bindAuthInputs(); return; }
  if(p1.length<6){ state._authError = 'Password must be at least 6 characters'; render(); bindAuthInputs(); return; }
  if(p1!==p2){ state._authError = "Passwords don't match"; render(); bindAuthInputs(); return; }
  state._authError = null;
  state._authScreen = 'checking';
  render();
  try{
    const stillOpen = await isBootstrapOpen();
    if(!stillOpen){
      state._authError = 'Admin account already set up on this deployment — please sign in instead.';
      state._authScreen = 'login';
      render(); bindAuthInputs();
      return;
    }
    const staffData = await bootstrapFirstAdmin(mobile, p1, name);
    await onStaffAuthenticated(firebase.auth().currentUser, staffData);
  }catch(e){
    console.error('bootstrap failed', e);
    state._authError = friendlyAuthError(e);
    state._authScreen = 'bootstrap';
    render(); bindAuthInputs();
  }
}

function bindAuthInputs(){
  ['authName','authMobile','authPassword','authPassword2'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') (state._authScreen==='bootstrap' ? submitBootstrap : submitStaffLogin)(); });
  });
  const first = document.getElementById('authName') || document.getElementById('authMobile');
  if(first) first.focus();
}

async function fbSet(key, value){
  const db = await initFirebase();
  if(!db) throw new Error('Firebase unavailable');
  await fbWithTimeout(db.collection(FIREBASE_COLLECTION).doc(key).set({
    value, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }));
  return {key, value};
}
async function fbGet(key){
  const db = await initFirebase();
  if(!db) throw new Error('Firebase unavailable');
  const doc = await fbWithTimeout(db.collection(FIREBASE_COLLECTION).doc(key).get());
  if(!doc.exists) throw new Error('key not found: '+key);
  const data = doc.data();
  return {key, value: data.value, updatedAtMillis: data.updatedAt && data.updatedAt.toMillis ? data.updatedAt.toMillis() : null};
}
async function fbDelete(key){
  const db = await initFirebase();
  if(!db) throw new Error('Firebase unavailable');
  await fbWithTimeout(db.collection(FIREBASE_COLLECTION).doc(key).delete());
  return {key, deleted:true};
}
async function fbList(prefix){
  const db = await initFirebase();
  if(!db) throw new Error('Firebase unavailable');
  const p = prefix || '';
  const end = p + '\uf8ff';
  const snap = await fbWithTimeout(db.collection(FIREBASE_COLLECTION)
    .where(firebase.firestore.FieldPath.documentId(), '>=', p)
    .where(firebase.firestore.FieldPath.documentId(), '<=', end)
    .get());
  return {keys: snap.docs.map(d=>d.id)};
}

/* =========================================================
   STORAGE FALLBACK — window.storage is provided by the Claude
   Artifacts runtime (a shared key-value store across everyone who
   opens the artifact there). Every storeSet/storeGet/etc. call below
   is already wrapped in try/catch, so opening this file in a plain
   browser where window.storage doesn't exist will NOT crash or hang
   on the splash screen — it just fails saves silently. That's a real
   gap though: outside the Artifacts runtime nothing would ever
   persist. This shim fills it in so the app also works standalone
   (single browser/device — there's no way to share data across
   devices the way the real window.storage does, so "shared" here
   just means "not theme/draft-only", not "visible to other people's
   browsers"). The real window.storage (if present) is always
   preferred over this shim.

   Backed by IndexedDB rather than localStorage: this app stores
   Base64 defect photos alongside inspection records, and
   localStorage's ~5MB per-origin ceiling fills up after a handful of
   photos. IndexedDB has no such practical limit. The decision between
   IndexedDB and a localStorage fallback is made once at startup
   (rather than per call) so a record never ends up split across two
   backends. */
if(!window.storage){
  const nsKey = (key, shared) => (shared ? 'shared__' : 'personal__') + key;

  const lsImpl = (()=>{
    const LS_PREFIX = 'mhm_app__';
    return {
      async set(key, value, shared){
        localStorage.setItem(LS_PREFIX+nsKey(key,shared), typeof value==='string' ? value : JSON.stringify(value));
        return {key, value, shared};
      },
      async get(key, shared){
        const raw = localStorage.getItem(LS_PREFIX+nsKey(key,shared));
        if(raw===null) throw new Error('key not found: '+key);
        return {key, value: raw, shared};
      },
      async delete(key, shared){
        localStorage.removeItem(LS_PREFIX+nsKey(key,shared));
        return {key, deleted:true, shared};
      },
      async list(prefix, shared){
        const wanted = LS_PREFIX + nsKey(prefix||'', shared);
        const keys = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(wanted)) keys.push(k.slice(wanted.length - (prefix||'').length));
        }
        return {keys, prefix, shared};
      }
    };
  })();

  const idbImpl = (()=>{
    const IDB_NAME = 'mhm_storage_v1', STORE = 'kv';
    let dbPromise = null;
    function openDB(){
      if(dbPromise) return dbPromise;
      dbPromise = new Promise((resolve, reject)=>{
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, {keyPath:'k'}); };
        req.onsuccess = e=> resolve(e.target.result);
        req.onerror = e=> reject(e.target.error);
        req.onblocked = ()=> reject(new Error('indexedDB open blocked'));
      });
      return dbPromise;
    }
    return {
      async set(key, value, shared){
        const db = await openDB();
        return new Promise((resolve,reject)=>{
          const tx = db.transaction(STORE,'readwrite');
          tx.objectStore(STORE).put({k: nsKey(key,shared), value: typeof value==='string'?value:JSON.stringify(value)});
          tx.oncomplete = ()=> resolve({key, value, shared});
          tx.onerror = ()=> reject(tx.error);
        });
      },
      async get(key, shared){
        const db = await openDB();
        return new Promise((resolve,reject)=>{
          const tx = db.transaction(STORE,'readonly');
          const req = tx.objectStore(STORE).get(nsKey(key,shared));
          req.onsuccess = ()=> req.result ? resolve({key, value:req.result.value, shared}) : reject(new Error('key not found: '+key));
          req.onerror = ()=> reject(req.error);
        });
      },
      async delete(key, shared){
        const db = await openDB();
        return new Promise((resolve,reject)=>{
          const tx = db.transaction(STORE,'readwrite');
          tx.objectStore(STORE).delete(nsKey(key,shared));
          tx.oncomplete = ()=> resolve({key, deleted:true, shared});
          tx.onerror = ()=> reject(tx.error);
        });
      },
      async list(prefix, shared){
        const db = await openDB();
        const wanted = nsKey(prefix||'', shared);
        return new Promise((resolve,reject)=>{
          const tx = db.transaction(STORE,'readonly');
          const req = tx.objectStore(STORE).getAllKeys();
          req.onsuccess = ()=> resolve({keys: req.result.filter(k=>typeof k==='string'&&k.startsWith(wanted)).map(k=>k.slice(wanted.length-(prefix||'').length)), prefix, shared});
          req.onerror = ()=> reject(req.error);
        });
      }
    };
  })();

  window.storage = window.indexedDB ? idbImpl : lsImpl;
}

/* =========================================================
   STORAGE HELPERS
========================================================= */
/* ---- Offline outbox ----
   Before this existed, a record submitted with no signal was saved
   locally and then NEVER pushed to Firebase once the connection came
   back — it stayed trapped on that one phone forever. Now every
   failed cloud write is queued (persisted per-device) and re-tried
   automatically when the device comes online, on the 45s background
   sync tick, and on manual refresh. */
let SYNC_QUEUE = []; // [{key, op:'set'|'delete'}]
// Last known server updatedAt (millis) per key, as of the last time this
// device actually read or wrote it. Used only to detect the narrow case
// a queued (offline) write is about to silently overwrite a change made
// by someone else in the meantime — see flushSyncQueue().
let RECORD_VERSIONS = {};
let __syncFlushing = false;
async function persistSyncQueue(){ try{ await storeSetPersonal('syncqueue', {items: SYNC_QUEUE}); }catch(e){} }
function enqueueSync(key, op){
  SYNC_QUEUE = SYNC_QUEUE.filter(x=> x.key!==key); // last write wins per key
  SYNC_QUEUE.push({key:key, op:op});
  persistSyncQueue();
  updateNotifBell && updateNotifBell();
}
async function flushSyncQueue(){
  if(!FIREBASE_ENABLED || __syncFlushing || !SYNC_QUEUE.length) return 0;
  __syncFlushing = true;
  let flushed = 0;
  let conflictCount = 0;
  try{
    const pending = SYNC_QUEUE.slice();
    for(const item of pending){
      try{
        if(item.op==='delete'){
          await fbDelete(item.key);
        } else {
          const local = await window.storage.get(item.key, true);
          if(local && local.value !== undefined && local.value !== null){
            // Conflict check: a queued write has, by definition, been
            // waiting a while — long enough for someone else to have
            // genuinely edited the same record in the meantime. This
            // can't prevent that (there's no reliable "state before
            // either edit" to safely merge from — the two touched
            // record shapes have no guaranteed common ancestor cached
            // anywhere), so resolution stays last-write-wins, same as
            // before. What changes: instead of that overwrite happening
            // completely silently, a genuine conflict gets logged and
            // flagged, so an admin can notice and double-check rather
            // than someone's edit just vanishing without a trace.
            let conflicted = false;
            const knownVersion = RECORD_VERSIONS[item.key];
            if(knownVersion){
              try{
                const cloudNow = await fbGet(item.key);
                if(cloudNow.updatedAtMillis && cloudNow.updatedAtMillis > knownVersion) conflicted = true;
              }catch(e){ /* deleted or unreadable server-side — nothing to conflict with */ }
            }
            await fbSet(item.key, local.value);
            RECORD_VERSIONS[item.key] = Date.now();
            if(conflicted){
              conflictCount++;
              let ref = item.key;
              try{ const parsed = JSON.parse(local.value); ref = parsed.location || parsed.code || parsed.title || item.key; }catch(e){}
              await logAudit('sync_conflict', ref+' — this device\'s offline change overwrote an edit made by someone else in the meantime. Please double-check this record.');
            }
            // Mirrors storeSet()'s own post-write step — without this, a
            // defect created/edited OFFLINE and only synced later via this
            // queue would land in Firestore with no matching /assignments
            // doc, so the worker/vendor it's assigned to would never see it.
            if(item.key.indexOf('defect:')===0){
              try{ await syncDefectAssignment(item.key, JSON.parse(local.value)); }catch(e){}
            }
          }
        }
        SYNC_QUEUE = SYNC_QUEUE.filter(x=> !(x.key===item.key && x.op===item.op));
        flushed++;
      }catch(e){ /* still offline / still failing — leave it queued */ }
    }
    if(flushed){
      await persistSyncQueue();
      showToast(flushed+' pending record'+(flushed>1?'s':'')+' synced to cloud'+(conflictCount? ' — '+conflictCount+' had a conflicting edit, check Audit Log' : ' ✓'));
      if(typeof updateNotifBell==='function') updateNotifBell();
    }
  }finally{ __syncFlushing = false; }
  return flushed;
}
async function storeSetWithStatus(key, value){
  const json = JSON.stringify(value);
  // Always write locally first. This is what makes "offline-first" actually
  // true: every record gets a durable copy on THIS device no matter what
  // happens to the cloud write below, so losing signal right after saving
  // never makes the record disappear from its own device.
  let localOk = false;
  try{ await window.storage.set(key, json, true); localOk = true; }
  catch(e){ console.error('local storage set failed', e); }
  let cloudOk = false;
  if(FIREBASE_ENABLED){
    try{ await fbSet(key, json); cloudOk = true; RECORD_VERSIONS[key] = Date.now(); }
    catch(e){
      console.error('Firebase set failed — saved locally, queued for sync', e);
      if(localOk) enqueueSync(key, 'set');
    }
  }
  if(cloudOk && key.indexOf('defect:')===0){
    syncDefectAssignment(key, value).catch(()=>{});
  }
  return {localOk, cloudOk};
}
async function storeSet(key, value){
  const r = await storeSetWithStatus(key, value);
  return r.localOk || r.cloudOk;
}
async function storeGet(key){
  if(FIREBASE_ENABLED){
    try{
      const r = await fbGet(key);
      if(r){
        try{ await window.storage.set(key, r.value, true); }catch(e){} // mirror locally for offline use
        if(r.updatedAtMillis) RECORD_VERSIONS[key] = r.updatedAtMillis;
        return JSON.parse(r.value);
      }
      // Not in Firebase — might be a record created offline that hasn't
      // synced yet, so fall through and check local storage too.
    }
    catch(e){ /* Firebase unreachable — fall through to local */ }
  }
  try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function storeDelete(key){
  if(FIREBASE_ENABLED){
    try{ await fbDelete(key); }
    catch(e){ console.error('Firebase delete failed — queueing for sync', e); enqueueSync(key, 'delete'); }
  }
  try{ await window.storage.delete(key, true); return true; }catch(e){ return false; }
}
async function storeListPrefix(prefix){
  let cloudKeys = null;
  if(FIREBASE_ENABLED){
    try{ const r = await fbList(prefix); cloudKeys = r ? r.keys : []; }
    catch(e){ console.error('Firebase list failed — falling back to local storage', e); }
  }
  let localKeys = [];
  try{ const r = await window.storage.list(prefix, true); localKeys = r ? r.keys : []; }
  catch(e){}
  if(cloudKeys===null) return localKeys;
  // Union: cloud is the source of truth, but records created offline
  // (still waiting in the sync queue) only exist locally so far.
  return Array.from(new Set([...cloudKeys, ...localKeys]));
}
async function storeSetPersonal(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); return true; }
  catch(e){ return false; }
}
async function storeGetPersonal(key){
  try{ const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function storeDeletePersonal(key){
  try{ await window.storage.delete(key, false); return true; }catch(e){ return false; }
}

async function loadAll(){
  const [iKeys, dKeys, aKeys, tKeys, mKeys, vnKeys, sKeys] = await Promise.all([
    storeListPrefix('insp:'), storeListPrefix('defect:'), storeListPrefix('audit:'),
    storeListPrefix('task:'), storeListPrefix('member:'), storeListPrefix('vendor:'), storeListPrefix('sos:')
  ]);
  // Fetch all records in parallel — was sequential (caused timeouts/empty screens on slow connections)
  const fetchAll = async (keys) => {
    const results = await Promise.allSettled(keys.map(k => storeGet(k)));
    return results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
  };
  const [inspections, defects, audit, tasks, members, vendors, sos] = await Promise.all([
    fetchAll(iKeys), fetchAll(dKeys), fetchAll(aKeys),
    fetchAll(tKeys), fetchAll(mKeys), fetchAll(vnKeys), fetchAll(sKeys)
  ]);
  inspections.sort((a,b)=> (b.submittedAt||'').localeCompare(a.submittedAt||''));
  defects.sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
  audit.sort((a,b)=> (b.at||'').localeCompare(a.at||''));
  tasks.sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
  members.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
  vendors.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
  sos.sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
  DB.inspections = inspections;
  DB.defects = defects;
  DB.audit = audit;
  DB.tasks = tasks;
  DB.members = members;
  DB.vendors = vendors;
  DB.sos = sos;
}
async function pruneAuditLog(){
  try{
    const cutoff = new Date(Date.now() - 90*24*3600*1000).toISOString();
    const MAX_ENTRIES = 800;
    const sorted = DB.audit.slice().sort((a,b)=> (b.at||'').localeCompare(a.at||''));
    const toRemove = sorted.filter((e,i)=> (e.at && e.at < cutoff) || i >= MAX_ENTRIES);
    if(!toRemove.length) return;
    for(const e of toRemove){
      try{ await storeDelete('audit:'+e.id); }catch(err){}
    }
    const removeIds = new Set(toRemove.map(e=>e.id));
    DB.audit = DB.audit.filter(e=> !removeIds.has(e.id));
  }catch(e){ /* housekeeping only — never block the app over this */ }
}
async function logAudit(action, details){
  const entry = {id: uid('aud'), action, details, at: new Date().toISOString(), role: state.role, by: state.currentUser? state.currentUser.name : null};
  DB.audit.unshift(entry);
  await storeSet('audit:'+entry.id, entry);
}

/* =========================================================
   UTIL
========================================================= */
function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
// Short reference code shown to residents + staff for a resident complaint
// (separate from the internal uid() storage key above). Built purely from
// the current date/time + a random suffix — deliberately NOT a count of
// existing complaints, because the public ?resident=1 link is create-only
// in Firestore (residents can never read the complaints list), so a
// resident's browser has no way to know how many complaints already exist
// and a counter would show "complaint #1" to every single resident.
function genComplaintId(){
  const d = new Date();
  const y = String(d.getFullYear()).slice(2);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  const rand = Math.random().toString(36).slice(2,6).toUpperCase();
  return 'MHM-C'+y+m+day+'-'+rand;
}
/* Local (device-timezone) YYYY-MM-DD key — deliberately NOT toISOString(),
   which is always UTC and, for IST (UTC+5:30), silently returns "yesterday"
   between 12:00 AM and 5:29 AM. Accepts nothing (→ now), a Date, or an ISO
   timestamp string; a plain already-YYYY-MM-DD string is passed through
   untouched so date-only values (r.date, report from/to pickers) are never
   reinterpreted through a UTC round-trip. */
function localDateKey(input){
  if(typeof input==='string' && /^\d{4}-\d{2}-\d{2}$/.test(input)) return input;
  const d = input ? new Date(input) : new Date();
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function todayStr(){ return localDateKey(); }
function nowTimeStr(){ const d=new Date(); return d.toTimeString().slice(0,5); }
function fmtDate(s){ if(!s) return '—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' · '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
function towerLine(formType, tower){ return formType==='club-house' ? (tower||'Club House') : ('Tower '+tower); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
function slaDeadline(defect){
  const base = defect.targetDate ? new Date(defect.targetDate+'T23:59:59') : new Date(new Date(defect.createdAt).getTime() + (PRIORITY_SLA_HOURS[defect.priority]||72)*3600*1000);
  return base;
}
function isOverdue(defect){
  if(defect.status==='closed') return false;
  return new Date() > slaDeadline(defect);
}
function isBreach(defect){
  if(defect.status==='closed') return false;
  const deadline = slaDeadline(defect);
  return (new Date() - deadline) > 48*3600*1000;
}
function resolutionDurationText(def){
  if(!def || !def.closedAt || !def.createdAt) return '';
  const ms = new Date(def.closedAt) - new Date(def.createdAt);
  if(isNaN(ms) || ms < 0) return '';
  const h = Math.round(ms/3600000);
  if(h < 1) return ' · fixed in under 1h';
  if(h < 48) return ' · fixed in '+h+'h';
  return ' · fixed in '+(Math.round(h/24*10)/10)+' days';
}
function starsHtml(n){
  let s=''; for(let i=1;i<=5;i++) s += (i<=n ? '★' : '☆');
  return '<span style="letter-spacing:2px;">'+s+'</span>';
}
function defectFormLabel(def){
  if(def.source==='resident') return 'Resident Complaint';
  const d = SECTION_DEFS[def.formType];
  return d ? tx(d.label) : '—';
}
function daysOpen(defect){
  const end = defect.closedAt ? new Date(defect.closedAt) : new Date();
  const days = Math.floor((end - new Date(defect.createdAt)) / (24*3600*1000));
  return Math.max(0, days);
}
function weekStartKey(){
  const d = new Date();
  const day = d.getDay();
  const diff = (day===0? -6 : 1) - day;
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0);
  return d;
}

/* ---- Recurring-issue detection ----
   A defect counts as "recurring" if the same location text has already
   been logged 2+ times in the last 30 days (i.e. this would be the 3rd+
   occurrence). Kept deliberately simple — exact location-string match,
   no fuzzy matching — so it stays honest about what it's actually
   detecting rather than pretending to be smarter than it is. */
const RECURRING_WINDOW_DAYS = 30;
const RECURRING_THRESHOLD = 2; // this many *prior* occurrences triggers the flag
function countRecentDefectsAtLocation(location){
  if(!location) return 0;
  const cutoff = Date.now() - RECURRING_WINDOW_DAYS*24*3600*1000;
  return DB.defects.filter(x=> x.location===location && new Date(x.createdAt).getTime()>=cutoff).length;
}
function isRecurringLocation(location){
  return countRecentDefectsAtLocation(location) >= RECURRING_THRESHOLD;
}
const PRIORITY_ORDER = ['low','medium','high'];
function bumpPriority(p){
  const i = PRIORITY_ORDER.indexOf(p);
  if(i<0) return p;
  return PRIORITY_ORDER[Math.min(i+1, PRIORITY_ORDER.length-1)];
}

/* ---- SLA countdown text — human-readable time left / overdue ---- */
function slaCountdownText(defect){
  if(defect.status==='closed') return null;
  const deadline = slaDeadline(defect);
  const diffMs = deadline - new Date();
  const abs = Math.abs(diffMs);
  const totalH = Math.floor(abs/3600000);
  const dd = Math.floor(totalH/24);
  const hh = totalH%24;
  const label = dd>0 ? (dd+'d '+hh+'h') : (totalH<1 ? '<1h' : totalH+'h');
  return diffMs>0 ? (label+' left') : (label+' overdue');
}

/* ---- Daily filing streak — consecutive days (ending today) with at
   least one Daily Tower or Daily Security checklist filed. Simple and
   honest: it checks "was anything filed that day", not "was every
   tower covered" — a per-tower streak would need per-tower tracking
   this app doesn't do. ---- */
function computeDailyStreak(){
  let streak = 0;
  const d = new Date();
  // Nothing filed yet today isn't a "miss" yet (the day isn't over) —
  // start counting from yesterday in that case instead of zeroing out.
  const todayKey = localDateKey(d);
  const filedToday = DB.inspections.some(r=> (r.formType==='daily-tower'||r.formType==='daily-security') && r.date===todayKey);
  if(!filedToday) d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const key = localDateKey(d);
    const filed = DB.inspections.some(r=> (r.formType==='daily-tower'||r.formType==='daily-security') && r.date===key);
    if(!filed) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function scoreGauge(percent, size){
  size = size || 56;
  const r = (size-8)/2, c = size/2, circ = 2*Math.PI*r;
  const pct = Math.max(0, Math.min(100, percent));
  const dash = circ * (pct/100);
  const color = pct>=90 ? 'var(--ok)' : pct>=70 ? 'var(--warn)' : 'var(--danger)';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    + '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="var(--surface-2)" stroke-width="6"/>'
    + '<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-linecap="round" '
    + 'stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'" transform="rotate(-90 '+c+' '+c+')" style="transition:stroke-dasharray .6s ease;"/>'
    + '<text x="'+c+'" y="'+(c+4)+'" text-anchor="middle" font-size="'+(size*0.26)+'" font-weight="800" fill="var(--ink)" font-family="var(--font-mono)">'+Math.round(pct)+'</text>'
    + '</svg>';
}

async function initTheme(){

  state.theme = (saved && saved.value) ? saved.value : 'light';
  applyTheme();
  const savedLang = await storeGetPersonal('lang');

async function saveMember(){
  if(!canManageTeam()){ showToast('You don\'t have permission to manage team members'); return; }
  const opts = state._newMemberOpen;
  const editingId = opts && opts.editId;
  const name = (document.getElementById('memName')||{}).value?.trim();
  if(!name){ showToast('Please enter a name'); return; }
  const mobile = (document.getElementById('memMobile')||{}).value?.trim() || '';
  if(!/^\d{10}$/.test(mobile)){ showToast('Mobile number is required and must be exactly 10 digits'); return; }
  const role = (document.getElementById('memRole')||{}).value || 'supervisor';
  const pin = (document.getElementById('memPin')||{}).value?.trim() || '';
  if(pin && pin.length<4){ showToast('PIN must be at least 4 digits, or left blank'); return; }
  // One mobile number = one member, regardless of role — otherwise the
  // same number could end up listed twice under different roles here.
  // (Staff Accounts doesn't need this check separately: it goes through
  // Firebase Auth, which already enforces one account per mobile number.)
  const dupe = DB.members.find(x=> x.mobile===mobile && x.id!==editingId);
  if(dupe){ showToast('This mobile number is already used by '+dupe.name+' ('+roleLabel(dupe.role)+') — edit or remove that entry first'); return; }
  let member, isNew = false;
  if(editingId){
    member = DB.members.find(x=>x.id===editingId);
    if(!member) return;
    member.name=name; member.mobile=mobile; member.role=role; member.pin=pin;
  } else {
    member = {id: uid('member'), name, mobile, role, pin, active:true, createdAt:new Date().toISOString()};
    isNew = true;
  }
  const ok = await storeSet('member:'+member.id, member);
  if(!ok){ showToast('Could not save — check your connection and try again'); return; }
  if(isNew) DB.members.push(member);
  DB.members.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  await logAudit(isNew?'member_added':'member_edited', name+' ('+role+')');
  state._newMemberOpen = null;
  render();
  showToast(isNew ? 'Member added' : 'Member updated');
}

  askConfirm({title:'Remove '+m.name+'?', message:'This only removes their name from the auto-fill list — it does not affect their sign-in account (see Staff Accounts). Their past inspections and tasks are not affected.', confirmLabel:'Remove', danger:true, onConfirm: ()=>deleteMember(id)});

async function saveEditStaffAccount(){
  const d = state._editStaffOpen;
  const s = DB.staff.find(x=>x.uid===d.uid);
  if(!d || !s) return;
  const name = (d.name||'').trim();
  if(!name){ state._editStaffError='Enter a name'; render(); return; }
  const adminCount = DB.staff.filter(x=>x.role==='admin').length;
  if(s.role==='admin' && d.role!=='admin' && adminCount<=1){
    state._editStaffError = 'Cannot change this — it\'s the only Admin account.';
    render();
    return;
  }
  try{
    const db = await initFirebase();
    if(!db) throw new Error('No connection — check your internet and try again');
    const trade = d.trade || '';
    await fbWithTimeout(db.collection('staff').doc(d.uid).update({role: d.role, name, trade}));
    s.role = d.role; s.name = name; s.trade = trade;
    if(AUTH_USER && d.uid===AUTH_USER.uid){
      // Editing your own account — keep the local session in sync too.
      STAFF_DOC.role = d.role; STAFF_DOC.name = name; STAFF_DOC.trade = trade;
      state.currentUser = {name, mobile:s.mobile, role:d.role, trade};
      state.role = d.role; state.adminUnlocked = (d.role==='admin');
    }
    await logAudit('staff_edited', name+' → '+d.role);
    state._editStaffOpen = null;
    render();
    showToast('Staff account updated');
  }catch(e){
    console.error('edit staff account failed', e);
    state._editStaffError = friendlyAuthError(e);
    render();
  }
}

async function removeStaffAccount(uid){

// Self-service password change for whoever is CURRENTLY signed in. This is
// the only client-safe way to change a password in this app: Firebase lets
// a user change their OWN password (after re-proving it), but there's no
// client-side way for an admin to set or reset a DIFFERENT person's
// password — that needs the Admin SDK, which only runs on a server. So
// this helps anyone who still remembers their password and wants to
// change it, but doesn't solve someone being fully locked out (see the
// note on the Staff Accounts card for that case).
function openChangePassword(){

  const d = state._changePasswordOpen;
  const err = state._changePasswordError;
  return '<div class="modal-backdrop" onclick="if(event.target===this) closeModals()"><div class="modal-sheet card">'
    + '<span class="section-label">'+icon('lock',14)+' Change Password</span>'
    + '<div class="field"><label class="field-label">Current password</label>'+passwordFieldHtml('cpCurrent',null,'current-password','state._changePasswordOpen.current=this.value')+'</div>'
    + '<div class="field"><label class="field-label">New password</label>'+passwordFieldHtml('cpNext',null,'new-password','state._changePasswordOpen.next=this.value')+'</div>'
    + '<div class="field"><label class="field-label">Confirm new password</label>'+passwordFieldHtml('cpConfirm',null,'new-password','state._changePasswordOpen.confirm=this.value')+'</div>'
    + (err ? '<p style="font-size:12px; color:var(--danger); margin:4px 0 0;">'+esc(err)+'</p>' : '')
    + '<div class="btn-row"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveChangePassword()">Change Password</button></div>'
    + '</div></div>';
